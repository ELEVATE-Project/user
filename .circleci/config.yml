version: 2.1 # CircleCI version
orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0
jobs:
  build:
    machine: #Linux machine instead of docker environment
      image: ubuntu-2204:current
      docker_layer_caching: true
    working_directory: ~/user # Default working directory
    steps:
      - checkout:
          path: ~/user
      - restore_cache:
          key: user-dependency-cache-{{ checksum "src/package.json" }}
      - run:
          name: Install dependencies
          command: cd src/ && npm install
      - save_cache:
          key: user-dependency-cache-{{checksum "src/package.json"}}
          paths:
            - ./src/node_modules
      # - run:
      #     name: Executing unit test cases
      #     command: cd src && npm test -- --collectCoverage --collectCoverageFrom="services/helper/*"
      # - store_artifacts:
      #     path: src/coverage/
      #     destination: /coverage/
      - sonarcloud/scan
      - run:
          name: Checking prerequisites
          command: |-
            docker-compose --version
      - run:
          name: Starting the docker containers
          command: |-
            cd dev-ops/ && docker-compose up -d
      # - run:
      #     name: Running test cases
      #     command: |-
      #       cd src/ &&  npm run test:integration
      # - store_test_results:
      #     path: ./dev-ops/report
      - run:
          name: Bundling API docs
          command: |-
            cd src/ && npm run docs:bundle
      - run:
          name: Linting API docs (fails only on problems beyond the committed baseline)
          command: |-
            cd src/ && npm run docs:lint -- --max-problems 1000
      - run:
          name: Generating live route inventory for API doc coverage check
          command: |-
            cd dev-ops/ && docker-compose exec -T user_elevate_2.5 npm run docs:route-inventory
      - run:
          name: Checking every live route is documented in api-doc.yaml
          command: |-
            cd src/ && npm run docs:check-route-coverage
      - store_artifacts:
          path: src/api-doc/api-doc.yaml
          destination: /api-doc/

workflows:
  build-and-test: # This is the name of the workflow,
    # Inside the workflow, you define the jobs you want to run.
    jobs:
      - build:
          context:
            - SonarCloud
          filters:
            tags:
              only:
                - develop
