updateFormRequest:
  description: 'Request body for updating a form. `id`, `version`, and
    `organization_id` are stripped from the body server-side even if supplied.
    Unlike `create`, the top-level `data` object itself is not required (only
    `data.template_name` is checked when `data` is present). Cross-field note:
    `data.fields` must be present whenever `data.template_name` is supplied,
    and `data.template_name` must be present whenever `data.fields` is
    supplied — the two are only valid together.'
  x-internal-note: 'Stripping via constants/blacklistConfig.js `form.update`.
    Requirement details come from validators/v1/form.js `update` (custom
    checks at lines 59-73); `data.fields` is flagged optional in
    validator-fields.json taken in isolation, but this cross-field
    requirement is not captured there. This finding comes directly from the
    validator file, not from cross-field-rules.json (which only scans
    services/controllers, not validators).'
  type: object
  required:
    - type
    - sub_type
  properties:
    type:
      type: string
      description: The type of the form. Letters only.
      pattern: ^[A-Za-z]+$
      example: profile
    sub_type:
      type: string
      description: The sub-type or category of the form. Letters only.
      pattern: ^[A-Za-z]+$
      example: profileForm
    data:
      type: object
      description: The main data structure for the form. `template_name` is required
        whenever `data` is supplied; see the cross-field note above regarding
        `template_name`/`fields` pairing.
      required:
        - template_name
      properties:
        template_name:
          type: string
          description: The name of the template used for the form. Letters only.
          pattern: ^[A-Za-z]+$
          example: defaultTemplate
        fields:
          type: object
          description: The fields that make up the form. Optional in isolation,
            but must be present if `data.template_name` is present (see cross-field
