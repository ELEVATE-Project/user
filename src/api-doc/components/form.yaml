readFormRequest:
  type: object
  description: 'Request object for retrieving form details. The request is
    handled differently depending on how it arrives — modeled below as
    `oneOf` per branch. Branch 1: a `formId` path parameter is supplied — the
    request body should be empty. Branch 2: no `formId` path parameter, but a
    non-empty body — `type` and `sub_type` are both required together.
    Branch 3: no `formId` and an empty body — the endpoint instead returns
    the full list of form versions, which is a materially different response
    shape (see readAllFormVersions200Response). Because `formId` is a path
    parameter, branch 1 and branch 3 both correspond to an empty request
    body — the request body schema alone cannot distinguish them; the path
    parameter does.'
  x-internal-note: 'The `read` validator (validators/v1/form.js) branches on
    how the request arrives, mirroring the conditionalNotes for this
    operation in validator-fields.json (form.read). Branch 3 is handled by
    services/form.js `readAllFormsVersion`.'
  oneOf:
    - title: byIdOrListAll
      type: object
      description: Used both when `formId` is supplied in the path (lookup by id) and
        when neither `formId` nor a body is supplied (list all form versions). Body
        must be empty in both cases.
      maxProperties: 0
    - title: byTypeAndSubType
      type: object
      description: Used when no `formId` path parameter is supplied and a lookup by
        type/sub_type is intended. Both fields are required together.
      required:
        - type
        - sub_type
      properties:
        type:
          type: string
          description: Type of form. Letters only.
          pattern: ^[A-Za-z]+$
          example: profile
        sub_type:
          type: string
          description: Subtype of the form. Letters only.
          pattern: ^[A-Za-z]+$
          example: profileForm
readForm200Response:
  description: 'OK. Form details retrieved successfully. If the form is not
    found for the requesting organization, the lookup falls back to the
    default organization before returning a not-found error.'
  x-internal-note: 'services/form.js `read`, message key
    FORM_FETCHED_SUCCESSFULLY, statusCode 200. No captured example exists
    for this status/message combination in captured-responses.json (only the
    400 branches for `read` were captured) — shape only below, no fabricated
    field values. See gaps.jsonl (domain=form,
    endpoint=/user/v1/form/read/{formId}, statusCode=200). services/form.js
    `read` (line 143) falls back from an org-specific form lookup to a
    default-organization form lookup (`defaultOrgForm`) before returning
    FORM_NOT_FOUND; cross-field-rules.json flags this as an "unclear" finding
    since `form`/`defaultOrgForm` are two lookups of one conceptual entity,
    not independent request fields, so it is not modeled as a schema oneOf —
    see gaps.jsonl for this too.'
  type: object
  properties:
    responseCode:
      type: string
    message:
      type: string
    result:
      type: object
      properties:
        type:
          type: string
        sub_type:
          type: string
        updated_at:
          type: string
        created_at:
          type: string
        id:
          type: string
        data:
          type: object
          properties:
            template_name:
              type: string
            fields:
              type: object
              properties:
                controls:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      label:
                        type: string
                      value:
                        type: string
                      class:
                        type: string
                      type:
                        type: string
                      position:
                        type: string
                      validators:
                        type: object
                        properties:
                          required:
                            type: boolean
                          minLength:
                            type: number
