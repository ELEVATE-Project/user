createFormRequest:
  type: object
  description: 'Request body for creating a form. `id`, `version`, and `organization_id`
    are stripped from the body server-side even if supplied by the client, so
    they are not modeled as accepted properties here.'
  x-internal-note: 'Stripping done via constants/blacklistConfig.js `form.create`.'
  required:
    - type
    - sub_type
    - data
  properties:
    type:
      type: string
      description: The type of the form. Letters only.
      pattern: ^[A-Za-z]+$
      example: profile
    sub_type:
      type: string
      description: The sub-type or category of the form. Letters only.
      pattern: ^[A-Za-z]+$
      example: profileForm
    data:
      type: object
      description: The main data structure for the form.
      required:
        - template_name
        - fields
      properties:
        template_name:
          type: string
          description: The name of the template used for the form. Letters only.
          pattern: ^[A-Za-z]+$
          example: defaultTemplate
        fields:
          type: object
          description: The fields that make up the form.
          properties:
            controls:
              type: array
              description: An array of form controls.
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: The name or identifier of the form.
                    example: name
                  label:
                    type: string
                    description: The label of the form.
                    example: name
                  value:
                    type: string
                    description: Value of the form
                    example: ''
                  class:
                    type: string
                    description: The CSS class associated with the form
                    example: ion-margin
                  type:
                    type: string
                    description: The type of the form control (e.g., text, checkbox).
                    example: text
                  position:
                    type: string
                    description: The position of the form
                    example: floating
                  validators:
                    description: Validation rules for the form control.
                    type: object
                    properties:
                      required:
                        type: boolean
                        description: Indicates if the field is required.
                        example: true
                      minLength:
                        type: number
                        description: The minimum length allowed for the field.
                        example: 10
createForm201Response:
