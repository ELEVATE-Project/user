# Public domain components.
# Request field required/optional flags are taken verbatim from
# scripts/api-doc/validator-fields.json (public.operations.*).
# Response `example` blocks are copied verbatim from
# scripts/api-doc/captured-responses.json (live server capture) — never inferred,
# except the 406 case noted below.

checkUsernameSuccessResponse:
  type: object
  description: Result of a username-availability lookup for the caller's tenant.
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
      example: Username is available
    result:
      type: object
      properties:
        available:
          type: boolean
          description: Whether the username is not already taken within the resolved tenant.
    meta:
      type: object
      properties:
        formsVersion:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              type:
                type: string
              version:
                type: integer
        correlation:
          type: string
  example:
    responseCode: OK
    message: Username is available
    result:
      available: true
    meta:
      formsVersion:
        - id: 1
          type: profile
          version: 3
      correlation: abe8b9d7-de25-423d-8f30-3278b39c4355

validationErrorResponse:
  type: object
  description: express-validator validation failure (HTTP 422).
  properties:
    responseCode:
      type: string
      example: CLIENT_ERROR
    error:
      type: array
      items:
        type: object
        properties:
          location:
            type: string
          param:
            type: string
          msg:
            type: string
    meta:
      type: object
      properties:
        correlation:
          type: string
    message:
      type: string
      example: Validation failed, Entered data is incorrect!

tenantNotFoundResponse:
  type: object
  description: >-
    Client error (responseCode CLIENT_ERROR, HTTP 406) raised when the tenant
    cannot be resolved for the caller's domain. Message is
    TENANT_DOMAIN_NOT_FOUND_PING_ADMIN when no tenant_domain row matches the
    request's domain, or TENANT_NOT_FOUND_PING_ADMIN when the domain resolves
    to a tenant_code that has no matching tenant.
  x-internal-note: >-
    No live capture exists for this exact path/case combination; the example
    below reuses the TENANT_DOMAIN_NOT_FOUND_PING_ADMIN capture from
    GET /user/v1/public/branding (scripts/api-doc/captured-responses.json),
    which shares the same tenantDomainQueries.findOne lookup as
    services/public.js#checkUsername.
  properties:
    responseCode:
      type: string
      example: CLIENT_ERROR
    error:
      type: array
      items:
        type: object
    meta:
      type: object
      properties:
        correlation:
          type: string
    message:
      type: string
  example:
    responseCode: CLIENT_ERROR
    error: []
    meta:
      correlation: cb11e059-fda6-475c-8e24-dd82c2fae410
    message: Tenant domain not found. Please contact your administrator for assistance.

serverErrorResponse:
  type: object
  description: Server error. responseCode SERVER_ERROR.
  properties:
    responseCode:
      type: string
      example: SERVER_ERROR
    message:
      type: string
      example: Oops! Something Went Wrong.
    meta:
      type: object
      properties:
        correlation:
          type: string

branding201Response:
  type: object
  description: >-
    Tenant branding/details, resolved from the caller's tenant_code header or
    request domain. Organization details are included only when `org_code` is
    supplied and resolves successfully — supplying `org_code` currently
    triggers a server-side error instead (see the operation's 500 response).
  x-internal-note: >-
    No live 200/201 capture exists for this endpoint —
    captured-responses.json only has 406/500 cases for it. Shape is inferred
    directly from dtos/tenantDTO.js#publicTransform, not a fabricated body.
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
      example: TENANT_DETAILS
    result:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        status:
          type: string
        description:
          type: string
        logo:
          type: string
        theming:
          type: object
        configuration:
          type: object
        meta:
          type: object
        organization:
          type: object
          description: Present only when org_code was supplied and resolved.
          properties:
            name:
              type: string
            code:
              type: string
            description:
              type: string
            status:
              type: string
    meta:
      type: object
      properties:
        correlation:
          type: string
  example:
    responseCode: OK
    message: TENANT_DETAILS
    result:
      code: sample_tenant
      name: Sample Tenant
      status: ACTIVE
      description: Sample tenant description
      logo: https://example.com/logo.png
      theming: {}
      configuration: {}
      meta: {}
    meta:
      correlation: 3f9c1a2b-6d4e-4b8a-9f3c-1a2b6d4e4b8a

userInvites200Response:
  type: object
  description: >-
    Invitee's prefilled profile data for a pending organization invite,
    resolved by `invitation_key` + `tenant_code`.
  x-internal-note: >-
    No live 200 capture exists for this endpoint — captured-responses.json
    only has 406/500 cases for it. Shape is inferred directly from
    dtos/userDTO.js#userInviteDTO (built on #transformUser, minus `id` and
    `organizations`, plus `editable_fields` and any custom entity-type fields
    dynamically merged in by the service), not a fabricated body.
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
      example: USER_DATA_FETCHED
    result:
      type: object
      description: >-
        Known static fields are listed below; additional dynamic fields keyed
        by entity-type value (e.g. custom profile questions) may also be
        present.
      properties:
        email:
          type: string
        email_verified:
          type: boolean
        name:
          type: string
        username:
          type: string
        phone:
          type: string
          nullable: true
        phone_code:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        about:
          type: string
          nullable: true
        share_link:
          type: string
          nullable: true
        status:
          type: string
        image:
          type: string
          nullable: true
        has_accepted_terms_and_conditions:
          type: boolean
        languages:
          type: array
          items:
            type: string
        preferred_language:
          type: string
          nullable: true
        custom_entity_text:
          type: object
        tenant_code:
          type: string
        meta:
          type: object
        created_at:
          type: string
        updated_at:
          type: string
        deleted_at:
          type: string
          nullable: true
        editable_fields:
          type: array
          items:
            type: string
      additionalProperties: true
    meta:
      type: object
      properties:
        correlation:
          type: string
  example:
    responseCode: OK
    message: USER_DATA_FETCHED
    result:
      email: invitee@example.com
