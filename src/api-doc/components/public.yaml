      name: Sample Invitee
      username: sample_invitee
      phone: null
      phone_code: null
      location: null
      about: null
      share_link: null
      status: ACTIVE
      image: null
      has_accepted_terms_and_conditions: false
      languages: []
      preferred_language: null
      custom_entity_text: {}
      tenant_code: default_tenant
      meta: {}
      created_at: '2026-01-01T00:00:00.000Z'
      updated_at: '2026-01-01T00:00:00.000Z'
      deleted_at: null
      editable_fields:
        - name
        - about
    meta:
      correlation: 7b2e4f1a-8c3d-4e5f-9a1b-2c3d4e5f9a1b

userInvites406Response:
  type: object
  description: >-
    Not Acceptable. No matching, still-invited invitation exists for the given
    `invitation_key` and `tenant_code`.
  properties:
    responseCode:
      type: string
      example: CLIENT_ERROR
    error:
      type: array
      items:
        type: object
    meta:
      type: object
      properties:
        correlation:
          type: string
    message:
      type: string
      example: Invitation is Invalid or expired. Please contact your Admin.
  example:
    responseCode: CLIENT_ERROR
    error: []
    meta:
      correlation: 1d9ad222-4fec-4189-b980-e5764d625116
    message: Invitation is Invalid or expired. Please contact your Admin.
