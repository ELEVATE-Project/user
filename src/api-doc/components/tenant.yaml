tenantInvalidDomains202Response:
  description: >-
    Accepted (statusCode 202, despite representing a no-op/rejected input).
    Returned by both services/tenant.js#addDomain and #removeDomain
    (message key INVALID_TENANT_DOMAINS) when, after filtering out non-string
    or empty-string entries, the resulting `domains` list is empty. Modeled
    as a `successResponse` because the source code calls
    `responses.successResponse(...)` for this branch, not
    `failureResponse(...)` - flagged as a likely inconsistency (client sent
    garbage input, yet gets a 202/OK envelope). GAP: no captured example
    exists for this status/message - shape only. See gaps.jsonl
    (domain=tenant, endpoint=POST /user/v1/tenant/addDomain/{id} and
    /user/v1/tenant/removeDomain/{id}, statusCode=202).
  type: object
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
      example: INVALID_TENANT_DOMAINS
    result:
      type: object
      example: {}
    meta:
      type: object
      properties:
        correlation:
          type: string

tenantDomainsAlreadyPresent202Response:
