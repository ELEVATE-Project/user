tenantUpsertRequest:
  type: object
  description: >-
    Request payload for `POST /user/v1/tenant/update` (create, no `id` path
    param) or `POST /user/v1/tenant/update/{id}` (update, `id` path param
    present). validators/v1/tenant.js branches on `req.params.id` and applies a
    materially different check/blacklist set per branch (see
    validator-fields.json's `tenant.update` operation `conditionalNotes`) -
    modeled below as `oneOf` per branch. Server-managed fields (`status` on
    both branches; `id`, `created_by`, `updated_by`, `created_at`, `updated_at`,
    `deleted_at` on both; additionally `code` and `domains` on the update
    branch only) are stripped from the request body by
    constants/blacklistConfig.js's `filterRequestBody` before validation runs
    and cannot be set by the client, even though they appear as request-body
    fields on the create branch.
  oneOf:
    - title: createTenant
      type: object
      description: >-
        Used when no `id` path parameter is supplied (create branch,
        services/tenant.js#create). `name`, `code` and `domains` are required;
        `description` and `logo` are also checked with `.trim()` (empty string
        after trim fails Express-validator's implicit non-empty check triggered
        by chained `.trim()` calls, though no explicit `.notEmpty()` follows them
        - see conditionalNotes for `description`/`logo`, both flagged
        required:true in validator-fields.json). `theming`, `configuration` and
        `meta` are optional and, if supplied as JSON strings, are parsed to
        objects server-side (normalizeTenantConfiguration / isValidObject).
        `configuration`, when supplied, must be a config-dependent shape - see
        the `configuration` property description below.
      required:
        - name
        - code
        - description
        - logo
        - domains
      properties:
        name:
          type: string
          description: Display name of the tenant. Must not be empty after trimming.
          example: Replay Test Tenant
        code:
          type: string
          description: >-
            Unique tenant code. Letters, numbers and underscores only. Must not
            be empty after trimming.
          pattern: ^[a-zA-Z0-9_]+$
          example: tenant3t7o723zj5
        description:
          type: string
          description: Tenant description.
          example: created by replay script
        logo:
          type: string
          description: URL (or opaque string) for the tenant logo.
          example: https://example.com/logo.png
        theming:
          type: object
          description: >-
            Free-form theming object (or a JSON string representing one) - only
            checked for being a valid plain object, no fixed shape enforced by
            the validator.
          additionalProperties: true
          example:
            primaryColor: '#4F46E5'
            secondaryColor: '#F97316'
        configuration:
          type: object
          description: >-
            Tenant auth configuration. If omitted, defaults server-side to
            `common.DEFAULT_TENANT_CONFIGURATION`, which is itself sourced from
            the `DEFAULT_ALLOWED_AUTH_MODES` / `DEFAULT_AUTO_REGISTER`
            environment variables at process start (runtime config - not fixed
            values, so not hard-coded into this schema). When supplied, the
            validator (`isValidTenantConfiguration`) requires
            `allowed_auth_mode` to be a non-empty array whose every entry is one
            of the values in that same env-sourced default list (in this
            checkout, `common.AUTH_MODES` documents the two conventional values
            `otp` and `password`, but the true allow-list is whatever
            `DEFAULT_ALLOWED_AUTH_MODES` is configured to at deploy time), and
            `auto_register` to be a boolean.
          required:
            - allowed_auth_mode
            - auto_register
          properties:
            allowed_auth_mode:
              type: array
              items:
                type: string
              description: >-
                Non-empty list of auth modes. Every entry must be a member of
                the environment-configured default allow-list (commonly
                `otp`/`password` - see field description above).
              example:
                - password
            auto_register:
              type: boolean
              example: true
        meta:
          type: object
          description: Free-form metadata object (or a JSON string representing one).
          additionalProperties: true
          example:
            test: '2341'
        domains:
          type: string
          description: >-
            One or more domains for the tenant. Accepted as a single string
            (comma-separated for multiple domains) - services/tenant.js splits
            on `,` server-side. Must not be empty after trimming.
          example: shikshalokam-qa.tekdinext.com
    - title: updateTenant
      type: object
      description: >-
        Used when an `id` path parameter is supplied (update branch,
        services/tenant.js#update, dispatched via
        controllers/v1/tenant.js#update). Only `configuration` is checked by the
        validator in this branch; `name`, `description`, `logo`, `theming` and
        `meta` are NOT stripped by the update-branch blacklist and are NOT
        validated either, so if supplied they pass through unchecked into a
        partial-column `UPDATE` (services/tenant.js `tenantQueries.update`) -
        documented here as accepted-but-unvalidated. `code`, `domains` and
        `status` are silently stripped from the request body server-side
        (constants/blacklistConfig.js `tenant.update`) even if supplied by the
        client, so they can never actually change tenant identity/domains via
        this endpoint (use the dedicated add/removeDomain endpoints for
        domains).
      properties:
        configuration:
          type: object
          description: Same shape/validation as the create-branch `configuration` field.
          required:
            - allowed_auth_mode
            - auto_register
          properties:
            allowed_auth_mode:
              type: array
              items:
                type: string
              example:
                - password
                - otp
            auto_register:
              type: boolean
              example: true
        name:
          type: string
          description: Accepted but unvalidated - see description above.
        description:
          type: string
          description: Accepted but unvalidated - see description above.
        logo:
          type: string
          description: Accepted but unvalidated - see description above.
        theming:
          type: object
          description: Accepted but unvalidated - see description above.
          additionalProperties: true
        meta:
          type: object
          description: Accepted but unvalidated - see description above.
          additionalProperties: true
  examples:
    createTenant:
      summary: Create a new tenant (no id path param)
      value:
        name: Replay Test Tenant
        code: tenant3t7o723zj5
        description: created by replay script
        logo: https://example.com/logo.png
        configuration:
          allowed_auth_mode:
            - password
          auto_register: true
        domains: shikshalokam-qa.tekdinext.com
    updateTenantConfiguration:
      summary: Update an existing tenant's configuration (id path param present)
      value:
        configuration:
          allowed_auth_mode:
            - password
            - otp
          auto_register: true

tenantAddDomainRequest:
  type: object
  description: >-
    Request payload for `POST /user/v1/tenant/addDomain/{id}`. `domains` is
    required and may be a non-empty array of strings or a non-empty string
    (comma-separated for multiple domains).
  required:
    - domains
  properties:
    domains:
      description: One or more domains to add to the tenant.
      oneOf:
        - type: array
          items:
            type: string
          minItems: 1
        - type: string
          minLength: 1
      example:
        - https://test.2.domain.com

tenantRemoveDomainRequest:
  type: object
  description: >-
    Request payload for `POST /user/v1/tenant/removeDomain/{id}`. `domains` is
    required and may be a non-empty array of strings or a non-empty string
    (comma-separated for multiple domains). services/tenant.js#removeDomain
    additionally rejects the request (see
    tenantDomainsAtLeastOneMandatory406Response) if the given domains would
    remove every domain the tenant has.
  required:
    - domains
  properties:
    domains:
      description: One or more domains to remove from the tenant.
      oneOf:
        - type: array
          items:
            type: string
          minItems: 1
        - type: string
          minLength: 1
      example:
        - new.domain.scd

tenantBulkUserCreateRequest:
  type: object
  description: >-
    Request payload for `POST /user/v1/tenant/bulkUserCreate`. Both fields are
    required. The organization is resolved from the `organizationcode` /
    `tenantcode` headers (see the path parameters), not from the body.
  required:
    - file_path
    - upload_type
  properties:
    file_path:
      type: string
      description: Path (relative to the configured storage bucket) of the previously-uploaded CSV.
      example: users/1-1761570904451-users/1-1756128403580-27-oct-bulkupload.csv
    upload_type:
      type: string
      description: >-
        Upload mode. Compared case-insensitively against `UPLOAD`/`INVITE`
        (`.toUpperCase()` is applied both client and server side).
      enum:
        - upload
        - invite
      example: upload
    editable_fields:
      type: array
      items:
        type: string
      description: Optional list of user fields that may be edited via the bulk upload.

# ---------------------------------------------------------------------------
# Responses
# ---------------------------------------------------------------------------

tenantCreated202Response:
  description: >-
    Accepted. Tenant (and its default domains/org/entity-types/forms/
    notification-templates/org-features/user-roles) created successfully
    (services/tenant.js#create, message key TENANT_CREATED_SUCCESSFULLY,
    statusCode 202). Captured example below is a live capture from
    captured-responses.json.
  type: object
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
      example: Tenant created successfully.
    result:
      type: object
      properties:
        name:
          type: string
          example: Replay Test Tenant
        code:
          type: string
          example: tenant3t7o723zj5
        description:
          type: string
          example: created by replay script
        logo:
          type: string
          example: https://example.com/logo.png
        configuration:
          type: object
          properties:
            auto_register:
              type: boolean
              example: true
            allowed_auth_mode:
              type: array
              items:
                type: string
              example:
                - password
        status:
          type: string
          example: ACTIVE
        created_by:
          type: number
          example: 23
        updated_by:
          type: number
          example: 23
        updated_at:
          type: string
          format: date-time
          example: '2026-07-15T10:56:24.538Z'
        created_at:
          type: string
          format: date-time
          example: '2026-07-15T10:56:24.538Z'
        theming:
          type: object
          nullable: true
          example: null
        meta:
          type: object
          nullable: true
          example: null
        deleted_at:
          type: string
          format: date-time
          nullable: true
          example: null
    meta:
      type: object
      properties:
        formsVersion:
          type: array
          items:
            type: object
        correlation:
          type: string
  example:
    responseCode: OK
    message: Tenant created successfully.
    result:
      name: Replay Test Tenant
      code: tenant3t7o723zj5
      description: created by replay script
      logo: https://example.com/logo.png
      configuration:
        auto_register: true
        allowed_auth_mode:
          - password
      status: ACTIVE
      created_by: 23
      updated_by: 23
      updated_at: '2026-07-15T10:56:24.538Z'
      created_at: '2026-07-15T10:56:24.538Z'
      theming: null
      meta: null
      deleted_at: null
    meta:
      correlation: 054071f9-2f57-4c2a-8518-f352578e7681

tenantAlreadyExists400Response:
  description: >-
    Bad Request. A tenant with the given `code` already exists
    (services/tenant.js#create, `UniqueConstraintError` branch, message key
    TENANT_ALREADY_EXISTS, statusCode 400). GAP: no captured example exists for
    this status/message in captured-responses.json - shape only below,
    mirroring the generic failureResponse envelope seen on other captured 4xx
    tenant responses. See gaps.jsonl (domain=tenant, endpoint=POST
    /user/v1/tenant/update, statusCode=400).
  type: object
  properties:
    responseCode:
      type: string
      example: CLIENT_ERROR
    message:
      type: string
      example: TENANT_ALREADY_EXISTS
    error:
      type: array
      items:
        type: string
      example: []
    meta:
      type: object
      properties:
        correlation:
          type: string

tenantDomainAlreadyExists400Response:
  description: >-
    Bad Request. One or more of the domains supplied at tenant-creation time
    already belong to another tenant (services/tenant.js#create, message key
    TENANT_DOMAIN_ALREADY_EXISTS, statusCode 400 - two call sites, line 106-111
    and the surrounding catch at line 117-122; the tenant row and any
    already-created domains are rolled back via RollbackStack before this
    response is returned). GAP: no captured example exists for this
    status/message - shape only. See gaps.jsonl (domain=tenant, endpoint=POST
    /user/v1/tenant/update, statusCode=400).
  type: object
  properties:
    responseCode:
      type: string
      example: CLIENT_ERROR
    message:
      type: string
      example: TENANT_DOMAIN_ALREADY_EXISTS
    error:
      type: array
      items:
        type: string
      example: []
    meta:
      type: object
      properties:
        correlation:
          type: string

tenantDefaultOrgCreationFailed400Response:
  description: >-
    Bad Request. Something in the default-organization bootstrap for the new
    tenant (default org, entity types/entities, forms, notification
    templates, org features, or user roles copied from
    `process.env.DEFAULT_ORGANISATION_CODE` / `process.env.DEFAULT_TENANT_CODE`
    / `process.env.DEFAULT_ORG_ID`, all runtime config) failed
    (services/tenant.js#create, message key DEFAULT_ORG_CREATION_FAILED,
    statusCode 400; the tenant row, its domains, and any partially-created
    default-org resources are all rolled back via RollbackStack before this
    response is returned). GAP: no captured example exists for this
    status/message - shape only. See gaps.jsonl (domain=tenant, endpoint=POST
    /user/v1/tenant/update, statusCode=400).
  type: object
  properties:
    responseCode:
      type: string
      example: CLIENT_ERROR
    message:
      type: string
      example: DEFAULT_ORG_CREATION_FAILED
    error:
      type: array
      items:
        type: string
      example: []
    meta:
      type: object
      properties:
        correlation:
          type: string

tenantUpdated202Response:
  description: >-
    Accepted. Tenant updated successfully (services/tenant.js#update, message
    key TENANT_UPDATED_SUCCESSFULLY, statusCode 202). `result` is simply the
    (blacklist-filtered) request body that was applied, with `updated_by`
    added - not the full updated row. Captured example below is a live capture
    from captured-responses.json (a configuration-only update).
  type: object
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
      example: Tenant updated successfully.
    result:
      type: object
      additionalProperties: true
      description: Echo of the applied (filtered) request body plus `updated_by`.
      example:
        configuration:
          auto_register: true
          allowed_auth_mode:
            - password
            - otp
        updated_by: 23
    meta:
      type: object
      properties:
        correlation:
          type: string
  example:
    responseCode: OK
    message: Tenant updated successfully.
    result:
      configuration:
        auto_register: true
        allowed_auth_mode:
          - password
          - otp
      updated_by: 23
    meta:
      correlation: 493cf69e-af4e-4ff3-b2c4-2114f4dd2c1a

tenantUpdateFailed500Response:
  description: >-
    Internal Server Error. The update query ran but returned no updated rows
