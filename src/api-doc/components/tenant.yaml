tenantRead202Response:
  description: >-
    OK/Accepted. Tenant details fetched (services/tenant.js#read, message key
    TENANT_DETAILS_FETCHED, statusCode 202). Two shapes exist depending on
    caller role, only one of which has a captured example: (1) admin caller
    (or `readInternal`) - `organizations` (id/name/code) and `domains`
    (domain/verified) arrays are included, and all tenant columns except
    `deleted_at` are returned (captured below); (2) non-admin caller - only
    `code`, `name`, `description`, `configuration`, `meta` are selected
    (services/tenant.js#read `options.attributes`), with no `organizations`/
    `domains` arrays. GAP: the non-admin-caller response shape has no
    captured example in captured-responses.json - only the admin/internal
    shape was captured. See gaps.jsonl (domain=tenant, endpoint=GET
    /user/v1/tenant/read/{id}, statusCode=202, non-admin shape).
  type: object
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
      example: Tenant details fetched.
    result:
      type: object
      properties:
        code:
          type: string
          example: default
        name:
          type: string
          example: Default Tenant
        status:
          type: string
          example: ACTIVE
        description:
          type: string
          example: This is the default tenant.
        logo:
          type: string
          example: https://www.logo.dev
        theming:
          type: object
          additionalProperties: true
          example:
            primaryColor: '#4F46E5'
            secondaryColor: '#F97316'
        configuration:
          type: object
          properties:
            auto_register:
              type: boolean
              example: true
            allowed_auth_mode:
              type: array
              items:
                type: string
              example:
                - otp
                - password
        meta:
          type: object
          nullable: true
          example: null
        created_by:
          type: number
          nullable: true
          example: null
        updated_by:
