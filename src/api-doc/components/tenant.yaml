tenantUpsertRequest:
  type: object
  description: >-
    Request payload for `POST /user/v1/tenant/update` (create, no `id` path
    param) or `POST /user/v1/tenant/update/{id}` (update, `id` path param
    present). The accepted fields and validation rules differ between the
    two branches, modeled below as `oneOf`. Server-managed fields (`status`
    on both branches; `id`, `created_by`, `updated_by`, `created_at`,
    `updated_at`, `deleted_at` on both; additionally `code` and `domains` on
    the update branch only) are always stripped from the request body
    server-side and cannot be set by the client, even though they appear as
    request-body fields on the create branch.
  x-internal-note: >-
    validators/v1/tenant.js branches on `req.params.id` and applies a
    materially different check/blacklist set per branch (see
    validator-fields.json's `tenant.update` operation `conditionalNotes`).
    Stripping is done by constants/blacklistConfig.js's `filterRequestBody`
    before validation runs.
  oneOf:
    - title: createTenant
      type: object
      description: >-
        Used when no `id` path parameter is supplied (create branch). `name`,
        `code` and `domains` are required; `description` and `logo` must
        also be non-empty after trimming whitespace. `theming`,
        `configuration` and `meta` are optional and, if supplied as JSON
        strings, are parsed into objects server-side. `configuration`, when
        supplied, must match the shape described in the `configuration`
        property below.
      x-internal-note: >-
        services/tenant.js#create. `description`/`logo` non-empty check comes
        from Express-validator's implicit non-empty check triggered by
        chained `.trim()` calls, though no explicit `.notEmpty()` follows
        them - see conditionalNotes for `description`/`logo`, both flagged
        required:true in validator-fields.json. JSON-string parsing is done
        by normalizeTenantConfiguration / isValidObject.
      required:
        - name
        - code
        - description
        - logo
        - domains
      properties:
        name:
          type: string
          description: Display name of the tenant. Must not be empty after trimming.
          example: Replay Test Tenant
        code:
          type: string
          description: >-
            Unique tenant code. Letters, numbers and underscores only. Must not
            be empty after trimming.
          pattern: ^[a-zA-Z0-9_]+$
          example: tenant3t7o723zj5
        description:
          type: string
          description: Tenant description.
          example: created by replay script
        logo:
          type: string
          description: URL (or opaque string) for the tenant logo.
          example: https://example.com/logo.png
        theming:
          type: object
          description: >-
            Free-form theming object (or a JSON string representing one) - only
            checked for being a valid plain object, no fixed shape enforced by
            the validator.
          additionalProperties: true
          example:
            primaryColor: '#4F46E5'
            secondaryColor: '#F97316'
        configuration:
          type: object
          description: >-
            Tenant auth configuration. If omitted, defaults server-side to the
            deployment's configured default (typically `allowed_auth_mode` of
            `otp`/`password` and a default `auto_register` value). When
            supplied, `allowed_auth_mode` must be a non-empty array whose
            every entry is one of the deployment's allowed auth modes, and
            `auto_register` must be a boolean.
          x-internal-note: >-
            Defaults to `common.DEFAULT_TENANT_CONFIGURATION`, sourced from
            the `DEFAULT_ALLOWED_AUTH_MODES` / `DEFAULT_AUTO_REGISTER`
            environment variables at process start (runtime config, not
            hard-coded). Validated by `isValidTenantConfiguration`;
            `common.AUTH_MODES` documents the two conventional values
            `otp`/`password`, but the true allow-list is whatever
            `DEFAULT_ALLOWED_AUTH_MODES` is configured to at deploy time.
          required:
            - allowed_auth_mode
            - auto_register
          properties:
            allowed_auth_mode:
              type: array
              items:
                type: string
              description: >-
                Non-empty list of auth modes. Every entry must be a member of
                the environment-configured default allow-list (commonly
                `otp`/`password` - see field description above).
              example:
                - password
            auto_register:
              type: boolean
              example: true
        meta:
          type: object
          description: Free-form metadata object (or a JSON string representing one).
          additionalProperties: true
          example:
            test: '2341'
        domains:
          type: string
          description: >-
            One or more domains for the tenant. Accepted as a single string
            (comma-separated for multiple domains). Must not be empty after
            trimming.
          x-internal-note: >-
            services/tenant.js splits the string on `,` server-side.
          example: shikshalokam-qa.tekdinext.com
    - title: updateTenant
      type: object
      description: >-
        Used when an `id` path parameter is supplied (update branch). Only
        `configuration` is validated in this branch; `name`, `description`,
        `logo`, `theming` and `meta` are accepted but not validated, so if
        supplied they are applied as-is to the tenant record. `code`,
        `domains` and `status` are always stripped from the request body
        server-side even if supplied by the client, so they can never
        actually change tenant identity/domains via this endpoint (use the
        dedicated add/removeDomain endpoints for domains).
      x-internal-note: >-
        Dispatched via controllers/v1/tenant.js#update to
        services/tenant.js#update. Unvalidated fields pass through unchecked
        into a partial-column `UPDATE` (services/tenant.js
        `tenantQueries.update`). Stripping of `code`/`domains`/`status` is
        done by constants/blacklistConfig.js `tenant.update`.
      properties:
        configuration:
          type: object
          description: Same shape/validation as the create-branch `configuration` field.
          required:
            - allowed_auth_mode
            - auto_register
          properties:
            allowed_auth_mode:
              type: array
              items:
                type: string
              example:
                - password
                - otp
            auto_register:
              type: boolean
              example: true
        name:
          type: string
          description: Accepted but unvalidated - see description above.
        description:
          type: string
          description: Accepted but unvalidated - see description above.
        logo:
          type: string
          description: Accepted but unvalidated - see description above.
        theming:
          type: object
          description: Accepted but unvalidated - see description above.
          additionalProperties: true
        meta:
          type: object
          description: Accepted but unvalidated - see description above.
          additionalProperties: true

tenantAddDomainRequest:
  type: object
  description: >-
    Request payload for `POST /user/v1/tenant/addDomain/{id}`. `domains` is
    required and may be a non-empty array of strings or a non-empty string
    (comma-separated for multiple domains).
  required:
    - domains
  properties:
    domains:
      description: One or more domains to add to the tenant.
      oneOf:
        - type: array
          items:
            type: string
          minItems: 1
        - type: string
          minLength: 1
      example:
        - https://test.2.domain.com

tenantRemoveDomainRequest:
  type: object
  description: >-
    Request payload for `POST /user/v1/tenant/removeDomain/{id}`. `domains` is
    required and may be a non-empty array of strings or a non-empty string
    (comma-separated for multiple domains). The request is rejected (see
    `tenantDomainsAtLeastOneMandatory406Response`) if the given domains would
    remove every domain the tenant has.
  x-internal-note: >-
    Enforced in services/tenant.js#removeDomain.
  required:
    - domains
  properties:
    domains:
      description: One or more domains to remove from the tenant.
      oneOf:
        - type: array
          items:
            type: string
          minItems: 1
        - type: string
          minLength: 1
      example:
        - new.domain.scd

tenantBulkUserCreateRequest:
  type: object
  description: >-
    Request payload for `POST /user/v1/tenant/bulkUserCreate`. Both fields are
    required. The organization is resolved from the `organizationcode` /
    `tenantcode` headers (see the path parameters), not from the body.
  required:
    - file_path
    - upload_type
  properties:
    file_path:
      type: string
      description: Path (relative to the configured storage bucket) of the previously-uploaded CSV.
      example: users/1-1761570904451-users/1-1756128403580-27-oct-bulkupload.csv
    upload_type:
      type: string
      description: >-
        Upload mode. Compared case-insensitively against `UPLOAD`/`INVITE`
        (`.toUpperCase()` is applied both client and server side).
      enum:
        - upload
        - invite
      example: upload
    editable_fields:
      type: array
      items:
        type: string
      description: Optional list of user fields that may be edited via the bulk upload.

