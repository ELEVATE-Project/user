tenantCreated202Response:
  description: >-
    Accepted. Tenant (and its default domains, organization, entity
    types/entities, forms, notification templates, org features and user
    roles) created successfully.
  x-internal-note: >-
    services/tenant.js#create, message key TENANT_CREATED_SUCCESSFULLY,
    statusCode 202. Captured example below is a live capture from
    captured-responses.json.
  type: object
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
      example: Tenant created successfully.
    result:
      type: object
      properties:
        name:
          type: string
          example: Replay Test Tenant
        code:
          type: string
          example: tenant3t7o723zj5
        description:
          type: string
          example: created by replay script
        logo:
          type: string
          example: https://example.com/logo.png
        configuration:
          type: object
          properties:
            auto_register:
              type: boolean
              example: true
            allowed_auth_mode:
              type: array
              items:
                type: string
              example:
                - password
        status:
          type: string
          example: ACTIVE
        created_by:
          type: number
          example: 23
        updated_by:
          type: number
          example: 23
        updated_at:
          type: string
          format: date-time
          example: '2026-07-15T10:56:24.538Z'
        created_at:
          type: string
          format: date-time
          example: '2026-07-15T10:56:24.538Z'
        theming:
          type: object
          nullable: true
          example: null
        meta:
          type: object
          nullable: true
          example: null
        deleted_at:
          type: string
          format: date-time
          nullable: true
          example: null
    meta:
      type: object
      properties:
        formsVersion:
          type: array
          items:
            type: object
        correlation:
          type: string
  example:
    responseCode: OK
    message: Tenant created successfully.
    result:
      name: Replay Test Tenant
      code: tenant3t7o723zj5
      description: created by replay script
      logo: https://example.com/logo.png
      configuration:
        auto_register: true
        allowed_auth_mode:
          - password
      status: ACTIVE
      created_by: 23
      updated_by: 23
      updated_at: '2026-07-15T10:56:24.538Z'
      created_at: '2026-07-15T10:56:24.538Z'
      theming: null
      meta: null
