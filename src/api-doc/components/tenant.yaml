      example: OK
    message:
      type: string
      example: TENANT_DOMAINS_ADDED_SUCCESSFULLY
    result:
      type: object
      properties:
        removed_domains:
          type: array
          items:
            type: string
    meta:
      type: object
      properties:
        correlation:
          type: string

