    error:
      type: array
      items:
        type: string
      example: []
    meta:
      type: object
      properties:
        correlation:
          type: string

tenantNotFound406Response:
  description: >-
    Not Acceptable. No tenant matches the given code
    (services/tenant.js#update / #addDomain / #removeDomain / #read, message
