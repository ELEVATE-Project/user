    actual bulk-create work to `orgAdminService.bulkCreate(...)`
    (services/org-admin.js, out of this domain's scope) and returns whatever
    that call returns/throws as-is. Captured example below is a live capture
    from captured-responses.json for a case where `file_path` did not
    resolve to a real uploaded file; the generic `Oops! Something Went Wrong.`
    message and `SERVER_ERROR` responseCode suggest this is the app's generic
    unhandled-error envelope rather than a message authored in
    services/tenant.js or services/org-admin.js specifically - the true
    success-path response shape for `bulkUserCreate` (whatever
    `orgAdminService.bulkCreate` returns on success) is a GAP, since
    services/org-admin.js is out of this domain's read scope. See gaps.jsonl
    (domain=tenant, endpoint=POST /user/v1/tenant/bulkUserCreate,
    statusCode=200, success shape unknown).
  type: object
  properties:
    responseCode:
