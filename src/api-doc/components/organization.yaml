# -----------------------------------------------------------------------------
# NOTE on gaps: several response schemas below are "shape-only" (types only,
# no example values) because src/scripts/api-doc/captured-responses.json has
# no captured example for that status code/message on this endpoint. Per the
# task rules for this pass, no response body is fabricated for those cases -
# see src/scripts/api-doc/gaps.jsonl (domain: organization) for the full list.
# Message keys quoted in descriptions (e.g. ORGANIZATION_ALREADY_EXISTS) are
# the literal i18n keys used by responses.failureResponse/successResponse in
# controllers/v1/organization.js and services/organization.js - they document
# which code path produces the response, not a verified/captured body.
# -----------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Request schemas
# ---------------------------------------------------------------------------
createOrganizationRequest:
  type: object
  description: Request payload for creating an organization.
  required:
    - name
    - code
    - description
    - tenant_code
    - domains
  properties:
    name:
      type: string
      example: MentorEd
      description: The name of the organization.
    code:
      type: string
      example: mentor112
      description: A unique code representing the organization. Only lowercase alphanumeric characters
        are allowed.
    description:
      type: string
      example: testing
      description: A brief description of the organization.
    tenant_code:
      type: string
      example: default
      description: Code of the tenant the organization belongs to.
    domains:
      type: array
      items:
        type: string
      example:
        - example.com
      description: List of email domains associated with the organization.
    registration_codes:
      type: array
      items:
        type: string
      example: []
      description: Optional list of registration codes for the organization.
    admin_email:
      type: string
      example: admin@example.com
      description: 'Optional email of the user to be assigned as the organization admin. Not enforced
        by validators/v1/organization.js (no explicit check) - purely a service-layer optional field.'
updateOrganizationRequest:
  type: object
  description: 'Request payload for updating an organization. The organization ``id`` is supplied as a
    path parameter. All body fields are optional; only the provided fields are updated.'
  properties:
    name:
      type: string
      example: MentorEd
      description: The updated name of the organization.
    description:
      type: string
      example: testing
      description: The updated description of the organization.
    related_orgs:
      type: array
      items:
        type: integer
      example:
        - 2
      description: 'List of related organization IDs. Not enforced by validators/v1/organization.js
        (no explicit check there); gated instead in controllers/v1/organization.js#update by a runtime
        role/ownership comparison: if the caller is an org-admin/tenant-admin updating an organization
        other than their own AND supplies ``related_orgs``, the request is rejected with
        CONTACT_ADMIN_RELATED_ORGANIZATIONS (400). This is a runtime-config/role-dependent rule, not a
        pure body-shape constraint, so it is documented here in prose rather than forced into the schema.'
addRegistrationCodeRequest:
  type: object
  description: 'Request payload for adding registration codes to an organization. The organization
    ``id`` (organization code) is supplied as a path parameter.'
  required:
    - registration_codes
  properties:
    registration_codes:
      type: array
      items:
        type: string
      example:
        - reg123
      description: List of registration codes to add. Must be a non-empty array.
    tenant_code:
      type: string
      example: default
      description: 'Tenant code. Conditionally required: only when the caller is a platform admin
        (ADMIN_ROLE) - see validators/v1/organization.js addRegistrationCode, line 97-99. For org-admins
        the tenant code is derived from the auth token instead. When absent for an admin caller the
        request fails with TENANT_NOT_FOUND (controllers/v1/organization.js#addRegistrationCode).'
removeRegistrationCodeRequest:
  type: object
  description: 'Request payload for removing registration codes from an organization. The organization
    ``id`` is supplied as a path parameter.'
  required:
    - registration_codes
  properties:
    registration_codes:
      type: array
      items:
        type: string
      example:
        - reg123
      description: List of registration codes to remove. Must be a non-empty array.
    tenant_code:
      type: string
      example: default
      description: 'Tenant code. Conditionally required: only when the caller is a platform admin
        (ADMIN_ROLE) - see validators/v1/organization.js removeRegistrationCode, line 123-125. For
        org-admins the tenant code is derived from the auth token instead. When absent for an admin
        caller the request fails with TENANT_NOT_FOUND (controllers/v1/organization.js#removeRegistrationCode).'
addRelatedOrgRequest:
  type: object
  description: 'Request payload for adding related organizations. No entry exists for this operation in
    validators/v1/organization.js (only create, update, requestOrgRole, read, addRegistrationCode,
    removeRegistrationCode are validated) - the field is optional at the HTTP layer and defaults to an
    empty array in controllers/v1/organization.js#addRelatedOrg (``req.body.related_orgs || []``).'
  properties:
    related_orgs:
      type: array
      items:
        type: integer
      example:
        - 2
      description: List of related organization IDs to associate.
removeRelatedOrgRequest:
  type: object
  description: 'Request payload for removing related organizations. No entry exists for this operation
    in validators/v1/organization.js - the field is optional at the HTTP layer and defaults to an empty
    array in controllers/v1/organization.js#removeRelatedOrg (``req.body.related_orgs || []``).'
  properties:
    related_orgs:
      type: array
      items:
        type: integer
      example:
        - 2
      description: List of related organization IDs to remove.
requestOrgRoleRequest:
  type: object
  description: Request payload for requesting a role within an organization.
  required:
    - role
    - form_data
  properties:
    role:
      type: integer
      example: 2
      description: The specific role id being requested.
    form_data:
      type: object
      description: 'Answers to the organization-specific role-request form.'
      properties:
        about:
          type: string
          example: I would like to mentor.
          description: Optional free-text field describing the requester (validators/v1/organization.js
            requestOrgRole).
        experience:
          type: string
          example: '5'
          description: Optional numeric-string field (validated with isNumeric()) describing years of
            experience.
      example:
        about: I would like to mentor.
        experience: '5'

