createUserEntity400Response:
  type: object
  description: >-
    Bad Request. Returned when the entity could not be created because it
    already exists, or because the referenced entity type does not exist.
  x-internal-note: >-
    GAP - not captured. The code (services/entities.js `create`) can return
    400 with message ENTITY_ALREADY_EXISTS (sequelize UniqueConstraintError)
    or 400 with message ENTITY_TYPE_NOT_FOUND (sequelize
    ForeignKeyConstraintError), but scripts/api-doc/captured-responses.json
    has no example for either. This schema documents shape only (inferred
    from the same failureResponse() envelope used elsewhere in this domain,
    e.g. updateUserEntity400Response) - values below are illustrative
    placeholders, NOT a captured body. See gaps.jsonl (domain=entity,
    endpoint=POST /user/v1/entity/create).
  properties:
    responseCode:
      type: string
    error:
      type: array
      items:
        type: string
    message:
      type: string
      description: Either "Entity already exists" or "Entity type not found",
        depending on which constraint was violated.

updateUserEntityRequest:
  type: object
  description: All fields optional; provide only the fields to change.
  x-internal-note: Validated in validators/v1/entity.js `update`.
  properties:
    value:
      type: string
      description: Must contain letters only, no spaces.
      example: en
    label:
      type: string
      description: Alphanumeric with spaces allowed.
      example: English
    status:
      type: string
      description: Must be uppercase with no spaces when provided.
      example: ACTIVE
    type:
      type: string
      description: Entity type classification (uppercase, no spaces).
      example: SYSTEM
    entity_type_id:
      type: number
      description: The ID of the entity type.
      example: 1

