# -----------------------------------------------------------------------------
# Entity domain components.
# Every *Response schema below with a concrete `example` block is copied
# verbatim from scripts/api-doc/captured-responses.json.
# A few schemas (createUserEntity400Response, readUserEntity200Response,
# deleteUserEntity400Response) exist only because openapi.yaml's shared
# components.schemas registry already referenced them - they are kept as
# shape-only schemas (no `example`) with a "GAP - NOT captured" description,
# since no captured body exists for that status/message. Do not treat their
# property names/values as verified; they are placeholders inferred from
# sibling responses in this same file. Every such gap is also recorded in
# scripts/api-doc/gaps.jsonl.
# -----------------------------------------------------------------------------

createUserEntityRequest:
  type: object
  required:
    - value
    - label
    - type
    - entity_type_id
  properties:
    value:
      type: string
      description: Must contain letters only, no spaces.
      x-internal-note: Validated in validators/v1/entity.js.
      example: AP
    label:
      type: string
      description: Alphanumeric with spaces allowed.
      x-internal-note: Validated in validators/v1/entity.js.
      example: Andhra Pradesh
    type:
      type: string
      description: Entity type classification. Must be uppercase with no spaces (e.g. SYSTEM).
      example: SYSTEM
    entity_type_id:
      type: integer
      example: 4
    status:
      type: string
      description: Optional status of the entity. Must be uppercase with no spaces when provided.
      example: ACTIVE

createUserEntity201Response:
  type: object
  description: Entity created successfully.
  x-internal-note: >-
    Verbatim capture, 201, happy path. The code also emits 400
    ENTITY_ALREADY_EXISTS (UniqueConstraintError) and 400
    ENTITY_TYPE_NOT_FOUND (ForeignKeyConstraintError) from
    services/entities.js `create` - neither has a captured example, see
    gaps.jsonl.
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
      example: Entity created successfully
    result:
      type: object
      properties:
        id:
          type: number
          example: 789
        value:
          type: string
          example: testval
        label:
          type: string
          example: Test Value
        status:
          type: string
          example: ACTIVE
        type:
          type: string
          example: SYSTEM
        entity_type_id:
          type: number
          example: 26
        created_by:
          type: number
          example: 23
        updated_by:
          type: number
          example: 23
        tenant_code:
          type: string
          example: default
        organization_code:
          type: string
          example: default_code
        updated_at:
          type: string
          example: '2026-07-15T10:56:24.039Z'
        created_at:
          type: string
          example: '2026-07-15T10:56:24.039Z'
        deleted_at:
          type: string
          nullable: true
          example: null
    meta:
      type: object
      properties:
        formsVersion:
          type: array
          items:
            type: object
            properties:
              id:
                type: number
              type:
                type: string
              version:
                type: number
        correlation:
          type: string
          example: 243b2c16-47ba-477a-9521-ef6b337c9dfe
  example:
    responseCode: OK
    message: Entity created successfully
    result:
      status: ACTIVE
      id: 789
      value: testval
      label: Test Value
      type: SYSTEM
      entity_type_id: 26
      created_by: 23
      updated_by: 23
      tenant_code: default
      organization_code: default_code
      updated_at: '2026-07-15T10:56:24.039Z'
      created_at: '2026-07-15T10:56:24.039Z'
      deleted_at: null
    meta:
      formsVersion:
        - id: 1
          type: formsrggjf
          version: 0
        - id: 2
          type: formsrggjf
          version: 0
      correlation: 243b2c16-47ba-477a-9521-ef6b337c9dfe

