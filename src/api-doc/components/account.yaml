# Account domain components.
# Request field required/optional flags are taken verbatim from
# scripts/api-doc/validator-fields.json (account.operations.*).
# Cross-field rules (anyOf) come from scripts/api-doc/cross-field-rules.json
# findings scoped to services/account.js.
# Response `example` blocks are copied verbatim from
# scripts/api-doc/captured-responses.json (live server capture) — never inferred.

# ---------------------------------------------------------------------------
# Request schemas
# ---------------------------------------------------------------------------

createUserRequest:
  type: object
  description: >-
    Request payload for creating a user account.

    Per the validator, every field is technically optional at the
    express-validator layer, but two cross-field business rules apply
    (enforced in services/account.js):

    1. At least one of `email` or `phone` MUST be provided (anyOf below).
       If neither is present the request is rejected.

    2. If `phone` is provided, `phone_code` becomes required.

    Additionally, at runtime the service gates `password`/`otp` against the
    tenant's `configuration.allowed_auth_mode`: if PASSWORD auth mode is
    allowed a password is required (`PASSWORD_REQUIRED`), and if a password is
    supplied while PASSWORD mode is not allowed the request is rejected
    (`AUTH_MODE_NOT_ALLOWED`). This is tenant-config-dependent and cannot be
    expressed in the schema itself.
  properties:
    name:
      type: string
      description: Name of the user. Alphabets and spaces only.
      example: Nevil Mathew
    email:
      type: string
      format: email
      description: User email. Required if `phone` is not provided.
      example: mentee@tunerlabs.com
    username:
      type: string
      description: Username (3-40 chars, lowercase letters/numbers/_/- or an email).
      example: mentee_3t7m88mvl5
    phone:
      type: string
      description: Phone number (7-15 digits). Required if `email` is not provided.
      example: '9876543210'
    phone_code:
      type: string
      description: Country calling code (2-4 chars). Required when `phone` is provided.
      example: '+91'
    password:
      type: string
      description: User password. Must satisfy the configured password policy; may be required depending on tenant allowed_auth_mode.
      example: Password@123
    otp:
      type: string
      description: 6-digit OTP. Required only when ENABLE_EMAIL_OTP_VERIFICATION is enabled for the tenant.
      example: '123456'
    role:
      type: string
      description: >-
        Role for the user. Conditionally validated: only checked when present,
        and must not be the admin role.
      example: mentee
    registration_code:
      type: string
      description: Optional organization registration code used to attach the user to an org.
      example: org-signup-code
  anyOf:
    - required:
        - email
    - required:
        - phone

loginRequest:
  type: object
  description: >-
    Request payload for user login.

    `identifier` (email, phone, or username) and `phone_code` are required
    (phone_code is only meaningfully enforced when the identifier is a phone
    number). At least ONE of `password` or `otp` must be provided — this is
    real business logic in services/account.js (login, line 761:
    `if (!hasOtp && !hasPassword) return AUTH_CREDENTIAL_REQUIRED`).

    NOTE: which of password/otp is actually accepted is additionally gated at
    runtime by the tenant's `configuration.allowed_auth_mode`
    (AUTH_MODES.PASSWORD / AUTH_MODES.OTP). If a credential is supplied whose
    auth mode is not allowed for the tenant, the service responds
    `AUTH_MODE_NOT_ALLOWED`. That tenant-config-dependent gating is intentionally
    NOT modelled in the schema (it depends on runtime tenant configuration, not
    on the request body alone).
  required:
    - identifier
    - phone_code
  properties:
    identifier:
      type: string
      description: Email, phone number, or username of the user.
      example: mentee@tunerlabs.com
    phone_code:
      type: string
      description: Country calling code (e.g. +91). Required/validated only for phone identifiers.
      example: '+91'
    password:
      type: string
      description: User password. Provide this OR `otp`.
      example: Password@123
    otp:
      type: string
      description: 6-digit login OTP. Provide this OR `password`.
      example: '123456'
  anyOf:
    - required:
        - password
    - required:
        - otp

logoutRequest:
  type: object
  description: Request payload for logging out. Requires a valid refresh_token.
  required:
    - refresh_token
  properties:
    refresh_token:
      type: string
      description: The refresh token issued at login.
      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

generateTokenRequest:
  type: object
  description: Request payload for generating a new access token from a refresh token.
  required:
    - refresh_token
  properties:
    refresh_token:
      type: string
      description: The refresh token issued at login.
      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

generateOtpRequest:
  type: object
  description: Request payload for generating an OTP (used for password reset flows). Both fields required.
  required:
    - identifier
    - password
  properties:
    identifier:
      type: string
      description: Email, phone, or username of the account.
      example: mentee@tunerlabs.com
    password:
      type: string
      description: User password.
      example: Password@123

registrationOtpRequest:
  type: object
  description: >-
    Request payload for the registration OTP. `registration_code` is required.
    At least ONE of `email`, `phone`, or `username` must be provided
    (cross-field rule in services/account.js registrationOtp, line 1291;
    validator message: "At least one of email, phone, or username must be
    provided"). If `phone` is provided, `phone_code` is required.
  required:
    - registration_code
  properties:
    email:
      type: string
      format: email
      description: User email.
      example: mentee@tunerlabs.com
    phone:
      type: string
      description: Phone number (7-15 digits).
      example: '9876543210'
    username:
      type: string
      description: Username (3-30 chars).
      example: mentee_new
    phone_code:
      type: string
      description: Country calling code (e.g. +91). Required when `phone` is provided.
      example: '+91'
    name:
      type: string
      description: Name of the user.
      example: Nevil Mathew
    registration_code:
      type: string
      description: Organization registration code.
      example: org-signup-code
  anyOf:
    - required:
        - email
    - required:
        - phone
    - required:
        - username

resetPasswordRequest:
  type: object
  description: Request payload for resetting a password. All three fields are required.
  required:
    - identifier
    - password
    - otp
  properties:
    identifier:
      type: string
      description: Email, phone, or username of the account.
      example: mentee@tunerlabs.com
    password:
      type: string
      description: New password. Must satisfy the configured password policy.
      example: NewPassword@123
    otp:
      type: string
      description: 6-digit OTP received for the reset.
      example: '123456'

deleteRequest:
  type: object
  description: Request payload for self-deleting the authenticated account. Password confirmation required.
  required:
    - password
  properties:
    password:
      type: string
      description: The account password, for confirmation.
      example: Password@123

changeRoleRequest:
  type: object
  description: Request payload to change a user's role. Both fields required.
  required:
    - email
    - role
  properties:
    email:
      type: string
      format: email
      description: Email of the user whose role should change.
      example: mentee@tunerlabs.com
    role:
      type: string
      description: The new role.
      example: mentor

changePasswordRequest:
  type: object
  description: Request payload to change the authenticated user's password. Both fields required.
  required:
    - oldPassword
    - newPassword
  properties:
    oldPassword:
      type: string
      description: Current password.
      example: Password@123
    newPassword:
      type: string
      description: New password. Must satisfy the configured password policy and differ from the old one.
      example: NewPassword@123

validatingEmailIdsRequest:
  type: object
  description: Request payload to validate a list of email IDs. `emailIds` must be a non-empty array of valid email strings.
  required:
    - emailIds
  properties:
    emailIds:
      type: array
      description: Non-empty array of email addresses.
      items:
        type: string
        format: email
      example:
        - user1@example.com
        - user2@example.com

searchRequest:
  type: object
  description: >-
    Request body for the search endpoint. Per validator-fields, `user_ids` and
    `excluded_user_ids` (both integer arrays) are required in the body, while
    `tenant_code`, `type`, and `organization_id` are required query parameters
    (see the path definition).
  required:
    - user_ids
    - excluded_user_ids
  properties:
    user_ids:
      type: array
      description: User IDs to include in the search.
      items:
        type: integer
      example: [22, 23]
    excluded_user_ids:
      type: array
      description: User IDs to exclude from the search.
      items:
        type: integer
      example: [24]

validateUserSessionRequest:
  type: object
  description: Request payload to validate a user session. `token` carried in the body.
  properties:
    token:
      type: string
      description: The session token to validate.
      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

# ---------------------------------------------------------------------------
# Generic error response shapes (bodies supplied as named examples in paths)
# ---------------------------------------------------------------------------

clientErrorResponse:
  type: object
  description: Client error (responseCode CLIENT_ERROR). Concrete message varies by case.
  properties:
    responseCode:
      type: string
      example: CLIENT_ERROR
    error:
      type: array
      items:
        type: object
    meta:
      type: object
      properties:
        correlation:
          type: string
    message:
      type: string

validationErrorResponse:
  type: object
  description: express-validator validation failure (HTTP 422).
  properties:
    responseCode:
      type: string
      example: CLIENT_ERROR
    error:
      type: array
      items:
        type: object
        properties:
          location:
            type: string
          param:
            type: string
          msg:
            type: string
    meta:
      type: object
      properties:
        correlation:
          type: string
    message:
      type: string
      example: Validation failed, Entered data is incorrect!

unauthorizedResponse:
  type: object
  description: Unauthorized (missing/invalid token). responseCode UNAUTHORIZED.
  properties:
    responseCode:
      type: string
      example: UNAUTHORIZED
    error:
      type: array
      items:
        type: object
    meta:
      type: object
      properties:
        correlation:
          type: string
    message:
      type: string
      example: Unauthorized request

serverErrorResponse:
  type: object
  description: Server error. responseCode SERVER_ERROR.
  properties:
    responseCode:
      type: string
      example: SERVER_ERROR
    message:
      type: string
      example: Oops! Something Went Wrong.
    meta:
      type: object
      properties:
        correlation:
          type: string

