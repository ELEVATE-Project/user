# =============================================================================
# Admin domain - reusable schemas
#
# Field required/optional flags follow scripts/api-doc/validator-fields.json
# (admin key) exactly. Cross-field constraints from
# scripts/api-doc/cross-field-rules.json (controllers/v1/admin.js and
# services/admin.js) are modelled as oneOf/anyOf with named examples.
# Every *Response* example below is copied VERBATIM from
# scripts/api-doc/captured-responses.json (admin endpoints). JWT strings are
# truncated with a <snip-verbatim-jwt> marker; nothing else is altered or
# fabricated. Status codes the code can emit but for which no captured example
# exists are NOT invented here - they are recorded in gaps.jsonl instead.
# =============================================================================

# -----------------------------------------------------------------------------
# create  (POST /user/v1/admin/create)  -- validators/v1/admin.js#create
# -----------------------------------------------------------------------------
createSystemUserRequest:
  type: object
  description: >-
    Creates a new admin/system user. `secret_code`, `name` and `password` are
    always required. At least one of `email` or `phone` must also be
    provided, and `phone_code` is required whenever `phone` is present.
  x-internal-note: >-
    Cross-field rule enforced in validators/v1/admin.js:64.
  required:
    - secret_code
    - name
    - password
  anyOf:
    - required: [email]
    - required: [phone, phone_code]
  properties:
    secret_code:
      type: string
      description: Secret code for admin creation (must equal ADMIN_SECRET_CODE).
      example: secret_code
    name:
      type: string
      description: Name of the system user (letters and spaces only).
      example: System Admin
    email:
      type: string
      format: email
      description: Email of the system user. At least one of email or phone is required.
      example: systemuser@mail.com
    username:
      type: string
      description: Optional username (3-40 chars, or an email). Generated if omitted.
      example: systemadmin
    phone:
      type: string
      description: Phone number (7-15 digits). Requires phone_code when provided.
      example: '9995554443'
    phone_code:
      type: string
      description: Country calling code, required when phone is provided.
      example: '+91'
    password:
      type: string
      format: password
      description: Password for the system user (must satisfy PASSWORD_POLICY_REGEX, no spaces).
      example: StrongPass123!
  example:
    secret_code: secret_code
    name: System Admin
    email: systemuser@mail.com
    password: StrongPass123!

createSystemUserRequestExamples:
  emailOnly:
    summary: Create with email (email satisfies the at-least-one-of rule)
    value:
      secret_code: secret_code
      name: System Admin
      email: systemuser@mail.com
      password: StrongPass123!
  phoneWithCode:
    summary: Create with phone (phone requires phone_code)
    value:
      secret_code: secret_code
      name: System Admin
      phone: '9995554443'
      phone_code: '+91'
      password: StrongPass123!

