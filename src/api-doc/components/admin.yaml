# -----------------------------------------------------------------------------
# login  (POST /user/v1/admin/login)  -- validators/v1/admin.js#login
# -----------------------------------------------------------------------------
loginSystemUserRequest:
  type: object
  description: >-
    Request payload for admin login. `identifier` and `password` are
    required; `phone_code` is required only when `identifier` is a phone
    number.
  x-internal-note: >-
    Per validator-fields.json all three of `identifier`, `phone_code` and
    `password` are marked required; however in code
    (validators/v1/admin.js:102) `phone_code` is only enforced when the
    `identifier` is a phone number. The service layer (services/admin.js:437)
    also accepts `email` as a fallback for `identifier` (at-least-one-of
    identifier/email), but note that filterRequestBody strips any field
    outside the admin.login allow-list, so in practice only `identifier` is
    honoured.
  required:
    - identifier
    - password
  properties:
    identifier:
      type: string
      description: The admin's email, phone number, or username.
      example: admin@example.com
    phone_code:
      type: string
      description: >-
        Country calling code. Required only when `identifier` is a phone
        number.
      x-internal-note: Conditionally enforced in validators/v1/admin.js:102.
      example: '+91'
    password:
      type: string
      format: password
      description: The admin's password.
      example: StrongPass123!
  example:
    identifier: admin@example.com
    password: StrongPass123!

