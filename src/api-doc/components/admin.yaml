# -----------------------------------------------------------------------------
# addOrgAdmin  (POST /user/v1/admin/addOrgAdmin)  -- validators/v1/admin.js#addOrgAdmin
# -----------------------------------------------------------------------------
addOrgAdminRequest:
  type: object
  description: >-
    Assigns a user as an organization admin. `organization_id` is required,
    and exactly one of `identifier` or `user_id` must be provided (not
    both). When `identifier` resolves to a phone number, `phone_code` is
    also required.
  x-internal-note: >-
    Cross-field rule enforced in validators/v1/admin.js:124 (exactly one of
    identifier/user_id). The phone_code requirement is enforced at runtime
    in services/admin.js:601 rather than expressed structurally.
  required:
    - organization_id
  oneOf:
    - required: [identifier]
      title: By identifier
    - required: [user_id]
      title: By user_id
  properties:
    organization_id:
      type: integer
      description: The organization to which the user will be assigned as org admin.
      example: 55
    identifier:
      type: string
      description: The user's email, phone, or username (mutually exclusive with user_id).
      example: orgadmin@example.com
    user_id:
      type: integer
      description: The user's ID (mutually exclusive with identifier).
      example: 12
    phone_code:
      type: string
      description: Country calling code, required when identifier is a phone number.
      example: '+91'
  example:
    organization_id: 55
    user_id: 12

addOrgAdminRequestExamples:
  byUserId:
    summary: Assign by user_id
    value:
      organization_id: 55
      user_id: 12
  byIdentifierEmail:
    summary: Assign by email identifier
    value:
      organization_id: 55
      identifier: orgadmin@example.com
  byIdentifierPhone:
    summary: Assign by phone identifier (phone_code required)
    value:
      organization_id: 55
      identifier: '9995554443'
      phone_code: '+91'

