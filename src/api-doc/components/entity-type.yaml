createEntityTypeRequest:
  type: object
  description: Request payload for creating a new entity type.
  required:
    - value
    - label
    - data_type
    - model_names
  properties:
    value:
      type: string
      description: Unique identifier for the entity type. Must not contain spaces.
      example: ln
    label:
      type: string
      description: Descriptive label for the entity type.
      example: Languages
    data_type:
      type: string
      description: Data type of the entity type value (e.g. STRING, ARRAY[STRING]).
      example: STRING
    model_names:
      type: array
      description: One or more model names this entity type applies to. Must be a non-empty array.
      items:
        type: string
      example:
        - User
    allow_filtering:
      type: boolean
      description: >-
        Not allowed on create. The validator requires this field to be empty
        (`isEmpty()`) if present, so in practice it must be omitted entirely -
        sending any truthy value fails validation.
      example: true
updateEntityTypeRequest:
  type: object
  description: Request payload for updating an entity type.
  required:
    - data_type
    - model_names
  properties:
    value:
      type: string
      description: Unique identifier for the entity type. Optional on update.
      example: ln
    label:
      type: string
      description: Descriptive label for the entity type. Optional on update.
      example: Languages
    status:
      type: string
      description: Status of the entity type. Optional on update.
      example: ACTIVE
    data_type:
      type: string
      description: Data type of the entity type value.
      example: STRING
    model_names:
      type: array
      description: >-
        One or more model names this entity type applies to. Must be a
        non-empty array, and each item must be one of the values in the
        `isIn(['User'])` allow-list enforced by
        validators/v1/entity-type.js (update). CORRECTION: an earlier pass
        on this file claimed this validator chain was broken (`isIn` called
        as a bare, unchained identifier) - re-checked against the current
        source and the chain is intact (`req.checkBody('model_names.*').isIn(['User'])...`),
        so this is a normal validation rule, not a runtime bug.
      items:
        type: string
      example:
        - User
