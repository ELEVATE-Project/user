  type: object
  description: >-
    A role record as returned by the list, create, and update operations.
    Fields present may vary by endpoint - see the examples on each operation
    for details.
  x-internal-note: >-
    This is the union of fields observed in captured-responses.json plus
    fields documented in code comments.
  properties:
    id:
      type: number
      example: 1
    title:
      type: string
      example: session_manager
    user_type:
      type: number
      description: Returned as a number by the API, even though it must be submitted as the string '0' or '1'.
      example: 0
    visibility:
      type: string
      enum: [PUBLIC]
      example: PUBLIC
    label:
      type: string
      nullable: true
      example: Session Manager
    status:
      type: string
      example: ACTIVE
    organization_id:
      type: number
      example: 1
    tenant_code:
      type: string
      example: default
    translations:
      type: object
      nullable: true
      description: >-
        Free-form translations object keyed by language code.
      x-internal-note: >-
        Shape-only: no captured response shows a populated value (only `null`
        has been observed), so no example sub-structure is asserted here.

UserRoleCreateRequest:
  type: object
  description: >-
    organization_id and tenant_code are not accepted as request fields, even
    if sent. They are always derived from the authenticated user's session,
    and any organization_id or id included in the request body is ignored.
  required:
    - title
    - user_type
    - visibility
    - label
  properties:
    title:
      type: string
      pattern: ^[a-z_]+$
      description: Lowercase letters and underscores only.
      example: head_master
    user_type:
      type: string
      enum: ['0', '1']
      description: "'0' = non-admin, '1' = admin. Must be sent as a string; the API stores/returns it as a number."
      example: '1'
    visibility:
      type: string
      enum: [PUBLIC]
      example: PUBLIC
    label:
      type: string
      pattern: ^[A-Z][a-zA-Z\s]*$
      maxLength: 50
      description: Must start with an uppercase letter; letters and spaces only; max 50 characters.
      example: Head Master
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
      description: >-
        Optional. Must be one of ACTIVE or INACTIVE.
      x-internal-note: >-
        'ACTIVE' is confirmed by a captured response; 'INACTIVE' is inferred
        from codebase convention and not directly confirmed in this domain pass.
      example: ACTIVE
    translations:
      type: object
      nullable: true
      description: Optional. Free-form translations object.
      x-internal-note: Unvalidated by the validator; shape not confirmed.

UserRoleUpdateRequest:
  type: object
  description: >-
    Same field rules as create, except title/user_type/visibility remain required while
    status/label become optional. id/organization_id sent in the body are stripped
    server-side; the role to update is identified solely by the `id` path parameter.
  required:
    - title
    - user_type
    - visibility
  properties:
    title:
      type: string
      pattern: ^[a-z_]+$
      example: head_master
    user_type:
      type: string
      enum: ['0', '1']
      example: '1'
    visibility:
      type: string
      enum: [PUBLIC]
      example: PUBLIC
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
      example: ACTIVE
    label:
      type: string
      pattern: ^[A-Z][a-zA-Z\s]*$
      maxLength: 50
      example: Head Master
    translations:
      type: object
      nullable: true
      description: Optional. Free-form translations object.
      x-internal-note: Unvalidated by the validator; shape not confirmed.

