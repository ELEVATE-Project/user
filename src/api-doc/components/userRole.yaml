# Components for the userRole domain.
#
# Ground truth sources used:
#   - validators/v1/user-role.js            (required/optional + format rules)
#   - controllers/v1/user-role.js           (fields passed through, JSDoc)
#   - services/user-role.js                 (responses.successResponse / failureResponse call sites)
#   - scripts/api-doc/captured-responses.json (only trustworthy source for response bodies)
#
# NOTE on organization_id / tenant_code / id (create & update bodies):
#   src/constants/blacklistConfig.js -> userRole.create / userRole.update strip
#   'id' and 'organization_id' out of the incoming body (filterRequestBody), and
#   tenant_code/organization_id are always derived server-side from req.decodedToken.
#   They must NOT be documented as accepted request fields, even though the previous
#   draft included an `id` property on the create request body.
#
# NOTE on `meta`/`translations` in the previous draft:
#   - `translations` IS referenced by controller JSDoc and appears in service responses
#     (create result includes `translations: null` in the captured example), so it is kept
#     here as a free-form object. Its per-language shape (hi/kn/te/bn/... sub-objects) in the
#     old draft is NOT confirmed by the validator (no validation is applied to it at all) or by
#     any captured response body showing populated translations, so that invented shape has
#     been removed in favor of a shape-only `type: object` — see gaps.jsonl.
#   - `meta.entityTypes` had no support in the validator, controller JSDoc, or captured
#     responses, and this domain pass is not permitted to read model files to confirm it.
#     It has been removed as unverified/likely fabricated — see gaps.jsonl.

