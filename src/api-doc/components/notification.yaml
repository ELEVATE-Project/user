createNotificationRequest:
  type: object
  description: Notification template create / update request body.
  required:
    - type
    - code
    - subject
    - body
  properties:
    type:
      type: string
      description: Type of the notification template.
      enum:
        - sms
        - email
        - emailHeader
        - emailFooter
      example: email
    code:
      type: string
      description: Unique code for the notification template (unique per organization + tenant).
      example: tl-email-invite
    subject:
      type: string
      description: Subject of the email.
      example: Hi Welcome Back
    body:
      type: string
      description: Body of the notification template.
      example: <p>Dear User,</p> Welcome back to mentorEd
    email_header:
      type: string
      description: Email header content (code of an emailHeader template).
      example: email_header
    email_footer:
      type: string
      description: Email footer content (code of an emailFooter template).
      example: email_footer

notificationTemplate:
  type: object
  description: A single notification template record.
  properties:
    id:
      type: number
      example: 126
    type:
      type: string
      example: email
    code:
      type: string
      example: tmpl_3t7oyoi82g
    subject:
      type: string
      nullable: true
      example: Replay Test Subject
    body:
      type: string
      example: <p>Replay test body</p>
    status:
      type: string
      example: ACTIVE
    email_header:
      type: string
      nullable: true
      example: null
    email_footer:
      type: string
      nullable: true
      example: null
    organization_code:
      type: string
      example: default_code
    tenant_code:
      type: string
      example: default
    created_by:
      type: string
      nullable: true
      example: '23'
    updated_by:
      type: string
      nullable: true
      example: null
    created_at:
      type: string
      format: date-time
      example: '2026-07-15T10:56:26.206Z'
    updated_at:
      type: string
      format: date-time
      example: '2026-07-15T10:56:26.206Z'
    deleted_at:
      type: string
      format: date-time
      nullable: true
      example: null

notificationMeta:
  type: object
  description: Response metadata attached by the framework.
  properties:
    formsVersion:
      type: array
      items:
        type: object
        properties:
          id:
            type: number
          type:
            type: string
          version:
            type: number
    correlation:
      type: string
      example: 42111943-7221-49cb-81fe-c0afcc974180

# 201 - template created (POST /user/v1/notification/template)
createNotification201Response:
  type: object
  description: Notification template created successfully.
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
      example: Notification template created successfully
    result:
      $ref: '#/notificationTemplate'
    meta:
      $ref: '#/notificationMeta'
  example:
    responseCode: OK
    message: Notification template created successfully
    result:
      status: ACTIVE
      id: 126
      type: email
      code: tmpl_3t7oyoi82g
      subject: Replay Test Subject
      body: <p>Replay test body</p>
      organization_code: default_code
      tenant_code: default
      created_by: '23'
      updated_at: '2026-07-15T10:56:26.206Z'
      created_at: '2026-07-15T10:56:26.206Z'
      email_header: null
      email_footer: null
      updated_by: null
      deleted_at: null
    meta:
      formsVersion:
        - { id: 1, type: formsrggjf, version: 0 }
        - { id: 2, type: formsrggjf, version: 0 }
        - { id: 3, type: formcsfgof, version: 0 }
      correlation: 42111943-7221-49cb-81fe-c0afcc974180

# 200 - list all templates (GET /user/v1/notification/template)
listNotification200Response:
  type: object
  description: Notification templates fetched successfully.
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
      example: Notification template fetched successfully
    result:
      type: array
      items:
        $ref: '#/notificationTemplate'
    meta:
      $ref: '#/notificationMeta'
  example:
    responseCode: OK
    message: Notification template fetched successfully
    result:
      - id: 1
        type: email
        code: generic_invite
        subject: Welcome Aboard as a {roles}
