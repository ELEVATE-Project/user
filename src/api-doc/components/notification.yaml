  description: Unhandled server error.
  properties:
    responseCode:
      type: string
      example: SERVER_ERROR
    message:
      type: string
      example: Oops! Something Went Wrong.
    meta:
      type: object
      properties:
        correlation:
          type: string
          example: 12923198-0cb9-4137-8a25-5f8db4e45fa3
  example:
    responseCode: SERVER_ERROR
    message: Oops! Something Went Wrong.
    meta:
      correlation: 12923198-0cb9-4137-8a25-5f8db4e45fa3

