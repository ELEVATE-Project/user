    meta:
      formsVersion:
        - { id: 1, type: formsrggjf, version: 0 }
      correlation: b269ca14-dcd6-4add-89b5-8bd6c669e0aa

# 202 - template updated (PATCH /user/v1/notification/template/{id})
updateNotification202Response:
  type: object
  description: Notification template updated successfully. `result` is returned as an empty array.
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
      example: Notification template updated successfully
    result:
      type: array
      items: {}
      example: []
    meta:
      $ref: '#/notificationMeta'
  example:
    responseCode: OK
    message: Notification template updated successfully
    result: []
    meta:
      formsVersion:
        - { id: 1, type: formsrggjf, version: 0 }
      correlation: 4e7107a0-90bb-41b0-8cad-1384165a1d6d

# 400 - template not found (GET /user/v1/notification/template/{id}, PATCH update)
notFound400Response:
  type: object
  description: Notification template not found.
  properties:
    responseCode:
      type: string
      example: CLIENT_ERROR
    error:
      type: array
      items: {}
      example: []
    message:
      type: string
      example: Notification template not found
    meta:
      type: object
      properties:
        correlation:
          type: string
          example: d04c2435-f127-46bc-a795-f970b45e63ca
  example:
    responseCode: CLIENT_ERROR
    error: []
    meta:
      correlation: d04c2435-f127-46bc-a795-f970b45e63ca
    message: Notification template not found

# 500 - server error (e.g. DB error / missing required field surfaced as SERVER_ERROR)
serverError500Response:
