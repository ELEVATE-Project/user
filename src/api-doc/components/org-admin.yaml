# ---------------------------------------------------------------------------
# deactivateUser (org-admin bulk variant: POST body { ids[], emails[] },
# NOT the /admin/deactivateUser/{id} single-user variant from another
# domain -- see paths file note.)
# ---------------------------------------------------------------------------
deactivateUserRequest:
  type: object
  description: >-
    Deactivate one or more users in the org admin's organization. Provide at
    least one non-empty `emails` array OR one non-empty `ids` array (at-least-one-of).
    Both may be supplied together; if both are absent/empty the request fails.
  properties:
    ids:
      type: array
      description: Array of user IDs to deactivate.
      items:
        type: integer
        example: 12
    emails:
      type: array
      description: Array of user email addresses to deactivate.
      items:
        type: string
        format: email
        example: user@example.com
  anyOf:
    - required:
        - ids
    - required:
        - emails
deactivateUser200Response:
  type: object
  description: >-
    GAP: no captured example for the 200 success case (message key
    USER_DEACTIVATED); shape-only.
  properties:
    responseCode:
      type: string
    message:
      type: string
    result:
      type: object
      properties:
        updated_by_ids:
          type: array
          items:
            type: integer
        updated_by_emails:
          type: array
          items:
            type: integer
    meta:
      type: object
deactivateUser400Response:
  type: object
  description: >-
    GAP: no captured example. Message key STATUS_UPDATE_FAILED, returned
    when neither the ids-branch nor the emails-branch updated any rows
    (e.g. ids/emails reference no existing users). Shape-only.
  properties:
    responseCode:
      type: string
    error:
      type: array
      items: {}
    message:
      type: string
    meta:
      type: object
deactivateUser422Response:
  type: object
  description: >-
    Real captured example. Produced by the express-validator custom check
    in validators/v1/org-admin.js (deactivateUser) when both `ids` and
    `emails` are absent/empty -- this is the request-shape validation
    failure, distinct from the 400 STATUS_UPDATE_FAILED business-logic
    failure above.
  properties:
    responseCode:
      type: string
      example: CLIENT_ERROR
    error:
      type: array
      items:
        type: object
      example: []
    meta:
      type: object
    message:
      type: string
      example: Provide at least one non-empty "emails" or "ids" array.

