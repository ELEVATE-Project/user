updateRequestStatusRequest:
  type: object
  description: Update the status of an organization role-change request.
  required:
    - request_id
    - status
  properties:
    request_id:
      type: integer
      example: 12
    status:
      type: string
      description: >-
        No enum/isIn validator constrains this field in
        validators/v1/org-admin.js -- only notEmpty(). Values actually acted
        on by services/org-admin.js are common.ACCEPTED_STATUS ("APPROVED")
        and common.REJECTED_STATUS ("REJECTED"); any other non-empty string
        passes validation but takes the "else" (ORG_ROLE_REQ_UPDATED, no
        email) branch.
      example: APPROVED
    comments:
      type: string
      description: >-
        Optional; not required by the validator. Stored as-is on the
        request record.
updateRequestStatus200Response:
  type: object
  description: >-
    GAP: no captured example for the 200 success case (message key is
    either ORG_ROLE_REQ_APPROVED or ORG_ROLE_REQ_UPDATED depending on
