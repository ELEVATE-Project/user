# NOTE on gaps: several response schemas below are "shape-only" (types only,
# no example values) because src/scripts/api-doc/captured-responses.json has
# no captured example for that status code/message on this endpoint. Per the
# task rules for this pass, no response body is fabricated for those cases —
# see src/scripts/api-doc/gaps.jsonl (domain: org-admin) for the full list.
# Where the literal message text is quoted in a schema description below, it
# is copied verbatim from src/locales/en.json (the actual i18n string the
# code will emit for that message key) purely as documentation of the key;
# it is NOT presented as a captured/verified example body.

# ---------------------------------------------------------------------------
# Shared: authorization failure, common to every org-admin endpoint that
# performs the ORG_ADMIN_ROLE / TENANT_ADMIN_ROLE check (all except
# updateUser and createUsers, see paths file notes). No captured example
# exists anywhere in captured-responses.json for this message. GAP.
# ---------------------------------------------------------------------------
orgAdminNotAdminResponse:
  type: object
  description: >-
    Returned when the caller's roles do not include org_admin or tenant_admin.
  x-internal-note: >-
    utilsHelper.validateRoleAccess check in controllers/v1/org-admin.js.
    Message key: USER_IS_NOT_A_ADMIN. No captured example for this
    status/message on any org-admin endpoint; shape-only.
  properties:
    responseCode:
      type: string
    error:
      type: array
      items:
        type: object
    meta:
      type: object
    message:
      type: string
      enum:
        - USER_IS_NOT_A_ADMIN
  required:
    - message

