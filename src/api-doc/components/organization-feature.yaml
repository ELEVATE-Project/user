createOrganizationFeatureRequest:
  type: object
  description: >-
    Request payload for creating an organization feature. `feature_code`,
    `feature_name` and `display_order` are mandatory. When the caller is not an
    admin and belongs to a non-default organization, the supplied
    `display_order` is overridden by the value inherited from the default
    organization's copy of the feature. Server-managed fields
    (`organization_code`, `tenant_code`, `created_by`, `updated_by`, timestamps,
    `deleted_at`) are stripped from the request body and cannot be set by the
    client.
  required:
    - feature_code
    - feature_name
    - display_order
  properties:
    feature_code:
      type: string
      description: Unique code identifying the feature.
      example: feat3t7os9otwv
    feature_name:
      type: string
      description: Human readable name of the feature.
      example: Replay Feature
    display_order:
      type: integer
      description: Ordering position of the feature. Must contain only digits.
      example: 1
    roles:
      type: array
      description: >-
        Optional list of role titles to map to this feature. Every title must
        already exist for the tenant, otherwise the request fails with
        ROLE_NOT_FOUND.
      items:
        type: string
      example:
        - mentee
        - mentor
    enabled:
      type: boolean
      description: Whether the feature is enabled for the organization.
      example: false
    icon:
      type: string
      nullable: true
      description: Icon path/reference for the feature.
      example: null
    redirect_url:
      type: string
      nullable: true
      description: Redirect URL associated with the feature.
      example: null
    translations:
      type: object
      nullable: true
      description: Localized translations for the feature.
      example: null
    meta:
      type: object
      nullable: true
      description: Additional metadata for the feature.
      example: null
createOrganizationFeature201Response:
  type: object
  description: Organization feature created successfully.
  properties:
    responseCode:
      type: string
      example: OK
    message:
      type: string
