# services/organization-feature.js#create (lines 80-87, default-organization
# feature lookup fails for a non-admin caller in a non-default org) AND
# lines 141-146 (Sequelize foreign-key constraint error on the
# feature_code FK, i.e. feature_code does not exist in the features table).
# Same message/statusCode from two distinct causes.
organizationFeatureNotFound400Response:
  type: object
  description: >-
    The referenced feature could not be found (statusCode 400). Returned by
    create when either (a) a non-admin caller in a non-default organization
    references a feature_code that has no enabled counterpart in the default
    organization, or (b) feature_code does not correspond to any known
    feature. Also returned by update when the same feature_code condition
    applies.
  x-internal-note: >-
    (b) is a foreign-key constraint violation. No live captured example; see
    gaps.jsonl. Update case: services/organization-feature.js#update, line
    242-248.
  properties:
    responseCode:
      type: string
    error:
      type: array
      items: {}
    meta:
      type: object
    message:
      type: string
      example: FEATURE_NOT_FOUND

# services/organization-feature.js#create (lines 112-120) and #update
