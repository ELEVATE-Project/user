# --------------------------------------------------------------------------
# update (PATCH /user/v1/organization-feature/update/{id})
# --------------------------------------------------------------------------
updateOrganizationFeatureRequest:
  type: object
  description: >-
    Request payload for updating an existing organization feature. Only
    `feature_name` is mandatory on this branch; `display_order`, if present,
    must contain only digits. Server-managed fields plus `feature_code`
    (organization_code, tenant_code, created_by, updated_by, created_at,
    updated_at, deleted_at) cannot be changed via update, even if supplied.
  x-internal-note: >-
    Applies only when req.method != DELETE
    (validators/v1/organization-feature.js#update). Stripped via
    filterRequestBody with the `organizationFeatures.update` blacklist
    (constants/blacklistConfig.js).
  required:
    - feature_name
  properties:
    feature_name:
      type: string
      description: Human readable name of the feature.
      example: Mitra
    display_order:
      type: integer
      description: >-
        Ordering position of the feature. Optional on update; must contain
        only digits when supplied.
      example: 1
    roles:
      type: array
      description: >-
        Optional list of role titles to map to this feature. When supplied,
        ALL existing feature_role_mapping rows for this feature/org/tenant
        are deleted and replaced with the new set. Every title must already
        exist for the tenant, otherwise the request fails with
        ROLE_NOT_FOUND.
      items:
        type: string
      example:
        - mentee
        - mentor
    enabled:
      type: boolean
      description: Whether the feature is enabled for the organization.
      example: true
    icon:
      type: string
      description: Icon path/reference for the feature.
      example: /assets/images/ic_mitra.svg
    redirect_url:
      type: string
      nullable: true
      description: Redirect URL associated with the feature.
      example: null
    translations:
      type: object
      nullable: true
      description: Localized translations for the feature.
      example: null
    meta:
      type: object
      description: Additional metadata for the feature.
      example:
        url: https://dev.elevate-mitra.shikshalokam.org/mohini/sso?accToken=
        icon: /assets/images/ic_mitra.svg
        theme:
          primaryColor: '#572E91'
          secondaryColor: '#FF9911'
        title: MITRA
        sameOrigin: true

