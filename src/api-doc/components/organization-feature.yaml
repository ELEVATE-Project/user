          example: default
        created_by:
          type: integer
          example: 23
        updated_at:
          type: string
          example: '2026-07-15T10:56:26.052Z'
        created_at:
          type: string
          example: '2026-07-15T10:56:26.052Z'
        icon:
          type: string
          nullable: true
          example: null
        redirect_url:
          type: string
          nullable: true
          example: null
        translations:
          type: object
          nullable: true
          example: null
        meta:
          type: object
          nullable: true
          example: null
        updated_by:
          type: integer
          nullable: true
          example: null
        deleted_at:
          type: string
          nullable: true
