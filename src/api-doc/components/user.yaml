userLoginRequest:
  type: object
  description: >
    Request body for user login.


    Cross-field / runtime rules enforced by the service (not by per-field validators):

    - **At least one of `password` or `otp` must be provided** (modeled below as `anyOf`); otherwise
      `Password or OTP is required.` (400).

    - Which of password / OTP login is actually accepted depends on the tenant's runtime
      `configuration.allowed_auth_mode` (e.g. a tenant may permit only OTP), so it is not modeled here.

    - During OTP-based auto-registration on first login, if the tenant allows PASSWORD auth mode and
      no password is supplied, `PASSWORD_REQUIRED` is returned. This is runtime-config gated and not
      expressed in the schema.
  required:
    - identifier
    - phone_code
  anyOf:
    - required: [password]
    - required: [otp]
  properties:
    identifier:
      type: string
      description: Email, username or phone number of the user.
      example: example@mail.com
    phone_code:
      type: string
      description: Country dialing code, sent alongside the identifier.
      example: '+91'
    password:
      type: string
      description: User password. Provide either password or otp.
      example: Password@123
    otp:
      type: string
      description: One-time password. Provide either password or otp.
      example: '123456'
