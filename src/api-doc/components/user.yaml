userCreateUserRequest:
  type: object
  description: >
    Request body for creating a user account.


    Cross-field / runtime rules enforced by the service (not by per-field validators):

    - **At least one of `email` or `phone` must be provided** (modeled below as `anyOf`);
      otherwise `EMAIL_OR_PHONE_REQUIRED` (400).

    - **`password` is conditionally gated on the tenant's runtime `configuration.allowed_auth_mode`**:
      if PASSWORD auth mode is allowed a password is required (else `PASSWORD_REQUIRED`, 400); if a
      password is supplied but PASSWORD mode is not allowed, `AUTH_MODE_NOT_ALLOWED` (400) is returned.
      Because this depends on runtime tenant config it is NOT expressed in the schema.

    - **Invitation vs identity matching precedence**: when both `invitation_key` and `invitation_code`
      are absent, the invitee is matched by `email` / `username` / `phone`; supplying invitation
      credentials takes precedence over identity-based matching. This is inferred from filter
      construction (no explicit error is thrown) and is therefore described here rather than modeled
      as a hard `oneOf`.

    - `role` is required only when the role-handling branch executes (conditional), so it is optional here.
  anyOf:
    - required: [email]
    - required: [phone]
  properties:
    name:
      type: string
      description: Name of the user
      example: John Deo
    email:
      type: string
      description: Email Id of user. At least one of email or phone is required.
      example: example@mail.com
    username:
      type: string
      description: Username of the user.
      example: john_deo
    phone:
      type: string
      description: Phone number of user. At least one of email or phone is required.
      example: '9876543210'
    phone_code:
      type: string
      description: Country dialing code for phone.
      example: '+91'
    password:
      type: string
      description: Password of user. Required/forbidden depending on tenant allowed_auth_mode (see description).
      format: password
      example: Password@123
    otp:
      type: string
      description: OTP for verification.
      example: '6845975'
    invitation_key:
      type: string
      description: Invitation key. Takes precedence over identity-based matching when present.
      example: inv_key_abc123
    invitation_code:
      type: string
      description: Invitation code. Takes precedence over identity-based matching when present.
      example: INVITE2024
    role:
      type: string
      description: Role of the user. Required only when the role branch executes.
      example: mentee
    has_accepted_terms_and_conditions:
      type: boolean
      description: Flag specifiying if user has accepted the terms & conditions
      example: true
