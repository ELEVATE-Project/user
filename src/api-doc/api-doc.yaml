        '200':
          description: OK. Organization details fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationDetails200Response'
        '406':
          description: Not Acceptable. Either the organization is not accessible to the caller, or no organization record matches the id for the caller's tenant / the caller has no organization mapping at all.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/organizationDetails406NotAccessibleResponse'
                  - $ref: '#/components/schemas/organizationDetails406NotFoundResponse'
  /user/v1/organization/addRegistrationCode/{id}:
    post:
      summary: Add Organization Registration Codes
      tags:
        - Organization
      operationId: addOrganizationRegistrationCode
      description: |
        Adds one or more registration codes to an organization.
        - Endpoint: `/user/v1/organization/addRegistrationCode/{id}`
        - `id` here is the organization code (not the numeric id).
        - Caller must be ADMIN_ROLE, ORG_ADMIN_ROLE, or TENANT_ADMIN_ROLE.
        - `tenant_code` in the request body is conditionally required only for ADMIN_ROLE callers - see addRegistrationCodeRequest.
      parameters:
        - name: X-auth-token
          in: header
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Organization code.
          schema:
            type: string
          example: mentor112
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/addRegistrationCodeRequest'
      responses:
        '202':
          description: Accepted. Registration codes added successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/addRegistrationCode202Response'
        '400':
          description: Bad Request. Either the caller is not authorized to perform this operation, or an ADMIN_ROLE caller omitted the required tenant_code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/addRegistrationCode400Response'
        '406':
          description: Not Acceptable. Either the organization was not found, one or more of the supplied codes already exist on the organization, or the codes could not be added due to a uniqueness conflict.
