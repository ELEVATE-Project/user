                  summary: Per services/permissions.js create() throws this on Sequelize UniqueConstraintError. Message is dynamically built (`` `${errorMessage.trim()} should be unique.` ``) and depends on which columns violated the unique constraint; the only column checked by name is `code`. No captured response available. Shape only, no fabricated value.
