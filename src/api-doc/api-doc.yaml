openapi: 3.0.0
info:
  title: Elevate User
  version: 1.0.0
  termsOfService: https://github.com/project-sunbird/sunbird-commons/blob/master/LICENSE
  description: |-
    - The Users Service is a centralized Service to support other services. Apis perform operations related to mentoring entities notification etc 
    - The URL for Users API(s) is `{context}/user/v1` - <b>Note:</b> These resources can be used in other services
  contact:
    email: info@sunbird.org
  license:
    name: MIT
    url: https://github.com/ELEVATE-Project/user/blob/develop/LICENSE
servers:
  - url: http://localhost:3002
    description: local dev
  - url: https://dev.elevate-apis.shikshalokam.org
    description: dev server
security:
  - XAuthToken: []
tags:
  - name: User APIs
    description: Account creation, authentication, session, and profile operations for end users.
  - name: Users APIs
    description: Reading and updating user profile data and preferences.
  - name: Tenant APIs
    description: Managing tenants, their domains, and tenant-level bulk user operations.
  - name: Organization
    description: Creating, updating, and looking up organizations and their registration codes.
  - name: Org Admin APIs
    description: Handling organization role requests, bulk user invites, and org-scoped user administration.
  - name: Organization Feature APIs
    description: Managing feature toggles scoped to an organization.
  - name: Entity APIs
    description: Managing entities used to configure and extend platform data.
  - name: EntityType APIs
    description: Defining and managing the entity types available on the platform.
  - name: Form APIs
    description: Creating and managing dynamic form configurations.
  - name: Feature APIs
    description: Managing platform-wide feature flags.
  - name: Notification APIs
    description: Managing notification templates.
  - name: Admin APIs
    description: Platform administrator operations for managing users and organizations.
  - name: Cloud Services APIs
    description: Generating signed URLs for uploading and downloading files via cloud storage.
  - name: User Roles APIs
    description: Assigning, listing, and managing roles held by users within an organization.
  - name: Permissions
    description: Defining and managing the permissions available to roles.
  - name: Modules
    description: Managing the functional modules that permissions and roles are scoped to.
  - name: RolePermissionMapping
    description: Mapping permissions to roles for a module and request type.
  - name: Health Check
    description: Service and dependency health/readiness checks.
  - name: Depreciated APIs
    description: Endpoints retained for backward compatibility; scheduled for removal.
paths:
  /user/v1/account/create:
    post:
      summary: Create user
      operationId: createAccount
      tags:
        - User APIs
      security: []
      description: |-
        This API creates a user account.
         - Endpoint: `/user/v1/account/create`
         - At least one of `email` or `phone` must be provided; `phone_code` is required when `phone` is present.
         - Depending on the tenant's `configuration.allowed_auth_mode`, a `password` may be required (or rejected).
      requestBody:
        required: true
        description: Request body consist of metadata and accepts payload as JSON
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createUserRequest'
            examples:
              withEmail:
                summary: Create using email (at-least-one-of satisfied)
                value:
                  name: Nevil Mathew
                  email: mentee@tunerlabs.com
                  password: Password@123
              withPhone:
                summary: Create using phone (phone_code required)
                value:
                  name: Nevil Mathew
                  phone: '9876543210'
                  phone_code: '+91'
                  password: Password@123
      responses:
        '201':
          description: Created. Sign-up successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createUser201Response'
        '406':
          description: Not Acceptable. User already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/clientErrorResponse'
              examples:
                userAlreadyExists:
                  summary: Duplicate email/phone/username
                  value:
                    responseCode: CLIENT_ERROR
                    error: []
                    meta:
                      correlation: a8cf416d-c952-45ba-b283-b57bf9113ac7
                    message: User already exists.
        '422':
          description: Unprocessable Entity. Cross-field validation failed (neither email nor phone provided).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/clientErrorResponse'
              examples:
                missingEmailAndPhone:
                  summary: Neither email nor phone provided
                  value:
                    responseCode: CLIENT_ERROR
                    error: []
                    meta:
                      correlation: dff2a7c1-c903-4876-b403-1b81687239d9
                    message: At least one of email or phone must be provided
  /user/v1/account/login:
    post:
      summary: Login
      operationId: login
      tags:
        - User APIs
      security: []
      description: |-
        This API logs a user in.
         - Endpoint: `/user/v1/account/login`
         - `identifier` is required. At least one of `password` or `otp` must be supplied.
         - Which credential is accepted is additionally gated at runtime by the tenant's `configuration.allowed_auth_mode`; a credential for a disallowed auth mode returns `AUTH_MODE_NOT_ALLOWED`.
      requestBody:
        description: Request body for user login
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/loginRequest'
            examples:
              passwordLogin:
                summary: Login with password
                value:
                  identifier: mentee@tunerlabs.com
                  phone_code: '+91'
                  password: Password@123
              otpLogin:
                summary: Login with OTP
                value:
                  identifier: mentee@tunerlabs.com
                  phone_code: '+91'
                  otp: '123456'
      responses:
        '200':
          description: OK. User successfully logged in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/login200Response'
        '400':
          description: Bad Request. Either neither password nor otp was supplied (AUTH_CREDENTIAL_REQUIRED), or the credentials were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/clientErrorResponse'
              examples:
                passwordOrOtpMissing:
                  summary: Neither password nor otp supplied
                  value:
                    responseCode: CLIENT_ERROR
                    error: []
                    meta:
                      correlation: fe4537ed-d8bc-4446-9ec0-f7994a3323a3
                    message: Password or OTP is required.
                wrongPassword:
                  summary: Wrong password
                  value:
                    responseCode: CLIENT_ERROR
                    error: []
                    meta:
                      correlation: ccb08b77-ccf6-4f4b-91fb-4287ce248df5
                    message: Invalid identifier or password. Please check your login credentials.
                identifierNotFound:
                  summary: Identifier not found
                  value:
                    responseCode: CLIENT_ERROR
                    error: []
                    meta:
                      correlation: bc8053f2-4195-462a-8734-1153efe979db
                    message: Invalid identifier or password. Please check your login credentials.
        '422':
          description: Unprocessable Entity. Request body failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationErrorResponse'
              examples:
                identifierEmpty:
                  summary: Missing identifier
                  value:
                    responseCode: CLIENT_ERROR
                    error:
                      - location: body
                        param: identifier
                        msg: Identifier field is empty
                    meta:
                      correlation: ad29b3a6-295d-4059-af71-75e0efecc16d
                    message: Validation failed, Entered data is incorrect!
  /user/v1/account/logout:
    post:
      summary: Logout
      operationId: logout
      tags:
        - User APIs
      description: |-
        This API logs a user out.
         - Endpoint: `/user/v1/account/logout`
         - `refresh_token` is required.
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token from the login API response.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/logoutRequest'
      responses:
        '200':
          description: OK. Logout successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logout200Response'
        '422':
          description: Unprocessable Entity. refresh_token missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationErrorResponse'
              examples:
                refreshTokenEmpty:
                  summary: Missing refresh_token
                  value:
                    responseCode: CLIENT_ERROR
                    error:
                      - location: body
                        param: refresh_token
                        msg: refresh_token field is empty
                    meta:
                      correlation: 6b915f8e-2c7d-4d17-88ec-9af3633db8cc
                    message: Validation failed, Entered data is incorrect!
  /user/v1/account/generateToken:
    post:
      summary: Generate Access Token
      operationId: generateToken
      tags:
        - User APIs
      description: |-
        This API generates an access token from a refresh token.
         - Endpoint: `/user/v1/account/generateToken`
         - `refresh_token` is required.
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token from the login API response.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/generateTokenRequest'
      responses:
        '200':
          description: OK. Access token generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generateToken200Response'
        '401':
          description: Unauthorized. Refresh token invalid or session expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/clientErrorResponse'
              examples:
                invalidRefreshToken:
                  summary: Invalid refresh_token (captured)
                  value:
                    responseCode: SERVER_ERROR
                    error: []
                    meta:
                      correlation: ee806225-32cd-449a-b67c-2030c0818348
                    message: Oops! Your session has expired. Please log in again.
        '422':
          description: Unprocessable Entity. refresh_token missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationErrorResponse'
              examples:
                refreshTokenEmpty:
                  summary: Missing refresh_token
                  value:
                    responseCode: CLIENT_ERROR
                    error:
                      - location: body
                        param: refresh_token
                        msg: refresh_token field is empty
                    meta:
                      correlation: 12a3aa85-1f2b-4d35-b4cf-5bf889f633a3
                    message: Validation failed, Entered data is incorrect!
  /user/v1/account/generateOtp:
    post:
      summary: Generate OTP
      operationId: generateOtp
      tags:
        - User APIs
      description: |-
        This API generates an OTP (used in password reset).
         - Endpoint: `/user/v1/account/generateOtp`
         - `identifier` and `password` are required.
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token from the login API response.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/generateOtpRequest'
      responses:
        '200':
          description: OK. OTP generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generateOtp200Response'
        '422':
          description: Unprocessable Entity. Request body failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationErrorResponse'
              examples:
                passwordEmpty:
                  summary: Missing password
                  value:
                    responseCode: CLIENT_ERROR
                    error:
                      - location: body
                        param: password
                        msg: password field is empty
                    meta:
                      correlation: b94f9de3-ea1e-4586-8f63-df2f7007dd69
                    message: Validation failed, Entered data is incorrect!
  /user/v1/account/resetPassword:
    post:
      summary: Reset Password
      operationId: resetPassword
      tags:
        - User APIs
      description: |-
        This API resets a user's password.
         - Endpoint: `/user/v1/account/resetPassword`
         - `identifier`, `password`, and `otp` are all required.
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token from the login API response.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/resetPasswordRequest'
      responses:
        '200':
          description: OK. Password reset successfully. Returns the same session tokens and user object as the login response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/login200Response'
        '400':
          description: Bad Request. Invalid or incorrect OTP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/clientErrorResponse'
              examples:
                invalidOtp:
                  summary: Incorrect OTP
                  value:
                    responseCode: CLIENT_ERROR
                    error: []
                    meta:
                      correlation: 10a26438-b7dd-4d79-bd71-5c5fc84d738e
                    message: Please enter the correct OTP.
        '422':
          description: Unprocessable Entity. Request body failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationErrorResponse'
              examples:
                otpEmpty:
                  summary: Missing/invalid otp
                  value:
                    responseCode: CLIENT_ERROR
                    error:
                      - location: body
                        param: otp
                        msg: otp field is empty
                      - location: body
                        param: otp
                        msg: otp should be number
                      - location: body
                        param: otp
                        msg: otp is invalid
                    meta:
                      correlation: cb21a62c-1e9c-46cc-8b14-ba461eaa684b
                    message: Validation failed, Entered data is incorrect!
  /user/v1/account/registrationOtp:
    post:
      summary: Registration OTP
      operationId: registrationOtp
      tags:
        - User APIs
      description: |-
        This API sends a registration OTP.
         - Endpoint: `/user/v1/account/registrationOtp`
         - `registration_code` is required; at least one of `email`, `phone`, or `username` must be provided (`phone_code` required with `phone`).
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token from the login API response.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/registrationOtpRequest'
            examples:
              withEmail:
                summary: Registration via email
                value:
                  email: mentee@tunerlabs.com
                  registration_code: org-signup-code
              withPhone:
                summary: Registration via phone (phone_code required)
                value:
                  phone: '9876543210'
                  phone_code: '+91'
                  registration_code: org-signup-code
              withUsername:
                summary: Registration via username
                value:
                  username: mentee_new
                  registration_code: org-signup-code
      responses:
        '200':
          description: OK. Registration OTP sent successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generateOtp200Response'
        '400':
          description: Bad Request. Invalid organization registration code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/clientErrorResponse'
              examples:
                invalidRegistrationCode:
                  summary: registration_code not valid for org
                  value:
                    responseCode: CLIENT_ERROR
                    error: []
                    meta:
                      correlation: b28d7ea7-fd7a-4868-8acf-f5a9d9c7b52f
                    message: INVALID_ORG_registration_code
        '422':
          description: Unprocessable Entity. Cross-field validation failed (none of email, phone, username provided).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/clientErrorResponse'
              examples:
                missingIdentity:
                  summary: None of email/phone/username provided
                  value:
                    responseCode: CLIENT_ERROR
                    error: []
                    meta:
                      correlation: 28c857c1-4dbb-410a-92ab-83b152b7ef15
                    message: At least one of email, phone, or username must be provided
  /user/v1/account/delete:
    delete:
      summary: Delete Own Account
      operationId: deleteAccount
      tags:
        - User APIs
      description: |-
        This API deletes the authenticated user's own account.
         - Endpoint: `/user/v1/account/delete`
         - `password` is required for confirmation.
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token from the login API response.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/deleteRequest'
      responses:
        '200':
          description: OK. Account deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete200Response'
        '422':
          description: Unprocessable Entity. password missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationErrorResponse'
              examples:
                passwordEmpty:
                  summary: Missing password
                  value:
                    responseCode: CLIENT_ERROR
                    error:
                      - location: body
                        param: password
                        msg: password field is empty
                    meta:
                      correlation: 38d23e40-72d9-439d-8133-749437eb8a1b
                    message: Validation failed, Entered data is incorrect!
  /user/v1/account/changePassword:
    post:
      summary: Change Password
      operationId: changePassword
      tags:
        - User APIs
      description: |-
        This API changes the authenticated user's password.
         - Endpoint: `/user/v1/account/changePassword`
         - `oldPassword` and `newPassword` are required.
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token from the login API response.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/changePasswordRequest'
      responses:
        '200':
          description: OK. Password changed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/changePassword200Response'
        '401':
          description: Unauthorized. Session expired or the auth token is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedResponse'
              examples:
                sessionExpired:
                  summary: Session expired
                  value:
                    responseCode: UNAUTHORIZED
                    error: []
                    meta:
                      correlation: 1fb56dbc-b9aa-45f9-aef8-45e17453d152
                    message: Session expired. Please login again.
  /user/v1/account/changeRole:
    post:
      summary: Change Role
      operationId: changeRole
      tags:
        - User APIs
      description: |-
        This API changes a user's role.
         - Endpoint: `/user/v1/account/changeRole`
         - `email` and `role` are required.
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token from the login API response.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/changeRoleRequest'
      responses:
        '200':
          description: OK. Role updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/clientErrorResponse'
        '400':
          description: Bad Request. Returned when the specified role does not exist for the tenant, the caller's token does not resolve to a valid user, or the target user does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/clientErrorResponse'
  /user/v1/account/validatingEmailIds:
    post:
      summary: Validate Email IDs
      operationId: validatingEmailIds
      tags:
        - User APIs
      description: |-
        This API validates a list of email IDs.
         - Endpoint: `/user/v1/account/validatingEmailIds`
         - `emailIds` (non-empty array of valid emails) is required.
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token from the login API response.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/validatingEmailIdsRequest'
      responses:
        '200':
          description: OK. Emails validated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/clientErrorResponse'
        '422':
          description: Unprocessable Entity. `emailIds` is missing, empty, or contains values that are not valid email addresses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationErrorResponse'
  /user/v1/account/sessions:
    post:
      summary: List Sessions
      operationId: sessions
      tags:
        - User APIs
      description: |-
        This API lists the authenticated user's sessions.
         - Endpoint: `/user/v1/account/sessions`
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token from the login API response.
          required: true
          schema:
            type: string
        - in: query
          name: status
          description: Optional session status filter (e.g. ACTIVE).
          required: false
          schema:
            type: string
        - in: query
          name: period
          description: Optional time period filter.
          required: false
          schema:
            type: string
      responses:
        '201':
          description: OK. User sessions fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sessions201Response'
        '401':
          description: Unauthorized. X-auth-token is either missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedResponse'
  /user/v1/account/validateUserSession:
    post:
      summary: Validate User Session
      operationId: validateUserSession
      tags:
        - User APIs
      security: []
      description: |-
        This API validates a user session by token.
         - Endpoint: `/user/v1/account/validateUserSession`
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/validateUserSessionRequest'
      responses:
        '200':
          description: OK. User session validated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validateUserSession200Response'
        '401':
          description: Unauthorized. Missing internal access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedResponse'
              examples:
                missingInternalToken:
                  summary: Missing internal_access_token
                  value:
                    responseCode: UNAUTHORIZED
                    error: []
                    meta:
                      correlation: a32eafe3-9549-4cd3-b7c3-281c001b1cda
                    message: Unauthorized request
  /user/v1/account/list:
    get:
      summary: List user
      operationId: listAccount
      tags:
        - Users APIs
      description: |-
        This API lists users.
         - Endpoint: `/user/v1/account/list`
         - `type` query parameter is required.
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token from the login API response.
          required: true
          schema:
            type: string
        - in: query
          name: type
          description: Type of user (e.g. mentor, mentee).
          required: true
          schema:
            type: string
          example: mentor
        - in: query
          name: page
          description: Page number for pagination.
          required: false
          schema:
            type: number
          example: 1
        - in: query
          name: limit
          description: Number of records to limit.
          required: false
          schema:
            type: number
          example: 2
        - in: query
          name: search
          description: Search for name or title of user.
          required: false
          schema:
            type: string
          example: john
      responses:
        '200':
          description: OK. User list fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list200Response'
        '401':
          description: Unauthorized. Missing/invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedResponse'
              examples:
                missingToken:
                  summary: Missing token
                  value:
                    responseCode: UNAUTHORIZED
                    error: []
                    meta:
                      correlation: 6ed63066-4a64-4131-a2ff-b5a14e84c6fb
                    message: Unauthorized request
  /user/v1/account/search:
    get:
      summary: Search User
      operationId: search
      tags:
        - Users APIs
      description: |-
        This API searches users.
         - Endpoint: `/user/v1/account/search`
         - `tenant_code`, `type`, and `organization_id` are required query parameters; `user_ids` and `excluded_user_ids` are required in the body.
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token from the login API response.
          required: true
          schema:
            type: string
        - in: query
          name: tenant_code
          description: Tenant code.
          required: true
          schema:
            type: string
          example: default
        - in: query
          name: type
          description: Valid user type (mentee, mentor, session_manager, org_admin, reviewer), or `all`.
          required: true
          schema:
            type: string
          example: mentor
        - in: query
          name: organization_id
          description: Organization ID.
          required: true
          schema:
            type: number
          example: 1
        - in: query
          name: page
          description: Page number for pagination.
          required: false
          schema:
            type: number
          example: 1
        - in: query
          name: limit
          description: Number of records to limit.
          required: false
          schema:
            type: number
          example: 2
        - in: query
          name: search
          description: Search for the name or title of the user.
          required: false
          schema:
            type: string
          example: john
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/searchRequest'
            examples:
              withUsersAndExclusions:
                summary: Search with included and excluded user IDs
                value:
                  user_ids:
                    - 22
                    - 23
                  excluded_user_ids:
                    - 24
      responses:
        '200':
          description: OK. User list fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/search200Response'
        '401':
          description: Unauthorized. X-auth-token is either missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedResponse'
  /user/v1/user/read/{userId}:
    get:
      summary: User Details
      operationId: readUserProfile
      tags:
        - Users APIs
      description: |
        This API retrieves details of a user's profile.
        - Endpoint: `/user/v1/user/read/{userId}`. There is also an id-less variant, `/user/v1/user/read`, which defaults to the authenticated caller's own id.
        - `language` is optional; when provided and not `en`, role labels are localized to it.
        - An optional `internal_access_token` header allows fetching a soft-deleted user's details.
        - Note: the path id and `language` query parameter are not subject to additional format validation.
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is Available in login API Response.
          required: true
          schema:
            type: string
        - name: internal_access_token
          in: header
          description: Optional. When present, allows fetching a soft-deleted (paranoid-excluded) user's details.
          required: false
          schema:
            type: string
        - in: path
          name: userId
          required: true
          description: |
            User ID to look up. (Note: functionally optional in the underlying controller -- omitting this whole path segment via the sibling route `/user/v1/user/read` defaults to the authenticated caller's own id.)
          schema:
            type: integer
          example: 22
        - in: query
          name: language
          required: false
          description: Language code used to localize role labels in the response.
          schema:
            type: string
          example: en
      responses:
        '200':
          description: OK. User details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userProfileReadResponse200'
        '401':
          description: Unauthorized. X-auth-token is either missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userProfileReadResponse401'
        '404':
          description: Not Found. Returned when no user or share link matches.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userProfileReadResponse404Gap'
        '406':
          description: Not Acceptable. Returned when the user's organization has no roles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userProfileReadResponse406Gap'
  /user/v1/user/profileById/{userId}:
    get:
      summary: User Profile By Id
      operationId: getUserProfileById
      tags:
        - Users APIs
      description: |
        Retrieves a user's public profile by id, or by email/username/phone (+phone_code) query lookup when no id is given.
        - Endpoint: `/user/v1/user/profileById/{userId}`. There is also an id-less variant, `/user/v1/user/profileById`, for the query-based lookup described below.
        - Mandatory parameters marked as `required` must have valid values.
        - Parameters cannot be empty or null.
        - Cross-field rule, only enforced when no path `id` is given: at least one of `email`, `username`, or `phone` must be provided; if `phone` is provided, `phone_code` is then also required.
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is Available in login API Response.
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          description: Numeric user id. Optional in the underlying controller (see id-less variant note above).
          schema:
            type: string
            pattern: ^[0-9]+$
          example: '22'
        - in: query
          name: email
          required: false
          description: Email to look up by (only used when no path id is given).
          schema:
            type: string
            format: email
          example: example@mail.com
        - in: query
          name: username
          required: false
          description: Username to look up by (only used when no path id is given).
          schema:
            type: string
          example: mentee_3t7m88mvl5
        - in: query
          name: phone
          required: false
          description: Phone number to look up by, 7-15 digits (only used when no path id is given). Requires phone_code if provided.
          schema:
            type: string
            pattern: ^[0-9]{7,15}$
          example: '9876543210'
        - in: query
          name: phone_code
          required: false
          description: Country dialing code, e.g. +91. Required if phone is provided.
          schema:
            type: string
            pattern: ^\+[0-9]{1,4}$
          example: '+91'
        - in: query
          name: tenant_code
          required: true
          description: Tenant code to scope the lookup to.
          schema:
            type: string
          example: default
      responses:
        '200':
          description: OK. User profile fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userProfileById200Response'
        '401':
          description: Unauthorized. X-auth-token is either missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userProfileReadResponse401'
        '404':
          description: Not Found. No matching user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userProfileById404Response'
        '422':
          description: Unprocessable Entity. Returned when the lookup parameters are empty, or when a phone number is provided without a resolvable phone_code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userProfileById422Gap'
  /user/v1/user/setLanguagePreference:
    patch:
      summary: Setting preferred language of user
      operationId: setLanguagePreference
      tags:
        - Users APIs
      description: |
        This API updates a user's preferred language.
        - Endpoint: `/user/v1/user/setLanguagePreference`
        - Mandatory parameters marked as `required` must have valid values.
        - Parameters cannot be empty or null.
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is Available in login API Response.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/userSetLanguagePreferenceRequest'
      responses:
        '202':
          description: Accepted. Preferred language updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userSetLanguagePreferenceResponse202'
        '400':
          description: Bad Request. Returned when preferred_language fails entity-type validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userSetLanguagePreferenceResponse400Gap'
        '401':
          description: "Unauthorized. Two distinct causes share this status: (1) missing/invalid X-auth-token, raised by the auth middleware; (2) the token's user could not be resolved."
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/userProfileReadResponse401'
                  - $ref: '#/components/schemas/userSetLanguagePreferenceResponse401Gap'
  /user/v1/user/update:
    patch:
      summary: Update User Profile
      operationId: updateUserProfile
      tags:
        - Users APIs
      description: |
        This API updates the authenticated user's own profile.
        - Endpoint: `/user/v1/user/update`
        - Mandatory parameters marked as `required` must have valid values.
        - Parameters cannot be empty or null.
        - All request body fields are optional.
        - No cross-field rules apply to this operation.
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is Available in login API Response.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/userProfileUpdateRequest'
      responses:
        '202':
          description: Accepted. User profile updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userProfileUpdateResponse202'
        '400':
          description: "Bad Request. Returned in two cases: submitting an `email` field (which this operation does not accept), or a submitted field failing the organization's entity-type validation rules."
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/userProfileUpdateResponse400EmailUpdateGap'
                  - $ref: '#/components/schemas/userProfileUpdateResponse400ValidationGap'
        '401':
          description: "Unauthorized. Two distinct causes share this status: (1) missing/invalid X-auth-token, raised by the auth middleware; (2) the token's user could not be resolved."
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/userProfileReadResponse401'
                  - $ref: '#/components/schemas/userProfileUpdateResponse401Gap'
  /user/v1/user/share/{userId}:
    get:
      summary: Share Mentor Profile
      operationId: shareMentorProfile
      tags:
