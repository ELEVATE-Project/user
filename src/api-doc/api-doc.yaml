            type: string
      requestBody:
        description: Request body containing role information.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/requestOrgRoleRequest'
      responses:
        '201':
          description: Created. Role request submitted (or already approved).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/requestOrgRole201Response'
        '406':
          description: Not Acceptable. Either the requested role does not exist, or a role-change request for this role is already pending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/requestOrgRole406Response'
  /user/v1/organization/read:
    get:
      summary: Read Organization
      tags:
