      description: |-
        Single endpoint that both creates and updates tenants, depending on whether an `id` path parameter is present.
        - Create: `POST /user/v1/tenant/update` (no `id`). Bootstraps a
          brand-new tenant: the tenant row, its domains, a default
          organization, and copies of the default organization's entity
          types/entities, forms, notification templates, org features and
          user roles. Any failure partway through rolls back everything
          created so far.

        - Update: `POST /user/v1/tenant/update/{id}` (`id` = tenant code).
          Applies a partial update to the tenant and emits a change event.

        - `code`, `domains` and `status` in the request body are always
          stripped server-side and cannot be changed via this endpoint (see
          `tenantUpsertRequest`).

        - The X-auth-token is mandatory and cannot be empty or null.
      x-internal-note: 'Dispatched by controllers/v1/tenant.js#update based on presence of the `id` path parameter. Create branch: services/tenant.js#create bootstraps the tenant using process.env.DEFAULT_ORGANISATION_CODE / process.env.DEFAULT_TENANT_ORG_NAME for the default organization, and process.env.DEFAULT_ORG_ID / process.env.DEFAULT_TENANT_CODE (runtime config) for the copied entity types/entities, forms, notification templates, org features and user roles. Update branch: services/tenant.js#update applies the partial column update and emits a `tenantEvents` change-delta event.'
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the logged-in user.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tenantUpsertRequest'
            examples:
              createTenant:
                summary: Create a new tenant (no id path param)
                value:
                  name: Replay Test Tenant
                  code: tenant3t7o723zj5
                  description: created by replay script
                  logo: https://example.com/logo.png
                  configuration:
                    allowed_auth_mode:
                      - password
                    auto_register: true
                  domains: shikshalokam-qa.tekdinext.com
      responses:
        '202':
          description: Accepted. Tenant created successfully (no `id` path param branch).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantCreated202Response'
        '400':
          description: 'Bad Request. Create branch: tenant code already exists, one or more domains already belong to another tenant, or default-org bootstrap failed. See the three named schemas below.'
