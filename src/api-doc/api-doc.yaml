            type: string
        - name: organisation_code
          in: query
          required: false
          description: Organization code. At least one of organisation_id or organisation_code is required (see description above). If used, an optional tenant_code query param further scopes the lookup.
          schema:
            type: string
        - name: tenant_code
          in: query
          required: false
          description: Optional tenant code, only used together with organisation_code.
          schema:
            type: string
      responses:
        '200':
          description: OK. Organization fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationRead200Response'
        '406':
          description: Not Acceptable. Organization not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationRead406Response'
  /user/v1/organization/details/{id}:
    get:
      summary: Organization Details
      tags:
        - Organization
      operationId: organizationDetails
      description: |
        Reads detailed organization info for an organization the caller belongs to.
        - Endpoint: `/user/v1/organization/details/{id}`
        - The caller must have a user-organization mapping for this tenant, and the requested organization id must be among the caller's mapped organizations, otherwise ORGANIZATION_NOT_ACCESSIBLE is returned.
      parameters:
        - name: X-auth-token
          in: header
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Organization id.
          schema:
            type: integer
          example: 1
