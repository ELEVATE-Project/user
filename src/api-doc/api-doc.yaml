  /user/v1/notification/template:
    post:
      summary: Create a notification template
      operationId: createNotificationTemplate
      tags:
        - Notification APIs
      description: |-
        Creates a notification template.
        - Endpoint: `/user/v1/notification/template`.
        - Caller must hold one of `ADMIN`, `ORG_ADMIN` or `TENANT_ADMIN` roles.
        - `type`, `code`, `subject` and `body` are mandatory and cannot be empty or null.
        - `code` must be unique per organization + tenant.
      parameters:
        - name: X-auth-token
          in: header
          description: Access token required to use the API. Available in the login API response.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createNotificationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createNotification201Response'
        '400':
          description: Bad Request (caller is not an admin).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notAdmin400Response'
        '500':
          description: 'Internal Server Error. Also covers a real bug: attempting to create a template with a `code` that already exists for the org/tenant should return a clean 409 (NOTIFICATION_TEMPLATE_ALREADY_EXISTS) but instead surfaces here as a 500, because services/notification.js sets `statusCode: httpStatusCode.conflict`, which is `undefined` (no `conflict` key exists in generics/http-status.js) — see the gap_template_already_exists example below. The response body in that case still carries the original CLIENT_ERROR/NOTIFICATION_TEMPLATE_ALREADY_EXISTS content, not the generic server-error shape.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError500Response'
              examples:
                genericServerError:
                  summary: Unhandled server error (generic).
                  value:
                    responseCode: SERVER_ERROR
                    message: Oops! Something Went Wrong.
                    meta:
                      correlation: 12923198-0cb9-4137-8a25-5f8db4e45fa3
                gap_template_already_exists:
                  summary: Returned when a template with the same code already exists (real bug, not the intended 409 — see description above).
                  value:
                    responseCode: CLIENT_ERROR
                    message: NOTIFICATION_TEMPLATE_ALREADY_EXISTS
    get:
      summary: List notification templates
      operationId: listNotificationTemplates
      tags:
        - Notification APIs
      description: |-
        Fetches notification templates for the caller's organization + tenant.
        - Endpoint: `/user/v1/notification/template`.
        - When called with no `id` path param and no `code` query param, all
          templates are returned.

        - Optionally filter by `code` and/or `type` query params. If no template
          matches, the default organization's templates are returned as a fallback.
      parameters:
        - name: X-auth-token
          in: header
          description: Access token required to use the API. Available in the login API response.
          required: true
          schema:
            type: string
        - name: code
          in: query
          description: Filter by template code.
          required: false
          schema:
            type: string
        - name: type
          in: query
          description: Filter by template type.
          required: false
          schema:
            type: string
            enum:
              - sms
              - email
              - emailHeader
              - emailFooter
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listNotification200Response'
        '400':
          description: Bad Request (caller is not an admin).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notAdmin400Response'
