                $ref: '#/components/schemas/userProfileShare200Response'
        '400':
          description: Bad Request. User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userProfileShare400Response'
        '401':
          description: Unauthorized. X-auth-token is either missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userProfileReadResponse401'
  /user/v1/tenant/update:
    post:
      summary: Create or update a tenant
      operationId: updateTenant
      tags:
        - Tenant APIs
      description: |-
        Single endpoint that both creates and updates tenants, depending on whether an `id` path parameter is present.
        - Create: `POST /user/v1/tenant/update` (no `id`). Bootstraps a
          brand-new tenant: the tenant row, its domains, a default
          organization, and copies of the default organization's entity
          types/entities, forms, notification templates, org features and
          user roles. Any failure partway through rolls back everything
          created so far.

        - Update: `POST /user/v1/tenant/update/{id}` (`id` = tenant code).
          Applies a partial update to the tenant and emits a change event.

        - `code`, `domains` and `status` in the request body are always
          stripped server-side and cannot be changed via this endpoint (see
          `tenantUpsertRequest`).

        - The X-auth-token is mandatory and cannot be empty or null.
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the logged-in user.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tenantUpsertRequest'
            examples:
              createTenant:
                summary: Create a new tenant (no id path param)
                value:
                  name: Replay Test Tenant
                  code: tenant3t7o723zj5
                  description: created by replay script
                  logo: https://example.com/logo.png
                  configuration:
                    allowed_auth_mode:
                      - password
                    auto_register: true
                  domains: shikshalokam-qa.tekdinext.com
      responses:
        '202':
          description: Accepted. Tenant created successfully (no `id` path param branch).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantCreated202Response'
        '400':
          description: 'Bad Request. Create branch: tenant code already exists, one or more domains already belong to another tenant, or default-org bootstrap failed. See the three named schemas below.'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/tenantAlreadyExists400Response'
                  - $ref: '#/components/schemas/tenantDomainAlreadyExists400Response'
                  - $ref: '#/components/schemas/tenantDefaultOrgCreationFailed400Response'
  /user/v1/tenant/update/{id}:
    post:
      summary: Update an existing tenant
      operationId: updateTenantById
      tags:
        - Tenant APIs
      description: Updates an existing tenant identified by the `id` path parameter (tenant code). This is the update branch of tenant creation/update - see `update` for details on how tenants are created.
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the logged-in user.
          required: true
          schema:
            type: string
        - name: id
          in: path
          description: Tenant code to update.
          required: true
          schema:
            type: string
            pattern: ^[a-zA-Z0-9_]+$
          example: tenant3t7o723zj5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tenantUpsertRequest'
            examples:
              updateTenantConfiguration:
                summary: Update an existing tenant's configuration (id path param present)
                value:
                  configuration:
                    allowed_auth_mode:
                      - password
                      - otp
                    auto_register: true
      responses:
        '202':
          description: Accepted. Tenant updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantUpdated202Response'
        '406':
          description: Not Acceptable. No tenant matches the given `id`/code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantNotFound406Response'
        '500':
          description: Internal Server Error. The update query ran but returned no updated rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantUpdateFailed500Response'
  /user/v1/tenant/addDomain/{id}:
    post:
      summary: Add domain(s) to a tenant
      operationId: addDomain
      tags:
        - Tenant APIs
      description: |-
        Adds one or more verified domains to an existing tenant.
        - Endpoint: `POST /user/v1/tenant/addDomain/{id}` (`id` = tenant code).
        - Domains already registered for the tenant are silently skipped (not
          re-added); if the resulting to-create list is empty because every
          domain already existed, `TENANT_DOMAINS_ALREADY_PRESENT` is returned
          (202); if it's empty because every supplied entry was invalid
          (non-string or empty string), `INVALID_TENANT_DOMAINS` is returned
          (202) - see `tenantInvalidDomains202Response`.

        - The X-auth-token is mandatory and cannot be empty or null.
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the logged-in user.
          required: true
          schema:
            type: string
        - name: id
          in: path
          description: Tenant code to add domains to.
          required: true
          schema:
            type: string
            pattern: ^[a-zA-Z0-9_]+$
          example: shikshagraha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tenantAddDomainRequest'
      responses:
        '202':
          description: Accepted. Either domains were added successfully, all supplied domains were already present, or all supplied entries were invalid (see the three named schemas below).
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/tenantAddDomainSuccess202Response'
                  - $ref: '#/components/schemas/tenantDomainsAlreadyPresent202Response'
                  - $ref: '#/components/schemas/tenantInvalidDomains202Response'
              examples:
                happyPath:
                  summary: New domain(s) added
                  value:
                    responseCode: OK
                    message: Tenant domains added successfully
                    result:
                      new_domains_added:
                        - domainorydvo.example.com
                    meta:
                      correlation: 0df5c4f1-f162-42b9-8891-2bf7c97af19b
        '406':
          description: Not Acceptable. No tenant matches the given `id`/code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantNotFound406Response'
              examples:
                notFound:
                  summary: Tenant not found
                  value:
                    responseCode: CLIENT_ERROR
                    error: []
                    meta:
                      correlation: 0be504fc-f66c-44fd-bbf5-8d51ca4fd2a7
                    message: Tenant not found.
  /user/v1/tenant/removeDomain/{id}:
    post:
      summary: Remove domain(s) from a tenant
      operationId: removeDomain
      tags:
        - Tenant APIs
      description: |-
        Removes one or more domains from an existing tenant.
        - Endpoint: `POST /user/v1/tenant/removeDomain/{id}` (`id` = tenant
          code).

        - Domains that don't match any of the tenant's existing domains are
          ignored; if NONE of the supplied domains match,
          `NO_MATCHING_TENANT_DOMAINS_TO_REMOVE` is returned (406). A tenant
          must always retain at least one domain -
          `TENANT_DOMAINS_ATLEAST_ONE_MANDATORY` is returned (406) if the
          requested removal would remove every existing domain.

        - The X-auth-token is mandatory and cannot be empty or null.
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the logged-in user.
          required: true
          schema:
            type: string
        - name: id
          in: path
          description: Tenant code to remove domains from.
          required: true
          schema:
            type: string
            pattern: ^[a-zA-Z0-9_]+$
          example: tenant3t7o723zj5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tenantRemoveDomainRequest'
      responses:
        '202':
          description: Accepted. Either domains were removed successfully, or all supplied entries were invalid (non-string/empty) - see `tenantInvalidDomains202Response`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/tenantRemoveDomainSuccess202Response'
                  - $ref: '#/components/schemas/tenantInvalidDomains202Response'
        '406':
          description: Not Acceptable. No tenant matches the given `id`/code, no supplied domain matches any existing domain, or the removal would leave the tenant with zero domains - see the three named schemas below.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/tenantNotFound406Response'
                  - $ref: '#/components/schemas/tenantNoMatchingDomainsToRemove406Response'
                  - $ref: '#/components/schemas/tenantDomainsAtLeastOneMandatory406Response'
  /user/v1/tenant/read/{id}:
    get:
      summary: Read tenant details
      operationId: readTenant
      tags:
        - Tenant APIs
      description: |-
        Fetches details for a single tenant.
        - Endpoint: `GET /user/v1/tenant/read/{id}` (`id` = tenant code). An
          id-less variant, `GET /user/v1/tenant/read`, is also available and
          defaults to the caller's own tenant.

        - Caller must have a decoded token with at least one role, or
          `PERMISSION_DENIED` (400) is returned.

        - If the caller holds the full `admin` role, `id` selects any tenant in
          the system (all columns except `deleted_at`, plus `organizations` and
          `domains` arrays are returned).

        - If the caller does NOT hold the full `admin` role, only their own
          tenant can be read - if `id` is supplied and differs from their own
          tenant code, `PERMISSION_DENIED` (400) is returned; only `code`,
          `name`, `description`, `configuration`, `meta` are returned (no
          `organizations`/`domains` arrays).

        - The X-auth-token is mandatory and cannot be empty or null.
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the logged-in user.
          required: true
          schema:
            type: string
        - name: id
          in: path
          description: Tenant code to read. Optional for non-admin callers (defaults to the caller's own tenant); effectively required for admin callers (otherwise no tenant code is resolved and `TENANT_NOT_FOUND` is returned).
          required: false
          schema:
            type: string
          example: default
      responses:
        '202':
          description: OK/Accepted. Tenant details fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantRead202Response'
        '400':
          description: Bad Request. Caller's token has no roles, or a non-admin caller requested a tenant code other than their own.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantPermissionDenied400Response'
        '406':
          description: Not Acceptable. No tenant matches the given code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantNotFound406Response'
              examples:
                notFound:
                  summary: Tenant not found
                  value:
                    responseCode: CLIENT_ERROR
                    error: []
                    meta:
                      correlation: 3c0baae1-12ab-481c-adb1-432de45e4224
                    message: Tenant not found.
  /user/v1/tenant/readInternal/{id}:
    get:
      summary: Read tenant details (internal service-to-service call)
      operationId: readTenantInternal
      tags:
        - Tenant APIs
      security:
        - InternalAccessToken: []
      description: |-
        Internal-only variant of `read` for service-to-service calls, always fetched with full/admin-level detail regardless of caller role. Authorization is via the `internal_access_token` header instead of a user's X-auth-token.
        - Endpoint: `GET /user/v1/tenant/readInternal/{id}` (`id` = tenant
          code).

        - If `id` is empty/missing, `TENANT_CODE_REQUIRED` (400) is returned.
      parameters:
        - name: internal_access_token
          in: header
          description: Shared secret for internal service-to-service calls. Must equal `process.env.INTERNAL_ACCESS_TOKEN` (runtime config).
          required: true
          schema:
            type: string
        - name: id
          in: path
          description: Tenant code to read.
          required: true
          schema:
            type: string
          example: shikshalokam
      responses:
        '202':
          description: OK/Accepted. Tenant details fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantReadInternal202Response'
        '400':
          description: Bad Request. `id` path param was empty/missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantCodeRequired400Response'
  /user/v1/tenant/list:
    get:
      summary: List tenants
      operationId: listTenant
      tags:
        - Tenant APIs
      description: |-
        Fetches a paginated, optionally-searched list of tenants (`code`, `name`, `description` only per row).
        - Endpoint: `GET /user/v1/tenant/list`.
        - `search` matches (case-insensitive) against `code` or `name`.
        - The X-auth-token is mandatory and cannot be empty or null.
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the logged-in user.
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Page number (1-indexed). Defaults to 1.
          required: false
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          description: Page size.
          required: false
          schema:
            type: integer
        - name: search
          in: query
          description: Case-insensitive substring match against tenant `code` or `name`.
          required: false
          schema:
            type: string
      responses:
        '202':
          description: OK/Accepted. Tenant list fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantList202Response'
        '401':
          description: Unauthorized. X-auth-token is either missing or invalid.
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseCode:
                    type: string
                    example: UNAUTHORIZED
                  message:
                    type: string
                  error:
                    type: array
                    items:
                      type: object
                  meta:
                    type: object
  /user/v1/tenant/bulkUserCreate:
    post:
      summary: Bulk-create/invite users for a tenant's organization
      operationId: bulkUserCreateTenant
      tags:
        - Tenant APIs
      description: |-
        Kicks off a bulk user create/invite from a previously-uploaded CSV, scoped to one organization within a tenant.
        - Endpoint: `POST /user/v1/tenant/bulkUserCreate`.
        - The target organization is resolved from the `organizationcode` /
          `tenantcode` headers, not from the request body. `organizationcode`
          may be either the organization's numeric id or its code.

        - If the organization cannot be found, or is found but does not belong
          to the given tenant, the request fails before any upload work starts
          (see the 406 responses below).

        - The X-auth-token is mandatory and cannot be empty or null.
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the logged-in user.
          required: true
          schema:
            type: string
        - name: organizationcode
          in: header
          description: Organization id or code the bulk upload is scoped to.
          required: true
          schema:
            type: string
          example: sot
        - name: tenantcode
          in: header
          description: Tenant code the bulk upload is scoped to.
          required: true
          schema:
            type: string
          example: shikshagraha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tenantBulkUserCreateRequest'
      responses:
        '200':
          description: OK. Users uploaded/created successfully (message key USER_CSV_UPLOADED).
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseCode:
                    type: string
                    example: OK
                  message:
                    type: string
                    example: USER_CSV_UPLOADED
                  result:
                    type: object
                  meta:
                    type: object
        '406':
          description: Not Acceptable. Organization not found, or found but not mapped to the given tenant.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/tenantBulkUserCreateOrganizationNotFound406Response'
                  - $ref: '#/components/schemas/tenantBulkUserCreateInvalidOrgTenantMapping406Response'
        '500':
          description: Internal Server Error. Returned when the underlying bulk-create/ invite operation fails, such as when the uploaded file cannot be resolved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantBulkUserCreate500Response'
  /user/v1/public/checkUsername:
    get:
      summary: Check username availability
      operationId: checkUsername
      tags:
        - Public APIs
      security: []
      description: |-
        This API checks whether a username is already taken within the tenant resolved from the caller's request domain.
         - Endpoint: `/user/v1/public/checkUsername`
         - `username` is a required, non-empty query parameter (trimmed).
         - The tenant is resolved from the request's domain (via tenantDomainQueries), not from a header or body field.
      parameters:
        - in: query
          name: username
          required: true
          schema:
            type: string
          description: Username to check for availability. Must not be empty after trimming.
          example: nevil_ngrcbhcfke-k1x
      responses:
        '200':
          description: OK. Username availability result for the resolved tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/checkUsernameSuccessResponse'
        '406':
          description: Not Acceptable. The tenant could not be resolved from the caller's domain.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantNotFoundResponse'
        '422':
          description: Unprocessable Entity. `username` query parameter is missing or empty.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationErrorResponse'
              examples:
                missingUsername:
                  summary: username query parameter empty
                  value:
                    responseCode: CLIENT_ERROR
                    error:
                      - location: query
                        param: username
                        msg: username field is empty
                    meta:
                      correlation: 2f38149f-ee17-4848-a5e9-ffe62b626937
                    message: Validation failed, Entered data is incorrect!
  /user/v1/public/branding:
    get:
      summary: Get tenant (and optionally organization) branding details
      operationId: branding
      tags:
        - Public APIs
      security: []
      description: |-
        This API resolves and returns tenant branding/details, and
         optionally organization details.
         - Endpoint: `/user/v1/public/branding`
         - `org_code` is an optional query parameter; when supplied, organization
         details are additionally resolved.
         - The tenant is resolved from the `X-Tenant-Code` header if present,
         otherwise from the caller's request domain.
      parameters:
        - in: query
          name: org_code
          required: false
          schema:
            type: string
          description: Organization code to additionally resolve organization branding details for.
          example: org_sample_code
      responses:
        '201':
          description: Created. Tenant branding details (organization details are only included when `org_code` is supplied and resolves cleanly — see the 500 response below for the current real behavior when `org_code` is supplied).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/branding201Response'
        '406':
          description: Not Acceptable. The tenant could not be resolved from the caller's tenant_code header/domain, or the resolved tenant_code has no matching tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenantNotFoundResponse'
        '500':
          description: Internal Server Error. Whenever `org_code` is supplied, this is the real, current behavior instead of a successful organization-scoped response — a known server-side bug causes the lookup to fail with an unhandled error in that case.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverErrorResponse'
              example:
                responseCode: SERVER_ERROR
                message: Oops! Something Went Wrong.
                meta:
                  correlation: c1d14b05-0ac1-48a5-a53b-2ef6b9e55dd8
  /user/v1/public/userInvites:
    get:
      summary: Get an invited user's prefilled profile data
      operationId: userInvites
      tags:
        - Public APIs
      security: []
      description: |-
        This API resolves an org-invite's prefilled user profile data.
         - Endpoint: `/user/v1/public/userInvites`
         - `invitation_key` is a required query parameter.
         - `tenant_code` is a required request body field.
      parameters:
        - in: query
          name: invitation_key
          required: true
          schema:
            type: string
          description: Invitation key identifying the pending invite.
          example: 3f9c1a2b6d4e4b8a9f3c1a2b6d4e4b8a
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tenant_code
              properties:
                tenant_code:
                  type: string
                  description: Tenant code the invitation belongs to.
                  example: default_tenant
      responses:
        '200':
          description: OK. Invitee's prefilled profile data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userInvites200Response'
        '406':
          description: Not Acceptable. No matching, still-invited invitation exists for the given `invitation_key` and `tenant_code`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userInvites406Response'
        '500':
          description: Internal Server Error. This currently occurs (instead of a clean 400/422) when `invitation_key` or `tenant_code` is missing — this endpoint does not yet validate those fields before using them.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverErrorResponse'
              example:
                responseCode: SERVER_ERROR
                message: Oops! Something Went Wrong.
                meta:
                  correlation: 020b41f7-c6bb-40ac-8d02-a27adbd60d5b
  /user/v1/organization/create:
    post:
      summary: Create Organization
      tags:
        - Organization
      description: |
        Creates a new organization.
        - Endpoint: `/user/v1/organization/create`
        - Mandatory parameters marked as `required` must have valid values.
        - Parameters cannot be empty or null.
        - Caller must have the ADMIN_ROLE or TENANT_ADMIN_ROLE role, otherwise a 400 USER_IS_NOT_A_ADMIN is returned.
      operationId: createOrganization
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token required for API access. Available in the login API Response.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createOrganizationRequest'
      responses:
        '201':
          description: Created. Organization created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createOrganization201Response'
        '400':
          description: Bad Request. Either the organization's unique code/tenant combination already exists, or the supplied registration_code could not be processed.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/createOrganization400UniqueConstraintResponse'
                  - $ref: '#/components/schemas/createOrganization400RegCodeErrorResponse'
        '401':
          description: Unauthorized. Caller lacks the required permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createOrganization401Response'
        '406':
          description: Not Acceptable. Either an organization with this code already exists, the specified admin role could not be resolved, or the invited admin's credential record could not be created.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/createOrganization406AlreadyExistsResponse'
                  - $ref: '#/components/schemas/createOrganization406RoleNotFoundResponse'
                  - $ref: '#/components/schemas/createOrganization406CredentialErrorResponse'
        '422':
          description: Unprocessable Entity. Request-body validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createOrganization422Response'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createOrganization500Response'
  /user/v1/organization/update/{id}:
    patch:
      summary: Update Organization
      tags:
        - Organization
      description: |
        This API is associated with updating an organization.
        - Endpoint for updating organization: `/user/v1/organization/update/{id}`
        - It is mandatory to provide values for parameters marked with `required`.
        - Mandatory parameters cannot be empty or null.
        - Caller must be an ADMIN_ROLE, ORG_ADMIN_ROLE, or TENANT_ADMIN_ROLE. An org-admin/tenant-admin may only update their own organization; supplying ``related_orgs`` while updating a different organization is rejected (see updateOrganization400Response).
      operationId: updateOrganization
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is available in the login API response.
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Please append a valid organization ID to the request URL.
          schema:
            type: integer
          example: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateOrganizationRequest'
      responses:
        '202':
          description: Accepted. Organization updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/updateOrganization202Response'
        '400':
          description: Bad Request. Either the caller is not authorized to update this organization, or the update would violate a uniqueness constraint on the organization's code.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/updateOrganization400Response'
                  - $ref: '#/components/schemas/updateOrganization400UniqueConstraintResponse'
        '406':
          description: Not Acceptable. Organization not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/updateOrganization406Response'
  /user/v1/organization/list:
    get:
      summary: List Organization
      operationId: listOrganization
      tags:
        - Organization
      description: |
        This API is associated with listing organizations based on specified conditions.
        - Endpoint for listing organizations: `/user/v1/organization/list`
        - Mandatory parameters marked as `required` must have valid values.
        - Parameters cannot be empty or null.
        - The response shape depends on which parameters are supplied: (1) when `tenant_code` is present, a filtered array of organizations for that tenant is returned (optionally further filtered by `organization_codes`); (2) when `organizationIds` is supplied in the request body instead, an array of organizations for those ids is returned; (3) otherwise, a paginated listing is returned using `pageNo`/`pageSize`/`searchText`.
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is available in the login API response.
          required: true
          schema:
            type: string
        - in: query
          name: page
          description: Please specify the page number. Used only when neither tenant_code nor body.organizationIds is supplied (paginated branch).
          required: false
          schema:
            type: number
          example: 1
        - in: query
          name: limit
          description: Specify the number of records to limit. Used only in the paginated branch.
          required: false
          schema:
            type: number
          example: 2
        - in: query
          name: search
          description: Search for organizations based on name or title. Used only in the paginated branch.
          required: false
          schema:
            type: string
          example: john
        - in: query
          name: tenant_code
          description: When supplied, switches to the tenant-scoped array branch instead of the paginated branch.
          required: false
          schema:
            type: string
        - in: query
          name: organization_codes
          description: Comma-separated list of organization codes; only used together with tenant_code, to further filter the tenant-scoped branch.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK. Organizations listed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationList200Response'
        '401':
          description: Unauthorized. Caller lacks the required permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createOrganization401Response'
  /user/v1/organization/requestOrgRole:
    post:
      summary: Request Org Role
      description: |
        This API is associated with requesting a specific role within an organization.
        - Endpoint: `/user/v1/organization/requestOrgRole`
