components:
  securitySchemes:
    XAuthToken:
      type: apiKey
      in: header
      name: X-auth-token
      description: Session token issued by the login/generateToken APIs. Required on every endpoint unless noted otherwise.
    InternalAccessToken:
      type: apiKey
      in: header
      name: internal_access_token
      description: Shared secret for internal service-to-service calls, matched against `process.env.INTERNAL_ACCESS_TOKEN`. Used only on internal-only endpoints.
  schemas:
    createUserRequest:
      type: object
      description: Request payload for creating a user account. At least one of `email` or `phone` must be provided, and `phone_code` is required when `phone` is provided. Depending on the tenant's configured authentication mode, a `password` may be required or rejected.
      properties:
        name:
          type: string
          description: Name of the user. Alphabets and spaces only.
          example: Nevil Mathew
        email:
          type: string
          format: email
          description: User email. Required if `phone` is not provided.
          example: mentee@tunerlabs.com
        username:
          type: string
          description: Username (3-40 chars, lowercase letters/numbers/_/- or an email).
          example: mentee_3t7m88mvl5
        phone:
          type: string
          description: Phone number (7-15 digits). Required if `email` is not provided.
          example: '9876543210'
        phone_code:
          type: string
          description: Country calling code (2-4 chars). Required when `phone` is provided.
          example: '+91'
        password:
          type: string
          description: User password. Must satisfy the configured password policy; may be required depending on tenant allowed_auth_mode.
          example: Password@123
        otp:
          type: string
          description: 6-digit OTP. Required only when ENABLE_EMAIL_OTP_VERIFICATION is enabled for the tenant.
          example: '123456'
        role:
          type: string
          description: 'Role for the user. Conditionally validated: only checked when present, and must not be the admin role.'
          example: mentee
        registration_code:
          type: string
          description: Optional organization registration code used to attach the user to an org.
          example: org-signup-code
      anyOf:
        - required:
            - email
        - required:
            - phone
