  /user/v1/entity/read:
    get:
      summary: Read User Entity
      operationId: readUserEntity
      tags:
        - Entity APIs
      description: |
        This API retrieves a user entity by identifier.
        - Endpoint for retrieving a user entity: `/user/v1/entity/read`.
        - At least one identifier form must be supplied as a query parameter: either `id`, or the pair (`value` + `entity_type_id`). If neither is provided the request is rejected.
        - Example A (lookup by id): `?id=1`.
        - Example B (lookup by value + entity_type_id): `?value=AP&entity_type_id=4`.
      parameters:
        - name: X-auth-token
          in: header
          description: To use the API, include X-auth-token. This is available in the login API response.
          required: true
          schema:
            type: string
        - in: query
          name: id
          required: false
          description: The entity ID. Provide either `id` on its own, or `value` together with `entity_type_id`.
          schema:
            type: integer
          examples:
            byId:
              summary: Example A - lookup by id
              value: 1
        - in: query
          name: value
          required: false
          description: The entity value. Must be accompanied by `entity_type_id`. Used when `id` is not supplied.
          schema:
            type: string
          examples:
            byValueAndType:
              summary: Example B - lookup by value + entity_type_id
              value: AP
        - in: query
          name: entity_type_id
          required: false
          description: The entity type ID. Used together with `value` when `id` is not supplied.
          schema:
            type: integer
          examples:
            byValueAndType:
              summary: Example B - lookup by value + entity_type_id
              value: 4
      responses:
        '200':
          description: OK. User entities fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/readUserEntity200Response'
        '422':
          description: Unprocessable Entity. Returned when neither `id` nor (`value` + `entity_type_id`) was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/readUserEntity422Response'
