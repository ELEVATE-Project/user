  /user/v1/user-role/list:
    get:
      summary: Get User Roles
      operationId: listUserRole
      tags:
        - User Roles APIs
      description: |-
        Retrieve the list of user roles.

        - Endpoint: `/user/v1/user-role/list`
        - It is mandatory to provide values for parameters marked as `required`.
        - The X-auth-token obtained from the login API is required in the header.
      parameters:
        - name: X-auth-token
          in: header
          description: X-auth-token obtained from the login API response.
          required: true
          schema:
            type: string
        - in: query
          name: page
          description: Page number.
          schema:
            type: integer
        - in: query
          name: limit
          description: Number of records to limit.
          schema:
            type: integer
        - in: query
          name: search
          description: Search text matched against 'title' (case-insensitive, substring).
          schema:
            type: string
        - in: query
          name: language
          description: Optional. When provided and not 'en', role labels are localized via translations; when omitted or 'en', the translations field is stripped from each result row.
          schema:
            type: string
        - in: query
          name: title
          description: Optional filter. Must match ^[a-z_]+$.
          required: false
          schema:
            type: string
            pattern: ^[a-z_]+$
        - in: query
          name: user_type
          description: Optional filter. '0' (non-admin) or '1' (admin).
          required: false
          schema:
            type: string
            enum:
              - '0'
              - '1'
        - in: query
          name: visibility
          description: Optional filter. Only 'PUBLIC' is accepted.
          required: false
          schema:
            type: string
            enum:
              - PUBLIC
        - in: query
          name: status
          description: Optional filter. ACTIVE or INACTIVE.
          required: false
          schema:
            type: string
            enum:
              - ACTIVE
              - INACTIVE
        - in: query
          name: organization_id
          description: Optional filter. Must be numeric.
          required: false
          schema:
            type: string
            pattern: ^[0-9]+$
