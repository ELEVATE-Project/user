        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: Unique permission code. Must not contain spaces (matches `/^[a-z_]+$/`). Must be unique (checked against existing permissions).
                module:
                  type: string
                  description: Module name. Must not contain spaces (matches `/^[a-zA-Z_-]+$/`).
                request_type:
                  type: string
                  description: 'HTTP request type this permission covers. Must be one of: GET, POST, PATCH, PUT, DELETE. NOTE: validators/v1/permissions.js validates this as a single string via `.isIn([...])`, not an array, even though the create/update responses echo it back inside an array (`result.request_type`). Documented here per the validator; see gaps.jsonl for this discrepancy.'
                  enum:
                    - GET
                    - POST
                    - PATCH
                    - PUT
                    - DELETE
                api_path:
                  type: string
                  description: API path this permission applies to. Must match `/^\/[a-zA-Z0-9_]+\/v[0-9]+\/[a-zA-Z0-9_*:/\-]+(?:\/:[a-zA-Z0-9_]+)?$/`.
                status:
                  type: string
                  description: Optional permission status. Must not contain spaces (matches `/^[A-Za-z]*$/`) and, when provided, must be non-empty.
              required:
                - code
                - module
                - request_type
                - api_path
            examples:
              example1:
                value:
                  code: read_modules_list
                  module: modules
                  request_type: GET
                  api_path: /mentoring/v1/modules/list
                  status: ACTIVE
