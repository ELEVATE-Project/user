                  summary: No captured response available for this status/message (captured-responses.json has no entries for any role-permission-mapping endpoint); schema is types-only (no example values). Fields echoed back are snake_case (`role_title`, `permission_id`), matching services/role-permission-mapping.js create().
                  value:
                    responseCode: OK
                    message: ROLE_PERMISSION_CREATED_SUCCESSFULLY
                    result:
                      role_title: <string>
                      permission_id: 1
                      module: <string>
                      request_type:
                        - <string>
                    meta:
                      correlation: <string>
        '400':
          description: Role permission mapping could not be created (referenced permission does not exist, or the mapping already exists).
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseCode:
                    type: string
                  message:
                    type: string
                required:
                  - responseCode
                  - message
              examples:
                gap_permission_not_found:
                  summary: Per services/role-permission-mapping.js create() returns PERMISSION_NOT_FOUND when permissionsQueries.findPermissionId(permissionId) finds no matching permission. No captured response available. Shape only, no fabricated value.
                  value:
                    responseCode: CLIENT_ERROR
                    message: PERMISSION_NOT_FOUND
                gap_already_exists:
                  summary: Per services/role-permission-mapping.js create() returns ROLE_PERMISSION_ALREADY_EXISTS on a Sequelize UniqueConstraintError (role_title + permission_id mapping already exists). No captured response available. Shape only, no fabricated value.
                  value:
                    responseCode: CLIENT_ERROR
                    message: ROLE_PERMISSION_ALREADY_EXISTS
  /user/v1/role-permission-mapping/delete:
    delete:
      summary: Delete Role Permission Mapping
      description: |
        Delete a rolePermissionMapping for a user role.
        - Endpoint: `/user/v1/role-permission-mapping/delete`.
        - It is mandatory to provide values for parameters marked with `required`.
        - Mandatory parameters cannot be empty or null.
      operationId: deleteRolePermissionMapping
      tags:
        - RolePermissionMapping
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the admin.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permission_id:
                  type: string
                  description: Permission id. Must not be empty and must contain only digits (matches `/^[0-9]+$/`).
                role_title:
                  type: string
                  description: Role title. Must not be empty and must contain only lowercase letters/underscores (matches `/^[a-z_]+$/`).
              required:
                - permission_id
                - role_title
            examples:
              example1:
                value:
                  permission_id: '1'
                  role_title: mentor
      responses:
        '201':
          description: Role permission mapping deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseCode:
                    type: string
                  message:
                    type: string
                  result:
                    type: object
                    properties: {}
                  meta:
                    type: object
                    properties:
                      correlation:
                        type: string
              examples:
                gap_no_captured_example:
                  summary: 'No captured response available for this status/message (captured-responses.json has no entries for any role-permission-mapping endpoint); schema is types-only (no example values). `result` is genuinely `{}` per services/role-permission-mapping.js delete() (`result: {}`), so that part is code-confirmed.'
                  value:
                    responseCode: OK
                    message: ROLE_PERMISSION_DELETED_SUCCESSFULLY
                    result: {}
                    meta:
                      correlation: <string>
        '400':
          description: Role permission mapping not found for the given role_title/permission_id pair.
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseCode:
                    type: string
                  message:
                    type: string
                required:
                  - responseCode
                  - message
              examples:
                gap_not_found:
                  summary: Per services/role-permission-mapping.js delete() returns ROLE_PERMISSION_NOT_FOUND when rolePermissionMappingQueries.delete(filter) deletes zero rows. No captured response available. Shape only, no fabricated value.
                  value:
                    responseCode: CLIENT_ERROR
                    message: ROLE_PERMISSION_NOT_FOUND
  /user/v1/role-permission-mapping/list:
    get:
      summary: List Role Permissions
      description: |
        Get the list of permissions (grouped by module) granted to the caller's roles.
        - Endpoint: `/user/v1/role-permission-mapping/list`.
        This endpoint takes no request body and no query parameters: controllers/v1/role-permission-mapping.js `list` derives the role titles to look up entirely from `req.decodedToken.roles` (set by the auth middleware from the caller's token), and services/role-permission-mapping.js `list()` takes no other input.
      operationId: listRolePermissionMapping
      tags:
        - RolePermissionMapping
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the caller; the roles encoded in this token determine which permissions are returned.
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Role permissions fetched successfully (this endpoint always responds with HTTP 201, including the empty/not-found case below).
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseCode:
                    type: string
                  message:
                    type: string
                  result:
                    type: object
                    properties:
                      permissions:
                        type: array
                        items:
                          type: object
                          properties:
                            module:
                              type: string
                            request_type:
                              type: array
                              items:
                                type: string
                            service:
                              type: string
                  meta:
                    type: object
                    properties:
                      correlation:
                        type: string
              examples:
                gap_permissions_found:
                  summary: No captured response available for this status/message (captured-responses.json has no entries for any role-permission-mapping endpoint). This is the "permissions found" branch of services/role-permission-mapping.js list() (message FETCHED_ROLE_PERMISSION_SUCCESSFULLY, result.permissions non-empty, `service` is the literal value of common.USER_SERVICE). Schema is types-only, no fabricated example values.
                  value:
                    responseCode: OK
                    message: FETCHED_ROLE_PERMISSION_SUCCESSFULLY
                    result:
                      permissions:
                        - module: <string>
                          request_type:
                            - <string>
                          service: <string>
                    meta:
                      correlation: <string>
                gap_permissions_empty:
                  summary: No captured response available. This is the "no permissions found" branch of services/role-permission-mapping.js list() — note it still responds HTTP 201 with message ROLE_PERMISSION_NOT_FOUND (not an error status), and `result.permissions` is `[]`. Schema is types-only, no fabricated example values.
                  value:
                    responseCode: OK
                    message: ROLE_PERMISSION_NOT_FOUND
                    result:
                      permissions: []
                    meta:
                      correlation: <string>
        '401':
          description: Unauthorized. X-auth-token is either missing or invalid. (The handler itself always responds 201 - see note on that response - this is enforced by the auth middleware before the handler runs.)
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseCode:
                    type: string
                    example: UNAUTHORIZED
                  message:
                    type: string
                  error:
                    type: array
                    items:
                      type: object
                  meta:
                    type: object
  /user/health:
    get:
      summary: Service health status.
      description: |-
        This API is used to verify the health status of the user Service and its dependencies (Kafka, Redis, and downstream microservices such as EntityManagementService and SchedulerService). 
        * The API Endpoint for health check is /user/health
        * Both query parameters below are optional; there is no request body and no field-level validation for this endpoint
      operationId: healthCheck
      tags:
        - Health Check
      parameters:
        - name: basicCheck
          in: query
          required: false
          description: When set to a truthy value, skips the downstream microservice checks (EntityManagementService, SchedulerService) and only reports on directly-configured dependencies (Kafka, Redis). Read from req.query.basicCheck in health-checks/health-check.js.
          schema:
            type: boolean
        - name: serviceName
          in: query
          required: false
          description: Name of the calling service. Used only to avoid a self-check loop -- if a configured microservice's name matches this value, that microservice's check is skipped. Read from req.query.serviceName in health-checks/health-check.js.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Fixed identifier returned by the elevate-services-health-check package ("service.health.api").
                  version:
                    type: string
                    description: Version of the calling service's package.json (passed in as packageFile.version), NOT "ver".
                  ts:
                    type: string
                  params:
                    type: object
                    properties:
                      resmsgid:
                        type: string
                      msgid:
                        type: string
                      status:
                        type: string
                      err:
                        type: string
                        nullable: true
                        example: null
                      errMsg:
                        type: string
                        nullable: true
                        example: null
                  status:
                    type: number
                  result:
                    type: object
                    properties:
                      name:
                        type: string
                        description: config.name (health.config.js), i.e. process.env.SERVICE_NAME.
                      version:
                        type: string
                        description: config.version from health.config.js; health.config.js does not currently define a `version` key, so this field is typically absent/undefined in practice -- see gap.
                      healthy:
                        type: boolean
                      checks:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            healthy:
                              type: boolean
                            err:
                              type: string
                            errMsg:
                              type: string
                          required:
                            - name
                            - healthy
                            - err
                            - errMsg
              examples:
                Success Response:
                  value:
                    id: service.health.api
                    version: 3.3.24
                    ts: '2025-07-18T06:26:10.726Z'
                    params:
                      resmsgid: 189bdb70-63a0-11f0-b86a-3b7c197fc982
                      msgid: 189bdb71-63a0-11f0-b86a-3b7c197fc982
                      status: successful
                      err: null
                      errMsg: null
                    status: 200
                    result:
                      name: UserService
                      healthy: true
                      checks:
                        - name: Kafka
                          healthy: true
                          err: ''
                          errMsg: ''
                        - name: redis
                          healthy: true
                          err: ''
                          errMsg: ''
                        - name: EntityManagementService
                          healthy: true
                          err: ''
                          errMsg: ''
                        - name: SchedulerService
                          healthy: true
                          err: ''
                          errMsg: ''
        '400':
          description: Bad Request
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  ts:
                    type: string
                  params:
                    type: object
                    properties:
                      resmsgid:
                        type: string
                      msgid:
                        type: string
                      status:
                        type: string
                      err:
                        type: string
                      errMsg:
                        type: string
                  status:
                    type: number
                  result:
                    type: object
                    properties: {}
              examples:
                Bad Request:
                  value:
                    id: userService.Health.API
                    ts: '2025-07-18T04:43:35.352Z'
                    params:
                      resmsgid: c3b82b80-6391-11f0-9617-d554ca31487a
                      msgid: c3b82b81-6391-11f0-9617-d554ca31487a
                      status: failed
                      err: CONFIG_VALIDATION_ERROR
                      errMsg: "Missing 'url' for enabled service: redis"
                    status: 400
                    result: {}
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseCode:
                    type: string
                  message:
                    type: string
                  meta:
                    type: object
                    properties:
                      correlation:
                        type: string
              examples:
                Server Error:
                  value:
                    responseCode: SERVER_ERROR
                    message: Oops! Something Went Wrong.
                    meta:
                      correlation: d1915287-224c-4b31-b9f7-e6375bd38b4e
  /user/v1/account/acceptTermsAndCondition:
