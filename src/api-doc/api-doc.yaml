    tenantUpsertRequest:
      type: object
      description: Request payload for `POST /user/v1/tenant/update` (create, no `id` path param) or `POST /user/v1/tenant/update/{id}` (update, `id` path param present). The accepted fields and validation rules differ between the two branches, modeled below as `oneOf`. Server-managed fields (`status` on both branches; `id`, `created_by`, `updated_by`, `created_at`, `updated_at`, `deleted_at` on both; additionally `code` and `domains` on the update branch only) are always stripped from the request body server-side and cannot be set by the client, even though they appear as request-body fields on the create branch.
      oneOf:
        - title: createTenant
          type: object
          description: Used when no `id` path parameter is supplied (create branch). `name`, `code` and `domains` are required; `description` and `logo` must also be non-empty after trimming whitespace. `theming`, `configuration` and `meta` are optional and, if supplied as JSON strings, are parsed into objects server-side. `configuration`, when supplied, must match the shape described in the `configuration` property below.
          required:
            - name
            - code
            - description
            - logo
            - domains
          properties:
            name:
              type: string
              description: Display name of the tenant. Must not be empty after trimming.
              example: Replay Test Tenant
            code:
              type: string
              description: Unique tenant code. Letters, numbers and underscores only. Must not be empty after trimming.
              pattern: ^[a-zA-Z0-9_]+$
              example: tenant3t7o723zj5
            description:
              type: string
              description: Tenant description.
              example: created by replay script
            logo:
              type: string
              description: URL (or opaque string) for the tenant logo.
              example: https://example.com/logo.png
            theming:
              type: object
              description: Free-form theming object (or a JSON string representing one) - only checked for being a valid plain object, no fixed shape enforced by the validator.
              additionalProperties: true
              example:
                primaryColor: '#4F46E5'
                secondaryColor: '#F97316'
            configuration:
              type: object
              description: Tenant auth configuration. If omitted, defaults server-side to the deployment's configured default (typically `allowed_auth_mode` of `otp`/`password` and a default `auto_register` value). When supplied, `allowed_auth_mode` must be a non-empty array whose every entry is one of the deployment's allowed auth modes, and `auto_register` must be a boolean.
              required:
                - allowed_auth_mode
                - auto_register
              properties:
                allowed_auth_mode:
                  type: array
                  items:
                    type: string
                  description: Non-empty list of auth modes. Every entry must be a member of the environment-configured default allow-list (commonly `otp`/`password` - see field description above).
                  example:
                    - password
                auto_register:
                  type: boolean
                  example: true
            meta:
              type: object
              description: Free-form metadata object (or a JSON string representing one).
              additionalProperties: true
              example:
                test: '2341'
            domains:
              type: string
              description: One or more domains for the tenant. Accepted as a single string (comma-separated for multiple domains). Must not be empty after trimming.
              example: shikshalokam-qa.tekdinext.com
        - title: updateTenant
          type: object
          description: Used when an `id` path parameter is supplied (update branch). Only `configuration` is validated in this branch; `name`, `description`, `logo`, `theming` and `meta` are accepted but not validated, so if supplied they are applied as-is to the tenant record. `code`, `domains` and `status` are always stripped from the request body server-side even if supplied by the client, so they can never actually change tenant identity/domains via this endpoint (use the dedicated add/removeDomain endpoints for domains).
          additionalProperties: false
          properties:
            configuration:
              type: object
              description: Same shape/validation as the create-branch `configuration` field.
              required:
                - allowed_auth_mode
                - auto_register
              properties:
                allowed_auth_mode:
                  type: array
                  items:
                    type: string
                  example:
                    - password
                    - otp
                auto_register:
                  type: boolean
                  example: true
            name:
              type: string
              description: Accepted but unvalidated - see description above.
            description:
              type: string
              description: Accepted but unvalidated - see description above.
            logo:
              type: string
              description: Accepted but unvalidated - see description above.
            theming:
              type: object
              description: Accepted but unvalidated - see description above.
              additionalProperties: true
            meta:
              type: object
              description: Accepted but unvalidated - see description above.
              additionalProperties: true
