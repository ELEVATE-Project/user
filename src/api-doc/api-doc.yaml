        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is Available in login API Response.
          required: true
          schema:
            type: string
        - in: query
          name: fileName
          required: true
          description: Name of the file to be uploaded. Must not be empty.
          schema:
            type: string
          example: image.jpg
        - in: query
          name: dynamicPath
          required: false
          description: Optional. When provided, overrides the default destination path (`users/{userId}-{timestamp}-{fileName}`) with `{dynamicPath}/{fileName}`. Not covered by any server-side validator (no requiredness/format enforced).
          schema:
            type: string
          example: profile-images
        - in: query
          name: public
