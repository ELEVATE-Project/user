                      status:
                        type: string
                      module:
                        type: string
                      request_type:
                        type: array
                        items:
                          type: string
                  meta:
                    type: object
                    properties:
                      correlation:
                        type: string
                      meetingPlatform:
                        type: string
              examples:
                gap_no_captured_example:
                  summary: 'No captured response available for this status/message (captured-responses.json has no matching entry for permissions create); schema is types-only (no example values). Previous draft example values (Id: 40, module: ssss, correlation UUID, meetingPlatform BBB) were fabricated/copied from a sibling domain and have been removed.'
                  value:
                    responseCode: OK
                    message: PERMISSION_CREATED_SUCCESSFULLY
                    result:
                      Id: 1
                      status: <string>
                      module: <string>
                      request_type:
                        - <string>
                    meta:
                      correlation: <string>
                      meetingPlatform: <string>
        '400':
          description: Permission could not be created (unique constraint violation on `code`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseCode:
                    type: string
                  message:
                    type: string
                required:
                  - responseCode
