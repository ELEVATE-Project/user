          pattern: ^[A-Z][a-zA-Z\s]*$
          maxLength: 50
          description: Must start with an uppercase letter; letters and spaces only; max 50 characters.
          example: Head Master
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
          description: Optional. Must be one of ACTIVE or INACTIVE.
          example: ACTIVE
        translations:
          type: object
          nullable: true
          description: Optional. Free-form translations object.
