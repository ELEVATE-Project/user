  /user/v1/organization-feature/read/{id}:
    get:
      summary: Read Organization Feature
      operationId: readOrganizationFeature
      tags:
        - Organization Feature APIs
      description: |-
        Use this API to fetch a single organization feature by feature code.
        - Endpoint: `/user/v1/organization-feature/read/{id}` (GET). As with
          update, the `id` path param value is matched against the feature's
          `feature_code`, not a numeric id.

        - Header/role semantics for resolving organization_code/tenant_code
          are identical to the list operation above.

        - The feature is first looked up under the caller's own
          organization_code; if not found, it falls back to the tenant's
          default organization. If still not found, the request fails with
          ORG_FEATURE_NOT_FOUND.

        - Unlike the list operation, this lookup does not exclude
          created_by/updated_by/timestamp columns, so the response shape may
          differ from a list item.

        - The X-auth-token is mandatory and cannot be empty or null. '
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the logged-in user.
          required: true
          schema:
            type: string
        - name: organizationcode
          in: header
          required: false
          description: Organization code override. Only honored when the caller has the full `admin` role.
          schema:
            type: string
        - name: tenantcode
          in: header
          required: false
          description: Tenant code override. Only honored when the caller has the full `admin` role.
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: The organization feature's `feature_code` (string identifier). Not a numeric id despite the generic router parameter name.
          schema:
            type: string
          example: mitra
      responses:
        '200':
          description: OK. Organization feature fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/readOrganizationFeatureById200Response'
        '400':
          description: Bad Request. Either the organization/tenant code could not be resolved, or the feature was not found in the caller's organization or the tenant's default organization.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/organizationFeatureOrgOrTenantCodeNotFound400Response'
                  - $ref: '#/components/schemas/organizationFeatureReadNotFound400Response'
