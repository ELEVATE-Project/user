      operationId: readEntityType
      tags:
        - EntityType APIs
      description: |
        Use this API to retrieve a list of entity types.

        - Endpoint: `/user/v1/entity-type/read`
        - When no `value` is sent in the body, all system entity types for the organization are returned (flat array).
        - When a `value` is sent, matching user entity types (with their entities) are returned under `result.entity_types`.
        - The X-auth-token is mandatory and cannot be empty or null.
        - Optional `type`, `deleted`, and `status` query parameters are also accepted; see the parameter descriptions below for details.
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is available in the login API response.
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          description: Optional. Filter by entity type name.
          schema:
            type: string
        - name: deleted
          in: query
          required: false
          description: Optional. Filter by deleted status.
          schema:
            type: boolean
        - name: status
          in: query
          required: false
          description: Optional. Filter by status.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: array
                  description: Optional. Entity type value(s) to filter user entity types by.
                  items:
                    type: string
                read_user_entity:
                  type: boolean
            examples:
              allSystemEntityTypes:
                summary: Fetch all system entity types (no value)
                value: {}
              byValue:
                summary: Fetch user entity types by value
                value:
                  value:
                    - ln
                  read_user_entity: false
      responses:
