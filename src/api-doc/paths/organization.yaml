create:
  post:
    summary: Create Organization
    tags:
      - Organization
    description: 'Creates a new organization.

      - Endpoint: `/user/v1/organization/create`

      - Mandatory parameters marked as `required` must have valid values.

      - Parameters cannot be empty or null.

      - Caller must have the ADMIN_ROLE or TENANT_ADMIN_ROLE role, otherwise a 400 USER_IS_NOT_A_ADMIN
      is returned.

      '
    operationId: createOrganization
    parameters:
      - name: X-auth-token
        in: header
        description: X-auth-token required for API access. Available in the login API Response.
        required: true
        schema:
          type: string
    requestBody:
      content:
        application/json:
          schema:
            $ref: ../components/organization.yaml#/createOrganizationRequest
    responses:
      '201':
        description: 'Created. Organization created successfully. GAP: no captured success body exists
          for this endpoint - schema is shape-only, see gaps.jsonl.'
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/createOrganization201Response
      '400':
        description: 'Bad Request. Either a Sequelize unique-constraint violation (ORG_UNIQUE_CONSTRAIN_ERROR)
          or a registration_code processing error (REG_CODE_ERROR). GAP: no captured example for either
          - shape-only.'
        content:
          application/json:
            schema:
              oneOf:
                - $ref: ../components/organization.yaml#/createOrganization400UniqueConstraintResponse
                - $ref: ../components/organization.yaml#/createOrganization400RegCodeErrorResponse
      '401':
        description: Unauthorized. Caller lacks the required permissions.
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/createOrganization401Response
      '406':
        description: "Not Acceptable. Either the organization already exists (ORGANIZATION_ALREADY_EXISTS),
          the org_admin role could not be resolved (ROLE_NOT_FOUND), or the invited admin's credential
          record failed to be created. GAP: no captured example for any of these - shape-only."
        content:
          application/json:
            schema:
              oneOf:
                - $ref: ../components/organization.yaml#/createOrganization406AlreadyExistsResponse
                - $ref: ../components/organization.yaml#/createOrganization406RoleNotFoundResponse
                - $ref: ../components/organization.yaml#/createOrganization406CredentialErrorResponse
      '422':
        description: Unprocessable Entity. Request-body validation failed.
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/createOrganization422Response
      '500':
        description: Internal Server Error.
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/createOrganization500Response
update:
  '{id}':
    patch:
      summary: Update Organization
      tags:
        - Organization
      description: 'This API is associated with updating an organization.

        - Endpoint for updating organization: `/user/v1/organization/update/{id}`

        - It is mandatory to provide values for parameters marked with `required`.

        - Mandatory parameters cannot be empty or null.

        - Caller must be an ADMIN_ROLE, ORG_ADMIN_ROLE, or TENANT_ADMIN_ROLE. An org-admin/tenant-admin
        may only update their own organization; supplying ``related_orgs`` while updating a different
        organization is rejected (see updateOrganization400Response).

        '
      operationId: updateOrganization
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is available in the login
            API response.
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Please append a valid organization ID to the request URL.
          schema:
            type: integer
          example: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/updateOrganizationRequest
      responses:
        '202':
          description: Accepted. Organization updated successfully.
          content:
            application/json:
              schema:
                $ref: ../components/organization.yaml#/updateOrganization202Response
        '400':
          description: 'Bad Request. Caller not authorized to make this update (USER_IS_NOT_A_ADMIN /
            USER_DOES_NOT_HAVE_ACCESS / CONTACT_ADMIN_RELATED_ORGANIZATIONS), or a Sequelize
            unique-constraint violation (ORG_UNIQUE_CONSTRAIN_ERROR). GAP: no captured example for any
            of these - shape-only.'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: ../components/organization.yaml#/updateOrganization400Response
                  - $ref: ../components/organization.yaml#/updateOrganization400UniqueConstraintResponse
        '406':
          description: Not Acceptable. Organization not found.
          content:
            application/json:
              schema:
                $ref: ../components/organization.yaml#/updateOrganization406Response
list:
  get:
    summary: List Organization
    tags:
      - Organization
    description: 'This API is associated with listing organizations based on specified conditions.

      - Endpoint for listing organizations: `/user/v1/organization/list`

      - Mandatory parameters marked as `required` must have valid values.

      - Parameters cannot be empty or null.

      - services/organization.js#list has three branches with different response shapes: (1)
      ``tenant_code`` query param present -> filtered array of organizations for that tenant
      (optionally further filtered by ``organization_codes``); (2) no ``tenant_code`` but
      ``body.organizationIds`` present -> array of organizations for those ids (merged with any
      Redis-cached entries); (3) neither present -> paginated listing using ``pageNo``/``pageSize``/
      ``searchText``. Only branch (3) has a captured example; branches (1) and (2) are documented
      shape-only (see organizationListArrayResult in the components file) - GAP, see gaps.jsonl.

      '
    parameters:
      - name: X-auth-token
        in: header
        description: To make use of the API, you require X-auth-token. This is available in the login API
          response.
        required: true
        schema:
          type: string
      - in: query
        name: page
        description: Please specify the page number. Used only when neither tenant_code nor
          body.organizationIds is supplied (paginated branch).
        required: false
        schema:
          type: number
        example: 1
      - in: query
        name: limit
        description: Specify the number of records to limit. Used only in the paginated branch.
        required: false
        schema:
          type: number
        example: 2
      - in: query
        name: search
        description: Search for organizations based on name or title. Used only in the paginated branch.
        required: false
        schema:
          type: string
        example: john
      - in: query
        name: tenant_code
        description: When supplied, switches to the tenant-scoped array branch instead of the paginated
          branch.
        required: false
        schema:
          type: string
      - in: query
        name: organization_codes
        description: Comma-separated list of organization codes; only used together with tenant_code, to
          further filter the tenant-scoped branch.
        required: false
        schema:
          type: string
    responses:
      '200':
        description: OK. Organizations listed successfully.
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/organizationList200Response
requestOrgRole:
  post:
    summary: Request Org Role
    description: 'This API is associated with requesting a specific role within an organization.

      - Endpoint: `/user/v1/organization/requestOrgRole`

      - Mandatory parameters marked as `required` must have valid values.

      - Parameters cannot be empty or null.

      '
    tags:
      - Organization
    operationId: requestOrgRole
    parameters:
      - name: X-auth-token
        in: header
        description: User's access token, which already recognizes the user as the organization's mentee.
        required: true
        schema:
          type: string
    requestBody:
      description: Request body containing role information.
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/organization.yaml#/requestOrgRoleRequest
    responses:
      '201':
        description: Created. Role request submitted (or already approved).
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/requestOrgRole201Response
      '406':
        description: 'Not Acceptable. Requested role not found (ROLE_NOT_FOUND), or a role-change
          request is already pending (ROLE_CHANGE_PENDING). GAP: no captured example - shape-only.'
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/requestOrgRole406Response
read:
  get:
    summary: Read Organization
    tags:
      - Organization
    operationId: readOrganization
    description: 'Reads an organization by id or by code (+ optional tenant_code).

      - Endpoint: `/user/v1/organization/read`

      - At least one of `organisation_id` or `organisation_code` must be present
      (validators/v1/organization.js#read uses ``req.checkQuery().oneOf([...])`` - this is a
      genuine cross-field constraint between two query parameters and cannot be expressed as an
      OpenAPI ``required``/``oneOf`` on individual query parameters, so it is documented here in prose
      instead of forced into the parameter schema.)

      '
    parameters:
      - name: X-auth-token
        in: header
        required: true
        schema:
          type: string
      - name: organisation_id
        in: query
        required: false
        description: Organization id. At least one of organisation_id or organisation_code is required
          (see description above).
        schema:
          type: string
      - name: organisation_code
        in: query
        required: false
        description: Organization code. At least one of organisation_id or organisation_code is required
          (see description above). If used, an optional tenant_code query param further scopes the lookup.
        schema:
          type: string
      - name: tenant_code
        in: query
        required: false
        description: Optional tenant code, only used together with organisation_code.
        schema:
          type: string
    responses:
      '200':
        description: OK. Organization fetched successfully.
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/organizationRead200Response
      '406':
        description: 'Not Acceptable. Organization not found. GAP: no captured example - shape-only.'
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/organizationRead406Response
details:
  '{id}':
    get:
      summary: Organization Details
      tags:
        - Organization
      operationId: organizationDetails
      description: "Reads detailed organization info for an organization the caller belongs to.

        - Endpoint: `/user/v1/organization/details/{id}`

        - The caller must have a user-organization mapping for this tenant, and the requested
        organization id must be among the caller's mapped organizations, otherwise
        ORGANIZATION_NOT_ACCESSIBLE is returned.

        "
      parameters:
        - name: X-auth-token
          in: header
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Organization id.
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: OK. Organization details fetched successfully.
          content:
            application/json:
              schema:
                $ref: ../components/organization.yaml#/organizationDetails200Response
        '406':
          description: "Not Acceptable. Either the organization is not accessible to the caller
            (ORGANIZATION_NOT_ACCESSIBLE - captured example), or no organization record matches the id
            for the caller's tenant / the caller has no user-organization mapping at all
            (ORGANIZATION_NOT_FOUND - GAP, no captured example)."
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: ../components/organization.yaml#/organizationDetails406NotAccessibleResponse
                  - $ref: ../components/organization.yaml#/organizationDetails406NotFoundResponse
addRegistrationCode:
  '{id}':
    post:
      summary: Add Organization Registration Codes
      tags:
        - Organization
      operationId: addOrganizationRegistrationCode
      description: 'Adds one or more registration codes to an organization.

        - Endpoint: `/user/v1/organization/addRegistrationCode/{id}`

        - `id` here is the organization code (not the numeric id) - see
        controllers/v1/organization.js#addRegistrationCode.

        - Caller must be ADMIN_ROLE, ORG_ADMIN_ROLE, or TENANT_ADMIN_ROLE.

        - `tenant_code` in the request body is conditionally required only for ADMIN_ROLE callers - see
        addRegistrationCodeRequest.

        '
      parameters:
        - name: X-auth-token
          in: header
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Organization code.
          schema:
            type: string
          example: mentor112
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/addRegistrationCodeRequest
      responses:
        '202':
          description: 'Accepted. Registration codes added successfully. GAP: no captured example -
            shape-only.'
          content:
            application/json:
              schema:
                $ref: ../components/organization.yaml#/addRegistrationCode202Response
        '400':
          description: 'Bad Request. Caller not authorized (USER_IS_NOT_A_ADMIN), or an ADMIN_ROLE
            caller omitted tenant_code (TENANT_NOT_FOUND). GAP: no captured example - shape-only.'
          content:
            application/json:
              schema:
                $ref: ../components/organization.yaml#/addRegistrationCode400Response
        '406':
          description: 'Not Acceptable. Organization not found (captured example), one or more codes
            already exist on the organization (INVALID_REG_CODE_ERROR - GAP), or a Sequelize
            unique-constraint violation while bulk-creating (UNIQUE_CONSTRAINT_ERROR - GAP).'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: ../components/organization.yaml#/addRegistrationCode406NotFoundResponse
                  - $ref: ../components/organization.yaml#/addRegistrationCode406InvalidCodeResponse
                  - $ref: ../components/organization.yaml#/addRegistrationCode406UniqueConstraintResponse
removeRegistrationCode:
  '{id}':
    post:
      summary: Remove Organization Registration Codes
      tags:
        - Organization
      operationId: removeOrganizationRegistrationCode
      description: 'Removes one or more registration codes from an organization.

        - Endpoint: `/user/v1/organization/removeRegistrationCode/{id}`

        - `id` here is the organization code (not the numeric id) - see
        controllers/v1/organization.js#removeRegistrationCode.

        - Caller must be ADMIN_ROLE, ORG_ADMIN_ROLE, or TENANT_ADMIN_ROLE.

        - `tenant_code` in the request body is conditionally required only for ADMIN_ROLE callers - see
        removeRegistrationCodeRequest.

        '
      parameters:
        - name: X-auth-token
          in: header
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Organization code.
          schema:
            type: string
          example: mentor112
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/removeRegistrationCodeRequest
      responses:
        '202':
          description: 'Accepted. Registration codes removed successfully. GAP: no captured example -
            shape-only.'
          content:
            application/json:
              schema:
                $ref: ../components/organization.yaml#/removeRegistrationCode202Response
        '400':
          description: 'Bad Request. Caller not authorized (USER_IS_NOT_A_ADMIN), or an ADMIN_ROLE
            caller omitted tenant_code (TENANT_NOT_FOUND). GAP: no captured example - shape-only.'
          content:
            application/json:
              schema:
                $ref: ../components/organization.yaml#/removeRegistrationCode400Response
        '406':
          description: 'Not Acceptable. Organization not found (captured example), or one or more codes
            are not present on the organization (INVALID_REG_CODE_ERROR - GAP).'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: ../components/organization.yaml#/removeRegistrationCode406NotFoundResponse
                  - $ref: ../components/organization.yaml#/removeRegistrationCode406InvalidCodeResponse
addRelatedOrg:
  '{id}':
    post:
      summary: Add Related Organizations
      tags:
        - Organization
      operationId: addRelatedOrg
      description: 'Adds one or more related organization ids to an organization.

        - Endpoint: `/user/v1/organization/addRelatedOrg/{id}`

        - No entry exists for this operation in validators/v1/organization.js; ``related_orgs`` is
        optional at the HTTP layer (defaults to ``[]``).

        '
      parameters:
        - name: X-auth-token
          in: header
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Organization id.
          schema:
            type: integer
          example: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/addRelatedOrgRequest
      responses:
        '202':
          description: Accepted. Related organizations updated successfully.
          content:
            application/json:
              schema:
                $ref: ../components/organization.yaml#/addRelatedOrg202Response
        '406':
          description: 'Not Acceptable. Organization not found. GAP: no captured example - shape-only.'
          content:
            application/json:
              schema:
                $ref: ../components/organization.yaml#/addRelatedOrg406Response
removeRelatedOrg:
  '{id}':
    post:
      summary: Remove Related Organizations
      tags:
        - Organization
      operationId: removeRelatedOrg
      description: 'Removes one or more related organization ids from an organization.

        - Endpoint: `/user/v1/organization/removeRelatedOrg/{id}`

        - No entry exists for this operation in validators/v1/organization.js; ``related_orgs`` is
        optional at the HTTP layer (defaults to ``[]``).

        - GAP: this entire endpoint has no captured example in captured-responses.json (unlike its
        addRelatedOrg counterpart) - every response below is shape-only, see gaps.jsonl. HTTP method
        (POST) is inferred by symmetry with addRelatedOrg/addRegistrationCode/removeRegistrationCode,
        which are all POST despite the underlying router accepting any verb (``app.all``); it has not
        been independently verified for this specific endpoint.

        '
      parameters:
        - name: X-auth-token
          in: header
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: Organization id.
          schema:
            type: integer
          example: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../components/organization.yaml#/removeRelatedOrgRequest
      responses:
        '202':
          description: 'Accepted. Related organizations removed successfully. GAP: no captured example
            - shape-only.'
          content:
            application/json:
              schema:
                $ref: ../components/organization.yaml#/removeRelatedOrg202Response
        '406':
          description: 'Not Acceptable. Organization not found, or the removal is invalid (no
            related_orgs at all, or one or more supplied ids are not currently related). GAP: no
            captured example for either - shape-only.'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: ../components/organization.yaml#/removeRelatedOrg406NotFoundResponse
                  - $ref: ../components/organization.yaml#/removeRelatedOrg406RemovalFailedResponse
