read:
  '{id}':
    get:
      summary: Read Organization Feature
      operationId: readOrganizationFeature
      tags:
        - Organization Feature APIs
      description: >-
        Use this API to fetch a single organization feature by feature code.

        - Endpoint: `/user/v1/organization-feature/read/{id}` (GET). As with
          update, the `id` path param value is matched against the feature's
          `feature_code`, not a numeric id.

        - Header/role semantics for resolving organization_code/tenant_code
          are identical to the list operation above.

        - The feature is first looked up under the caller's own
          organization_code; if not found, it falls back to the tenant's
          default organization. If still not found, the request fails with
          ORG_FEATURE_NOT_FOUND.

        - Unlike the list operation, this lookup does not exclude
          created_by/updated_by/timestamp columns, so the response shape may
          differ from a list item.

        - The X-auth-token is mandatory and cannot be empty or null.
        '
      x-internal-note: >-
        controllers/v1/organization-feature.js#read dispatches to
        `read(id, ...)` when `req.params.id` is present.
        services/organization-feature.js#read implements the own-org-then-
        default-org fallback; default organization is
        `process.env.DEFAULT_ORGANISATION_CODE` (runtime config, not modeled
        in the schema). ORG_FEATURE_NOT_FOUND is statusCode 400 here, unlike
        the delete operation's use of the same message at 404 - see
        organizationFeatureReadNotFound400Response. The
        created_by/updated_by/timestamp inclusion was never captured live,
        see gaps.jsonl.
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the logged-in user.
          required: true
          schema:
            type: string
        - name: organizationcode
          in: header
          required: false
          description: >-
            Organization code override. Only honored when the caller has the
            full `admin` role.
          schema:
            type: string
        - name: tenantcode
          in: header
          required: false
          description: >-
            Tenant code override. Only honored when the caller has the full
            `admin` role.
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: >-
            The organization feature's `feature_code` (string identifier).
            Not a numeric id despite the generic router parameter name.
          schema:
            type: string
          example: mitra
      responses:
        '200':
          description: OK. Organization feature fetched successfully.
          x-internal-note: >-
            No live captured example exists for this case; see
            readOrganizationFeatureById200Response and gaps.jsonl.
          content:
            application/json:
              schema:
                $ref: ../components/organization-feature.yaml#/readOrganizationFeatureById200Response
        '400':
          description: >-
            Bad Request. Either the organization/tenant code could not be
            resolved, or the feature was not found in the caller's
            organization or the tenant's default organization.
          x-internal-note: >-
            Message keys ORGANIZATION_CODE_OR_TENANT_CODE_NOT_FOUND or
