read:
  '{id}':
    get:
      summary: Read Organization Feature
      tags:
        - Organization Feature APIs
      description: >-
        Use this API to fetch a single organization feature by feature code.

        - Endpoint: `/user/v1/organization-feature/read/{id}` (GET).
          controllers/v1/organization-feature.js#read dispatches to
          `read(id, ...)` when `req.params.id` is present. As with update,
          the `id` path param value is matched against the feature's
          `feature_code` column, not a numeric id.

        - Header/role semantics for resolving organization_code/tenant_code
          are identical to the list operation above.

        - services/organization-feature.js#read first looks up the feature
          under the caller's own organization_code; if not found, it falls
          back to looking it up under the tenant's default organization
          (`process.env.DEFAULT_ORGANISATION_CODE`, runtime config — not
          modeled in the schema). If still not found, the request fails with
          ORG_FEATURE_NOT_FOUND (statusCode 400 here, unlike the delete
          operation's use of the same message at 404 — see
          organizationFeatureReadNotFound400Response).

        - Unlike the list operation, this lookup does NOT exclude
          created_by/updated_by/timestamp columns, so the response shape may
          differ from a list item — GAP: never captured live, see
          gaps.jsonl.

        - The X-auth-token is mandatory and cannot be empty or null.
        '
      parameters:
        - name: X-auth-token
          in: header
          description: Access token of the logged-in user.
          required: true
          schema:
            type: string
        - name: organizationcode
          in: header
          required: false
          description: >-
            Organization code override. Only honored when the caller has the
            full `admin` role.
          schema:
            type: string
        - name: tenantcode
          in: header
          required: false
          description: >-
            Tenant code override. Only honored when the caller has the full
            `admin` role.
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: >-
            The organization feature's `feature_code` (string identifier).
            Not a numeric id despite the generic router parameter name.
          schema:
            type: string
          example: mitra
      responses:
        '200':
          description: >-
            OK. Organization feature fetched successfully. GAP - no live
            captured example exists for this case; see
            readOrganizationFeatureById200Response and gaps.jsonl.
          content:
            application/json:
              schema:
                $ref: ../components/organization-feature.yaml#/readOrganizationFeatureById200Response
        '400':
          description: >-
            Bad Request. One of ORGANIZATION_CODE_OR_TENANT_CODE_NOT_FOUND or
            ORG_FEATURE_NOT_FOUND (feature not found in the caller's org or
            the tenant's default org). GAP - no live captured example exists
            for either branch; see gaps.jsonl.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: ../components/organization-feature.yaml#/organizationFeatureOrgOrTenantCodeNotFound400Response
                  - $ref: ../components/organization-feature.yaml#/organizationFeatureReadNotFound400Response
