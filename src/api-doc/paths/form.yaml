create:
  post:
    summary: Create Form
    tags:
      - Form APIs
    description: 'This API is associated with creating a form.

      - Endpoint for creating a form: `/user/v1/form/create`

      - Mandatory parameters marked as `required` must have valid values.

      - Parameters cannot be empty or null.

      - `id`, `version`, and `organization_id` in the request body are ignored
      server-side (stripped before validation) even if supplied.

      '
    parameters:
      - name: X-auth-token
        in: header
        description: To make use of the API, you require X-auth-token. This is Available in login API Response.
        required: true
        schema:
          type: string
    requestBody:
      content:
        application/json:
          schema:
            $ref: ../components/form.yaml#/createFormRequest
    responses:
      '201':
        description: Created. Form created successfully. Example captured from a
          real response.
        content:
          application/json:
            schema:
              $ref: ../components/form.yaml#/createForm201Response
      '400':
        description: 'Bad Request. A form of the same type already exists. GAP:
          no captured example for this status/message — see
          components/form.yaml#/createForm400Response and gaps.jsonl.'
        content:
          application/json:
            schema:
              $ref: ../components/form.yaml#/createForm400Response
      '422':
        description: Unprocessable Entity. Request-body validation failed. Example
          captured from a real response.
        content:
          application/json:
            schema:
              $ref: ../components/form.yaml#/createForm422Response
update:
  '{formId}':
    patch:
      summary: Update Form
      tags:
        - Form APIs
      description: 'This API is associated with updating a form.

        - Endpoint for updating a form: `/user/v1/form/update/{formId}`

        - Mandatory parameters marked as `required` must have valid values.

        - Parameters cannot be empty or null.

        - `id`, `version`, and `organization_id` in the request body are ignored
        server-side (stripped before validation) even if supplied.

        - Cross-field note: `data.template_name` and `data.fields` are only valid
        together (validators/v1/form.js custom checks) — see
        components/form.yaml#/updateFormRequest for details.

        '
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is Available in login API
            Response.
          required: true
          schema:
            type: string
        - in: path
          name: formId
          required: true
          description: Please append a valid form ID to the request URL.
          schema:
            type: string
          example: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../components/form.yaml#/updateFormRequest
      responses:
        '202':
          description: 'Accepted. Form updated successfully. GAP: no captured
            example for this status/message — see
            components/form.yaml#/updateForm202Response and gaps.jsonl.'
          content:
            application/json:
              schema:
                $ref: ../components/form.yaml#/updateForm202Response
        '400':
          description: Bad Request. Form not found. Example captured from a real
            response.
          content:
            application/json:
              schema:
                $ref: ../components/form.yaml#/updateForm400Response
read:
  '{formId}':
    post:
      summary: Get Form Details
      tags:
        - Form APIs
      description: 'This API is associated with retrieving form details.

        - Endpoint for retrieving form details: `/user/v1/form/read/{formId}`

        - It is mandatory to provide values for parameters marked with `required`.

        - Mandatory parameters cannot be empty or null.

        - The controller (controllers/v1/form.js `read`) also supports being
        called with no `formId` and an empty body, in which case it returns the
        full list of form versions instead of a single form
        (readAllFormVersions200Response) — this variant is not separately
        addressable in this spec since the documented route requires `formId` in
        the path; flagged as a gap.

        - services/form.js `read` falls back from an org-specific form lookup to
        a default-organization form lookup before returning FORM_NOT_FOUND
        (cross-field-rules.json flags this fallback as an "unclear" finding,
        since the two lookups are not independent request fields).

        '
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is Available in login API
            Response.
          required: true
          schema:
            type: string
        - in: path
          name: formId
          required: true
          description: 'Please append a valid form Id to the Request URL. Note: the
            underlying controller treats this as optional (falls back to a body-based
            type/sub_type lookup, or to listing all form versions) but this documented
            route always supplies it — see the description above.'
          schema:
            type: integer
          example: 2
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../components/form.yaml#/readFormRequest
      responses:
        '200':
          description: 'OK. Form details retrieved successfully. GAP: no captured
            example for this status/message — see
            components/form.yaml#/readForm200Response and gaps.jsonl.'
          content:
            application/json:
              schema:
                $ref: ../components/form.yaml#/readForm200Response
        '400':
          description: 'Bad Request. Form not found (example captured from a real
            response) or tenant not found (GAP: no captured example) — see
            components/form.yaml#/readForm400Response and gaps.jsonl.'
          content:
            application/json:
              schema:
                $ref: ../components/form.yaml#/readForm400Response
