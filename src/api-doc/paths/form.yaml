                $ref: ../components/form.yaml#/updateForm202Response
        '400':
          description: Bad Request. Form not found.
          x-internal-note: Example captured from a real response.
          content:
            application/json:
              schema:
                $ref: ../components/form.yaml#/updateForm400Response
        '422':
          description: Unprocessable Entity. Request-body validation failed.
          content:
            application/json:
              schema:
