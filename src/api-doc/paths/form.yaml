create:
  post:
    summary: Create Form
    operationId: createForm
    tags:
      - Form APIs
    description: 'This API is associated with creating a form.

      - Endpoint for creating a form: `/user/v1/form/create`

      - Mandatory parameters marked as `required` must have valid values.

      - Parameters cannot be empty or null.

      - `id`, `version`, and `organization_id` in the request body are ignored
      server-side (stripped before validation) even if supplied.

      '
    parameters:
      - name: X-auth-token
        in: header
        description: To make use of the API, you require X-auth-token. This is Available in login API Response.
        required: true
        schema:
          type: string
    requestBody:
      content:
        application/json:
          schema:
            $ref: ../components/form.yaml#/createFormRequest
    responses:
      '201':
        description: Created. Form created successfully.
        x-internal-note: Example captured from a real response.
        content:
          application/json:
            schema:
              $ref: ../components/form.yaml#/createForm201Response
      '400':
        description: 'Bad Request. A form of the same type already exists.'
        x-internal-note: >-
          No captured example for this status/message — see
          components/form.yaml#/createForm400Response and gaps.jsonl.
        content:
          application/json:
            schema:
              $ref: ../components/form.yaml#/createForm400Response
      '422':
        description: Unprocessable Entity. Request-body validation failed.
        x-internal-note: Example captured from a real response.
        content:
          application/json:
            schema:
              $ref: ../components/form.yaml#/createForm422Response
      '401':
        description: Unauthorized. X-auth-token is either missing or invalid.
        x-internal-note: >-
          No captured example exists for this status on this endpoint -
          shape only, not a fabricated body.
        content:
          application/json:
            schema:
              type: object
              properties:
                responseCode:
                  type: string
                  example: UNAUTHORIZED
                message:
                  type: string
                error:
                  type: array
                  items:
                    type: object
                meta:
                  type: object
update:
  '{formId}':
    patch:
      summary: Update Form
      operationId: updateForm
      tags:
        - Form APIs
      description: 'This API is associated with updating a form.

        - Endpoint for updating a form: `/user/v1/form/update/{formId}`

        - Mandatory parameters marked as `required` must have valid values.

        - Parameters cannot be empty or null.

        - `id`, `version`, and `organization_id` in the request body are ignored
        server-side (stripped before validation) even if supplied.

        - Cross-field note: `data.template_name` and `data.fields` are only valid
        together.

        '
      x-internal-note: >-
        Cross-field validation for `data.template_name`/`data.fields` is
        enforced by validators/v1/form.js custom checks; request schema
        details at components/form.yaml#/updateFormRequest.
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is Available in login API
            Response.
          required: true
          schema:
            type: string
        - in: path
          name: formId
          required: true
          description: Please append a valid form ID to the request URL.
          schema:
            type: integer
          example: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../components/form.yaml#/updateFormRequest
      responses:
        '202':
          description: 'Accepted. Form updated successfully.'
          x-internal-note: >-
            No captured example for this status/message — see
            components/form.yaml#/updateForm202Response and gaps.jsonl.
          content:
