read:
  '{formId}':
    post:
      summary: Get Form Details
      operationId: readForm
      tags:
        - Form APIs
      description: 'This API is associated with retrieving form details.

        - Endpoint for retrieving form details: `/user/v1/form/read/{formId}`

        - It is mandatory to provide values for parameters marked with `required`.

        - Mandatory parameters cannot be empty or null.

        - Calling this endpoint with no `formId` and an empty body instead
        returns the full list of form versions (see
        readAllFormVersions200Response).

        - When a form is not found for the requesting organization, the
        lookup falls back to the default organization before returning a
        not-found error.

        '
      x-internal-note: >-
        The controller (controllers/v1/form.js `read`) supports the
        no-formId/empty-body variant; it is not separately addressable in
        this spec since the documented route requires `formId` in the path
        — flagged as a gap. The org-to-default-org fallback is in
        services/form.js `read`; cross-field-rules.json flags this fallback
        as an "unclear" finding, since the two lookups are not independent
        request fields.
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is Available in login API
            Response.
          required: true
          schema:
            type: string
        - in: path
          name: formId
          required: true
          description: 'Please append a valid form Id to the Request URL. Note: the
            underlying controller treats this as optional (falls back to a body-based
            type/sub_type lookup, or to listing all form versions) but this documented
            route always supplies it — see the description above.'
          schema:
            type: integer
          example: 2
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../components/form.yaml#/readFormRequest
            examples:
              byId:
                summary: Lookup by formId path parameter
                value: {}
              byTypeAndSubType:
                summary: Lookup by type/sub_type in body (no formId path parameter)
                value:
                  type: profile
                  sub_type: profileForm
              listAllVersions:
                summary: No formId and no body — returns the list of all form versions instead
                value: {}
      responses:
        '200':
          description: 'OK. Form details retrieved successfully.'
          x-internal-note: >-
            No captured example for this status/message — see
            components/form.yaml#/readForm200Response and gaps.jsonl.
          content:
            application/json:
              schema:
                $ref: ../components/form.yaml#/readForm200Response
        '400':
          description: 'Bad Request. Form not found, or the tenant could not be
            resolved.'
          x-internal-note: >-
            Form-not-found example captured from a real response;
            tenant-not-found has no captured example — see
            components/form.yaml#/readForm400Response and gaps.jsonl.
          content:
            application/json:
              schema:
                $ref: ../components/form.yaml#/readForm400Response
        '401':
          description: Unauthorized. X-auth-token is either missing or invalid.
          x-internal-note: >-
            No captured example exists for this status on this endpoint -
            shape only, not a fabricated body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseCode:
                    type: string
                    example: UNAUTHORIZED
                  message:
                    type: string
                  error:
                    type: array
                    items:
                      type: object
                  meta:
                    type: object
