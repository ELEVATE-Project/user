file:
  getSignedUrl:
    get:
      summary: Cloud Services - Get Signed URL
      operationId: getSignedUrl
      tags:
        - Cloud Services APIs
      description: 'This API is associated with cloud services for obtaining a signed URL.

        - Endpoint for cloud services: `/user/v1/cloud-services/file/getSignedUrl`

        - Mandatory parameters marked as `required` must have valid values.

        - Parameters cannot be empty or null.

        - `fileName` is the only required query parameter. Optional query parameters
        `dynamicPath` (overrides the default `users/{id}-{timestamp}-` prefix) and
        `public` (`true` targets the public asset bucket) are also accepted.

        '
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is Available in login API
            Response.
          required: true
          schema:
            type: string
        - in: query
          name: fileName
          required: true
          description: Name of the file to be uploaded. Must not be empty.
          x-internal-note: >-
            Validated server-side (validators/v1/cloud-services.js) — returns
            'fileName field is empty' when missing/blank. No captured example
            for this failure case.
          schema:
            type: string
          example: image.jpg
        - in: query
          name: dynamicPath
          required: false
          description: Optional. When provided, overrides the default destination path
            (`users/{userId}-{timestamp}-{fileName}`) with `{dynamicPath}/{fileName}`. Not covered
            by any server-side validator (no requiredness/format enforced).
          schema:
            type: string
          example: profile-images
        - in: query
          name: public
          required: false
          description: Optional. When set to the literal string `true`, the signed URL targets the
            public asset bucket (`PUBLIC_ASSET_BUCKETNAME`) instead of the default private storage
            bucket. Any other value (or absence) is treated as `false`. Not covered by any
            server-side validator.
          schema:
            type: string
            enum:
              - 'true'
              - 'false'
          example: 'false'
      responses:
        '200':
          description: OK. Signed URL obtained successfully.
          content:
            application/json:
              schema:
                $ref: ../components/cloudServices.yaml#/cloudServicesResponse200
              example:
                responseCode: OK
                message: Signed Url Generated Successfully.
                result:
                  signedUrl: https://mentoring-prod-storage-private.s3.ap-south-1.amazonaws.com/users/22-1784112986633-replay-test.csv?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Credential=AKIAIOSFODNN7EXAMPLE%2F20260715%2Fap-south-1%2Fs3%2Faws4_request&X-Amz-Date=20260715T105626Z&X-Amz-Expires=900&X-Amz-Signature=2fc0a2468900426ec838e8be740c743249414ade6eb233e2bb0eac7efe75c84a&X-Amz-SignedHeaders=host&x-id=PutObject
                  filePath: users/22-1784112986633-replay-test.csv
                  destFilePath: users/22-1784112986633-replay-test.csv
                meta:
                  formsVersion:
                    - id: 1
                      type: formsrggjf
                      version: 0
                    - id: 2
                      type: formsrggjf
                      version: 0
                    - id: 3
                      type: formcsfgof
                      version: 0
                    - id: 4
                      type: formcsfgof
                      version: 0
                    - id: 5
                      type: formsrggjf
                      version: 0
                    - id: 6
                      type: formhvedht
                      version: 0
                    - id: 7
