                      version: 0
                    - id: 9
                      type: formhvedht
                      version: 0
                  correlation: 2d1dc83e-8c81-41fa-8fc9-cdb86b167b62
        '401':
          description: Unauthorized. Missing or invalid X-auth-token.
          content:
            application/json:
              schema:
                $ref: ../components/cloudServices.yaml#/cloudServicesUnauthorizedResponse401
              example:
                responseCode: UNAUTHORIZED
                error: []
                meta:
                  correlation: 6a8c8513-0ac8-4eda-9298-576ea4752b1a
                message: You do not have the required permissions to access this resource. Please contact your administrator for assistance.
  getDownloadableUrl:
    get:
      summary: Cloud Services - Get Downloadable URL
      operationId: getDownloadableUrl
      tags:
        - Cloud Services APIs
      description: 'This API is associated with cloud services for obtaining a downloadable URL.

        - Endpoint for cloud services: `/user/v1/cloud-services/file/getDownloadableUrl`

        - Mandatory parameters marked as `required` must have valid values.

        - Parameters cannot be empty or null.

        - `filePath` is supplied as a query parameter. The optional `public` query
        parameter (`true`) targets the public asset bucket.

        '
      parameters:
        - name: X-auth-token
          in: header
          description: To make use of the API, you require X-auth-token. This is Available in login API
            Response.
          required: true
          schema:
            type: string
        - in: query
          name: filePath
          required: true
          description: Path of the file to be downloaded.
          x-internal-note: >-
            This endpoint has no entry in validators/v1/cloud-services.js, so
            there is no server-side requiredness/format check; it is marked
            required here only because it is the sole functional input of the
            operation.
          schema:
            type: string
          example: users/62832531a05cbd57b273aebb-1654149589875-image.jpg
        - in: query
          name: public
          required: false
          description: Optional. When set to the literal string `true`, the downloadable URL is
            generated against the public asset bucket. Not covered by any server-side validator.
          schema:
            type: string
            enum:
              - 'true'
              - 'false'
          example: 'false'
      responses:
        '200':
          description: OK. Downloadable URL obtained successfully.
          content:
            application/json:
              schema:
                $ref: ../components/cloudServices.yaml#/cloudServicesDownloadResponse200
              example:
                responseCode: OK
                message: Download Url Generated Successfully.
                result: https://mentoring-prod-storage-private.s3.ap-south-1.amazonaws.com/nonexistent/path/file.csv?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Credential=AKIAIOSFODNN7EXAMPLE%2F20260715%2Fap-south-1%2Fs3%2Faws4_request&X-Amz-Date=20260715T105626Z&X-Amz-Expires=900&X-Amz-Signature=74e535dcd6dccd9d6dd5d0398cac9ee99d066408ec04a44c6e5f7690c74587aa&X-Amz-SignedHeaders=host&x-id=GetObject
