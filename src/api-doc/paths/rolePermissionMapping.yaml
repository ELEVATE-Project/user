create:
  post:
    summary: Create Role Permission Mapping
    description: 'Create a rolePermissionMapping for a user role.

      - Endpoint: `/user/v1/role-permission-mapping/create`.

      - It is mandatory to provide values for parameters marked with `required`.

      - Mandatory parameters cannot be empty or null.

      '
    x-internal-note: >-
      A previous draft documented this endpoint as `POST
      /user/v1/rolePermissionMapping/create/{role_id}` with a `role_id` path
      parameter. This was fabricated/copied from a sibling domain:
      controllers/v1/role-permission-mapping.js `create` reads only
      `req.body.role_title`, `req.body.permission_id`, and
      `req.decodedToken.id` — no `role_id` path segment anywhere. Removed.
    operationId: createRolePermissionMapping
    tags:
      - RolePermissionMapping
    parameters:
      - name: X-auth-token
        in: header
        description: Access token of the admin.
        required: true
        schema: &id001
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              permission_id:
                type: string
                description: Permission id. Must not be empty and must contain only
                  digits (matches `/^[0-9]+$/`).
              role_title:
                type: string
                description: Role title. Must not be empty and must contain only
                  lowercase letters/underscores (matches `/^[a-z_]+$/`).
            required:
              - permission_id
              - role_title
          examples:
            example1:
              value:
                permission_id: '1'
                role_title: mentor
    responses:
      '201':
        description: Role permission mapping created successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                responseCode:
                  type: string
                message:
                  type: string
                result:
                  type: object
                  properties:
                    role_title:
                      type: string
                    permission_id:
                      type: number
                    module:
                      type: string
                    request_type:
                      type: array
                      items:
                        type: string
                meta:
                  type: object
                  properties:
                    correlation:
                      type: string
            examples:
              gap_no_captured_example:
                summary: 'No captured response available for this status/message
                  (captured-responses.json has no entries for any role-permission-mapping
                  endpoint); schema is types-only (no example values). Fields
                  echoed back are snake_case (`role_title`, `permission_id`),
                  matching services/role-permission-mapping.js create().'
                x-internal-note: >-
                  Previous draft example values (roleId: 2, permissionId: 1,
                  module: mentees, request_type: [GET], message "Permission
                  added to the role", correlation UUID) were fabricated/copied
                  from a sibling domain and have been removed, including a
                  fabricated meta field matching no real response field
                  anywhere in the codebase. The previous draft also claimed
                  camelCase (roleId/permissionId) fields, which was wrong.
                value:
                  responseCode: OK
                  message: ROLE_PERMISSION_CREATED_SUCCESSFULLY
                  result:
                    role_title: '<string>'
                    permission_id: 1
                    module: '<string>'
                    request_type:
                      - '<string>'
                  meta:
                    correlation: '<string>'
      '400':
        description: Role permission mapping could not be created (referenced permission
          does not exist, or the mapping already exists).
        content:
          application/json:
            schema:
              type: object
              properties:
                responseCode:
                  type: string
                message:
                  type: string
              required:
                - responseCode
                - message
            examples:
              gap_permission_not_found:
                summary: 'Per services/role-permission-mapping.js create() returns
                  PERMISSION_NOT_FOUND when permissionsQueries.findPermissionId(permissionId)
                  finds no matching permission. No captured response available. Shape
                  only, no fabricated value.'
                value:
                  responseCode: CLIENT_ERROR
                  message: PERMISSION_NOT_FOUND
              gap_already_exists:
                summary: 'Per services/role-permission-mapping.js create() returns
                  ROLE_PERMISSION_ALREADY_EXISTS on a Sequelize UniqueConstraintError
                  (role_title + permission_id mapping already exists). No captured
                  response available. Shape only, no fabricated value.'
                value:
                  responseCode: CLIENT_ERROR
                  message: ROLE_PERMISSION_ALREADY_EXISTS
delete:
  delete:
    summary: Delete Role Permission Mapping
    description: 'Delete a rolePermissionMapping for a user role.

      - Endpoint: `/user/v1/role-permission-mapping/delete`.

      - It is mandatory to provide values for parameters marked with `required`.

      - Mandatory parameters cannot be empty or null.

      '
    x-internal-note: >-
      A previous draft documented this endpoint as `POST
      /user/v1/rolePermissionMapping/delete/{role_id}` returning HTTP 202
      with a `role_id` path parameter. Both were fabricated/copied from a
      sibling domain: controllers/v1/role-permission-mapping.js `delete`
      reads only `req.body.role_title`/`req.body.permission_id` (no path
      parameter), and services/role-permission-mapping.js `delete()`
      responds with `httpStatusCode.created` (201), never 202. Corrected.
    operationId: deleteRolePermissionMapping
    tags:
      - RolePermissionMapping
    parameters:
      - name: X-auth-token
        in: header
        description: Access token of the admin.
        required: true
        schema: *id001
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              permission_id:
                type: string
                description: Permission id. Must not be empty and must contain only
                  digits (matches `/^[0-9]+$/`).
              role_title:
                type: string
                description: Role title. Must not be empty and must contain only
                  lowercase letters/underscores (matches `/^[a-z_]+$/`).
            required:
              - permission_id
              - role_title
          examples:
            example1:
              value:
                permission_id: '1'
                role_title: mentor
    responses:
      '201':
        description: Role permission mapping deleted successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                responseCode:
                  type: string
                message:
                  type: string
                result:
                  type: object
                  properties: {}
                meta:
                  type: object
                  properties:
                    correlation:
                      type: string
            examples:
              gap_no_captured_example:
                summary: 'No captured response available for this status/message
                  (captured-responses.json has no entries for any role-permission-mapping
                  endpoint); schema is types-only (no example values). `result`
                  is genuinely `{}` per services/role-permission-mapping.js
                  delete() (`result: {}`), so that part is code-confirmed.'
                x-internal-note: >-
                  Previous draft claimed status code 202 and message
                  "ROLE_PERMISSION_MAPPING_DELETED_SUCCESSFULLY" with a
                  fabricated correlation example and a fabricated meta field
                  matching no real response field anywhere in the codebase;
                  both the status code and message string were wrong and
                  have been corrected/removed.
                value:
                  responseCode: OK
                  message: ROLE_PERMISSION_DELETED_SUCCESSFULLY
                  result: {}
                  meta:
                    correlation: '<string>'
      '400':
        description: Role permission mapping not found for the given role_title/permission_id
          pair.
        content:
          application/json:
            schema:
              type: object
              properties:
                responseCode:
                  type: string
                message:
                  type: string
              required:
                - responseCode
                - message
            examples:
              gap_not_found:
                summary: 'Per services/role-permission-mapping.js delete() returns
                  ROLE_PERMISSION_NOT_FOUND when rolePermissionMappingQueries.delete(filter)
                  deletes zero rows. No captured response available. Shape only,
                  no fabricated value.'
                value:
                  responseCode: CLIENT_ERROR
                  message: ROLE_PERMISSION_NOT_FOUND
list:
  get:
    summary: List Role Permissions
    description: "Get the list of permissions (grouped by module) granted to the
      caller's roles.

      - Endpoint: `/user/v1/role-permission-mapping/list`.

      This endpoint takes no request body and no query parameters: controllers/v1/role-permission-mapping.js
      `list` derives the role titles to look up entirely from `req.decodedToken.roles`
      (set by the auth middleware from the caller's token), and services/role-permission-mapping.js
      `list()` takes no other input.

      "
    operationId: listRolePermissionMapping
    tags:
      - RolePermissionMapping
    parameters:
      - name: X-auth-token
        in: header
        description: Access token of the caller; the roles encoded in this token
          determine which permissions are returned.
        required: true
        schema: *id001
    responses:
      '201':
        description: Role permissions fetched successfully (this endpoint always
          responds with HTTP 201, including the empty/not-found case below).
        content:
          application/json:
            schema:
              type: object
              properties:
                responseCode:
                  type: string
                message:
                  type: string
                result:
                  type: object
                  properties:
                    permissions:
                      type: array
                      items:
                        type: object
                        properties:
                          module:
                            type: string
                          request_type:
                            type: array
                            items:
                              type: string
                          service:
                            type: string
                meta:
                  type: object
                  properties:
                    correlation:
                      type: string
            examples:
              gap_permissions_found:
                summary: 'No captured response available for this status/message
                  (captured-responses.json has no entries for any role-permission-mapping
                  endpoint). This is the "permissions found" branch of services/role-permission-mapping.js
                  list() (message FETCHED_ROLE_PERMISSION_SUCCESSFULLY, result.permissions
                  non-empty, `service` is the literal value of common.USER_SERVICE).
                  Schema is types-only, no fabricated example values.'
                value:
                  responseCode: OK
                  message: FETCHED_ROLE_PERMISSION_SUCCESSFULLY
                  result:
                    permissions:
                      - module: '<string>'
                        request_type:
                          - '<string>'
                        service: '<string>'
                  meta:
                    correlation: '<string>'
              gap_permissions_empty:
                summary: 'No captured response available. This is the "no permissions
                  found" branch of services/role-permission-mapping.js list() —
                  note it still responds HTTP 201 with message ROLE_PERMISSION_NOT_FOUND
                  (not an error status), and `result.permissions` is `[]`. Schema
                  is types-only, no fabricated example values.'
                value:
                  responseCode: OK
                  message: ROLE_PERMISSION_NOT_FOUND
                  result:
                    permissions: []
                  meta:
                    correlation: '<string>'
      '401':
        description: >-
          Unauthorized. X-auth-token is either missing or invalid. (The
          handler itself always responds 201 - see note on that response -
          this is enforced by the auth middleware before the handler runs.)
        x-internal-note: >-
          No captured example exists for this status on this endpoint -
          shape only, not a fabricated body.
        content:
          application/json:
            schema:
              type: object
              properties:
                responseCode:
                  type: string
                  example: UNAUTHORIZED
                message:
                  type: string
                error:
                  type: array
                  items:
                    type: object
                meta:
                  type: object
