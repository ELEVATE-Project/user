                              id:
                                type: number
                              code:
                                type: string
                              module:
                                type: string
                              request_type:
                                type: array
                                items:
                                  type: string
                              api_path:
                                type: string
                              status:
                                type: string
                        count:
                          type: number
                meta:
                  type: object
                  properties:
                    correlation:
                      type: string
            examples:
              gap_no_captured_example:
                summary: 'No captured response available for this status/message
                  (the only captured-responses.json entry keyed to a permissions
                  endpoint, "GET /mentoring/v1/permissions/list", is explicitly annotated
                  "actual response: route not under this service base path" — it
                  reflects the generic 401 auth-middleware response, not a genuine
                  200 list body). Schema is types-only.'
                x-internal-note: >-
                  Previous draft example values (id: 3, code:
                  read_modules_list, count: 1, correlation UUID) were
                  fabricated/copied from a sibling domain and have been
                  removed, including a fabricated meta field matching no real
                  response field anywhere in the codebase.
                value:
                  responseCode: OK
                  message: PERMISSION_FETCHED_SUCCESSFULLY
                  result:
                    results:
                      data:
                        - id: 1
                          code: '<string>'
                          module: '<string>'
                          request_type:
                            - '<string>'
                          api_path: '<string>'
                          status: '<string>'
                      count: 1
                  meta:
                    correlation: '<string>'
      '400':
        description: Permission list is empty.
        content:
          application/json:
            schema:
              type: object
              properties:
                responseCode:
                  type: string
                message:
                  type: string
              required:
                - responseCode
                - message
            examples:
              gap_no_captured_example:
                summary: 'Per services/permissions.js list() returns PERMISSION_HAS_EMPTY_LIST
                  when permissions.rows == 0 || permissions.count == 0. No captured
                  response available. Shape only.'
                value:
                  responseCode: '<string>'
                  message: PERMISSION_HAS_EMPTY_LIST
      '401':
        description: Unauthorized - the caller does not have permission to access
          this resource.
        content:
          application/json:
            schema:
              type: object
              properties:
                responseCode:
                  type: string
                error:
                  type: array
                  items:
                    type: object
                meta:
                  type: object
                  properties:
                    correlation:
                      type: string
                message:
                  type: string
            examples:
              captured_example:
                summary: 'Captured from captured-responses.json key "GET /mentoring/v1/permissions/list",
                  case "actual response: route not under this service base path".
                  CAVEAT: this was captured by hitting the wrong service base path
                  (`/mentoring/...` instead of `/user/...`); it is a real, non-fabricated
                  HTTP response, but it demonstrates this service''s shared auth-middleware
                  401 shape rather than a confirmed capture of the real `/user/v1/permissions/list`
                  endpoint.'
                value:
                  responseCode: UNAUTHORIZED
                  error: []
                  meta:
                    correlation: a275d632-a7af-4113-8171-bf16d76102a6
                  message: You do not have the required permissions to access this
