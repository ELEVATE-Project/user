    tags:
      - Permissions
    parameters:
      - name: X-auth-token
        in: header
        description: Access token of the admin.
        required: true
        schema:
          type: string
      - name: page
        in: query
        description: Page number for pagination.
        required: false
        schema:
          type: integer
      - name: limit
        in: query
        description: Number of items per page.
        required: false
        schema:
          type: integer
      - in: query
        name: search
        description: search on code
        schema:
          type: string
        required: false
    responses:
      '200':
        description: ''
        content:
          application/json:
            schema:
              type: object
              properties:
                responseCode:
                  type: string
                message:
                  type: string
                result:
                  type: object
                  properties:
                    results:
                      type: object
                      properties:
                        data:
                          type: array
                          items:
                            type: object
