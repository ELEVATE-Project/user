updateUser:
  '{id}':
    post:
      summary: Update User Roles (org admin)
      operationId: updateUserRolesOrgAdmin
      description: >-
        Assign roles to a user within the caller's own organization.
      x-internal-note: >-
        Unlike every other org-admin endpoint, this controller method
        performs no ORG_ADMIN_ROLE/TENANT_ADMIN_ROLE authorization check at
        all (controllers/v1/org-admin.js updateUser has no
        validateRoleAccess call), and no express-validator entry exists for
        it either (validators/v1/org-admin.js has no updateUser export).
        Any authenticated caller can invoke it. Flagged here as a known gap
        rather than silently documented as if it were access-controlled.
      tags:
        - Org Admin APIs
      parameters:
        - name: X-auth-token
          in: header
          description: Access token.
          required: true
          schema:
            type: string
        - name: id
          in: path
          description: ID of the user whose roles are being updated.
          required: true
          schema:
            type: integer
            example: 12
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: ../components/org-admin.yaml#/updateUserRequest
      responses:
        '200':
          description: OK. Roles updated.
          x-internal-note: No captured example for this status; shape-only schema.
          content:
            application/json:
              schema:
                $ref: ../components/org-admin.yaml#/updateUser200Response
        '400':
          description: >-
            Bad Request. Three distinct causes share this status code: user
            not found, role lookup returned falsy, or body.organization_id
            does not match the caller's own organization.
