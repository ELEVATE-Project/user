# NOTE on routing (see routes/index.js generic router + captured-responses.json
# keys, which reflect the live boot's actual method dispatch):
#   - Most methods:        /user/v1/org-admin/{method}
#   - getRequestDetails:    /user/v1/org-admin/getRequestDetails/{id}   (path param, GET)
#   - updateUser:           /user/v1/org-admin/updateUser/{id}          (path param, POST)
#   - deactivateUser:       /user/v1/org-admin/deactivateUser           (NO id -- body-only)
# GAP: the top-level src/api-doc/openapi.yaml currently wires
# `/user/v1/org-admin/deactivateUser/{id}` -> `./paths/org-admin.yaml#/deactivateUser/{id}`,
# which is wrong for this controller (org-admin's deactivateUser takes
# {ids[], emails[]} in the body and never reads req.params.id -- that {id}
# shape belongs to the unrelated admin.js deactivateUser). openapi.yaml also
# has no top-level entry at all for updateUser or createUsers, and its
# getRequestDetails entry is missing the /{id} segment. Fixing openapi.yaml
# is out of scope for this domain pass (it is a shared, multi-domain file);
# recorded as a gap instead. The structure below is written so the id-only
# fix is a one-line change in openapi.yaml.
