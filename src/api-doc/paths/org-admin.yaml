# NOTE on routing (see routes/index.js generic router + captured-responses.json
# keys, which reflect the live boot's actual method dispatch):
#   - Most methods:        /user/v1/org-admin/{method}
#   - getRequestDetails:    /user/v1/org-admin/getRequestDetails/{id}   (path param, GET)
#   - updateUser:           /user/v1/org-admin/updateUser/{id}          (path param, POST)
#   - deactivateUser:       /user/v1/org-admin/deactivateUser           (NO id -- body-only)
# GAP: the top-level src/api-doc/openapi.yaml currently wires
# `/user/v1/org-admin/deactivateUser/{id}` -> `./paths/org-admin.yaml#/deactivateUser/{id}`,
# which is wrong for this controller (org-admin's deactivateUser takes
# {ids[], emails[]} in the body and never reads req.params.id -- that {id}
# shape belongs to the unrelated admin.js deactivateUser). openapi.yaml also
# has no top-level entry at all for updateUser or createUsers, and its
# getRequestDetails entry is missing the /{id} segment. Fixing openapi.yaml
# is out of scope for this domain pass (it is a shared, multi-domain file);
# recorded as a gap instead. The structure below is written so the id-only
# fix is a one-line change in openapi.yaml.
getRequests:
  post:
    summary: Get Requests
    operationId: getRequests
    description: 'Get a list of organization requests based on specified filters

      - Endpoint: `/user/v1/org-admin/getRequests`.

      - It is mandatory to provide values for parameters marked with `required`.

      - Mandatory parameters cannot be empty or null.

      - No express-validator entry exists for this operation (validators/v1/org-admin.js
      has no getRequests export); the request body shape below is inferred from
      controller/service usage only, not enforced ground truth.

      '
    tags:
      - Org Admin APIs
    parameters:
      - name: X-auth-token
        in: header
        description: Access token of the org admin.
        required: true
        schema:
          type: string
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: ../components/org-admin.yaml#/getRequestsRequest
    responses:
      '200':
        description: OK. Successfully fetched organization requests. (real captured example)
        content:
          application/json:
            schema:
              $ref: ../components/org-admin.yaml#/getRequests200Response
      '400':
        description: >-
          Bad Request. Caller is not an org_admin/tenant_admin.
          GAP: no captured example for this status/message on this endpoint.
        content:
          application/json:
            schema:
              $ref: ../components/org-admin.yaml#/orgAdminNotAdminResponse
