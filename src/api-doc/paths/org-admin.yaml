        content:
          application/json:
            schema:
              $ref: ../components/org-admin.yaml#/updateRequestStatus500Response
            example:
              responseCode: SERVER_ERROR
              message: Oops! Something Went Wrong.
              meta:
                correlation: 57887cc5-885e-475c-b5dc-6daae99b2342
