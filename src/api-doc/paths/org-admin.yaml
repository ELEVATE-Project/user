                  responseCode: CLIENT_ERROR
                  error: []
                  message: Users from the default organization are not permitted to proceed with this action.
                  meta:
                    correlation: 281c1bf5-0f52-4058-a0e9-4e6066fed5b3
              entityTypeNotFound:
                summary: No matching entity type in the default org (GAP, no captured body)
                value:
                  responseCode: CLIENT_ERROR
                  error: []
                  message: ENTITY_TYPE_NOT_FOUND (GAP, no captured body)
updateUser:
  '{id}':
    post:
      summary: Update User Roles (org admin)
      operationId: updateUserRolesOrgAdmin
      description: "Assign roles to a user within the caller's own organization.

        - Endpoint: `/user/v1/org-admin/updateUser/{id}`.

        - GAP: unlike every other org-admin endpoint, this controller method
        performs NO ORG_ADMIN_ROLE/TENANT_ADMIN_ROLE authorization check at
        all (controllers/v1/org-admin.js updateUser has no
        validateRoleAccess call), and NO express-validator entry exists
        for it either (validators/v1/org-admin.js has no updateUser
        export). Any authenticated caller can invoke it. Flagged as a gap
        rather than silently documented as if it were access-controlled.

        "
      tags:
        - Org Admin APIs
      parameters:
        - name: X-auth-token
          in: header
          description: Access token.
          required: true
          schema:
            type: string
        - name: id
          in: path
          description: ID of the user whose roles are being updated.
          required: true
          schema:
            type: integer
            example: 12
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: ../components/org-admin.yaml#/updateUserRequest
      responses:
        '200':
          description: >-
            OK. Roles updated. GAP: no captured example for this status;
            shape-only schema.
          content:
            application/json:
              schema:
                $ref: ../components/org-admin.yaml#/updateUser200Response
        '400':
          description: >-
            Bad Request. Three distinct causes share this status code: user
            not found (real captured example), role lookup returned falsy
            (GAP, no capture, likely-dead-code branch -- see component
            description), or body.organization_id does not match the
            caller's own organization (GAP, no capture).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: ../components/org-admin.yaml#/updateUser400NotFoundResponse
                  - $ref: ../components/org-admin.yaml#/updateUser400InvalidRoleResponse
                  - $ref: ../components/org-admin.yaml#/updateUser400NoAccessResponse
              examples:
                userNotFound:
                  summary: No user matches {id} (real capture)
                  value:
                    responseCode: CLIENT_ERROR
                    error: []
                    message: User not found.
                    meta:
                      correlation: 8564f9de-7b4f-4746-a63a-43193ff08c13
                invalidRoleAssignments:
                  summary: Role lookup returned falsy (GAP, no captured body)
                  value:
                    responseCode: CLIENT_ERROR
