inheritEntityType:
  post:
    summary: Inherit Entity Type
    operationId: inheritEntityType
    description: "Inherit an entity type from the default organization into the
      caller's organization.

      - It is mandatory to provide values for parameters marked with `required`.

      - Mandatory parameters cannot be empty or null.

      - Whether the caller's own organization is the default organization is
      determined by comparing the caller's organization code against the
      configured default organization code for the deployment. Because this
      depends on deployment configuration, the caller's organization must
      not itself be the default organization for this operation to succeed.

      "
    x-internal-note: >-
      The default-organization check compares tokenInformation.organization_code
      against the `DEFAULT_ORGANISATION_CODE` environment variable. This is a
      deployment-config-dependent rule and is documented in prose here rather
      than modeled as a schema constraint (it cannot be expressed from the
      request body alone).
    tags:
      - Org Admin APIs
    parameters:
      - name: X-auth-token
        in: header
        description: Access token of the org admin.
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/org-admin.yaml#/inheritEntityTypeRequest
    responses:
      '201':
        description: Created. Entity type inherited successfully.
        x-internal-note: >-
          A previous draft incorrectly documented this as 202 Accepted with
          a fabricated example body; corrected to 201 (httpStatusCode.created
          in services/org-admin.js). No captured example exists - schema is
          shape-only.
        content:
          application/json:
            schema:
              $ref: ../components/org-admin.yaml#/inheritEntityType201Response
      '400':
        description: >-
          Bad Request. Three distinct causes share this status code: caller's
          org is the default org, no matching entity type found under the
          default org, or caller is not an org_admin/tenant_admin.
        x-internal-note: >-
          Only userIsFromDefaultOrg below is a real capture. entityTypeNotFound
          (ENTITY_TYPE_NOT_FOUND) has no captured body - shape-only.
        content:
          application/json:
            schema:
              oneOf:
                - $ref: ../components/org-admin.yaml#/inheritEntityType400DefaultOrgResponse
                - $ref: ../components/org-admin.yaml#/inheritEntityType400NotFoundResponse
                - $ref: ../components/org-admin.yaml#/orgAdminNotAdminResponse
