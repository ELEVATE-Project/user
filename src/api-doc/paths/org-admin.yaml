deactivateUser:
  post:
    summary: Deactivate User(s)
    operationId: deactivateUserOrgAdmin
    description: "Deactivate one or more users in the org admin's organization by
      ID and/or email (bulk arrays in the body -- NOT a /{id} path route).

      - Endpoint: `/user/v1/org-admin/deactivateUser`.

      - It is mandatory to provide values for parameters marked with `required`.

      - Mandatory parameters cannot be empty or null.

      - Cross-field rule (cross-field-rules.json): ids/emails is an
      at-least-one-of relationship, enforced by an express-validator
      custom() check (validators/v1/org-admin.js) that runs BEFORE the
      service is invoked -- see the 422 response.

      "
    tags:
      - Org Admin APIs
    parameters:
      - name: X-auth-token
        in: header
        description: Access token of the org admin.
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/org-admin.yaml#/deactivateUserRequest
          examples:
            byIds:
              summary: Deactivate by ids
              value:
                ids: [12, 13]
            byEmails:
              summary: Deactivate by emails
              value:
                emails: ['user@example.com']
    responses:
      '200':
        description: >-
          OK. Users deactivated. GAP: no captured example for this status;
          shape-only schema.
        content:
          application/json:
            schema:
              $ref: ../components/org-admin.yaml#/deactivateUser200Response
      '400':
        description: >-
          Bad Request. Two distinct causes share this status code: 0 rows
          affected (GAP, no capture) or caller is not an
          org_admin/tenant_admin (GAP, no capture).
        content:
          application/json:
            schema:
              oneOf:
                - $ref: ../components/org-admin.yaml#/deactivateUser400Response
                - $ref: ../components/org-admin.yaml#/orgAdminNotAdminResponse
      '422':
        description: >-
          Validation failed. Real captured example: neither `ids` nor
          `emails` provided (or both empty).
        content:
          application/json:
            schema:
              $ref: ../components/org-admin.yaml#/deactivateUser422Response
            example:
              responseCode: CLIENT_ERROR
              error: []
              meta: {}
              message: Provide at least one non-empty "emails" or "ids" array.
inheritEntityType:
  post:
    summary: Inherit Entity Type
    operationId: inheritEntityType
    description: "Inherit an entity type from the default organization into the
      caller's organization.

      - Endpoint: `/user/v1/org-admin/inheritEntityType`.

      - It is mandatory to provide values for parameters marked with `required`.

      - Mandatory parameters cannot be empty or null.

      - Runtime-config note: whether the caller's own organization IS the
      default organization is determined by comparing
      tokenInformation.organization_code against the
      `DEFAULT_ORGANISATION_CODE` environment variable. This is a
      deployment-config-dependent rule and is documented in prose here
      rather than modeled as a schema constraint (it cannot be expressed
      from the request body alone).

      "
    tags:
      - Org Admin APIs
    parameters:
      - name: X-auth-token
        in: header
        description: Access token of the org admin.
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/org-admin.yaml#/inheritEntityTypeRequest
    responses:
      '201':
        description: >-
          Created. Entity type inherited successfully. GAP: previous draft
          incorrectly documented this as 202 Accepted with a fabricated
          example body; corrected to 201 (httpStatusCode.created in
          services/org-admin.js) with a shape-only schema (no captured
          example exists).
        content:
          application/json:
            schema:
              $ref: ../components/org-admin.yaml#/inheritEntityType201Response
      '400':
        description: >-
          Bad Request. Three distinct causes share this status code: caller's
          org is the default org (real captured example), no matching entity
          type found under the default org (GAP, no capture), or caller is
          not an org_admin/tenant_admin (GAP, no capture).
        content:
          application/json:
            schema:
              oneOf:
                - $ref: ../components/org-admin.yaml#/inheritEntityType400DefaultOrgResponse
                - $ref: ../components/org-admin.yaml#/inheritEntityType400NotFoundResponse
                - $ref: ../components/org-admin.yaml#/orgAdminNotAdminResponse
            examples:
              userIsFromDefaultOrg:
                summary: Caller's organization is the default organization (real capture)
