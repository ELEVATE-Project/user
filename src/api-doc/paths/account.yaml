      - `tenant_code`, `type`, and `organization_id` are required query
      parameters; `user_ids` and `excluded_user_ids` are required in the body."
    parameters:
      - name: X-auth-token
        in: header
        description: X-auth-token from the login API response.
        required: true
        schema:
          type: string
      - in: query
        name: tenant_code
        description: Tenant code.
        required: true
        schema:
          type: string
        example: default
      - in: query
        name: type
        description: >-
          Valid user type (mentee, mentor, session_manager, org_admin, reviewer),
          or `all`.
        required: true
        schema:
          type: string
        example: mentor
      - in: query
        name: organization_id
        description: Organization ID.
        required: true
        schema:
          type: number
        example: 1
      - in: query
        name: page
        description: Page number for pagination.
        required: false
        schema:
          type: number
        example: 1
      - in: query
        name: limit
        description: Number of records to limit.
        required: false
        schema:
          type: number
        example: 2
      - in: query
        name: search
        description: Search for the name or title of the user.
        required: false
        schema:
          type: string
        example: john
    requestBody:
      content:
        application/json:
          schema:
            $ref: ../components/account.yaml#/searchRequest
          examples:
            withUsersAndExclusions:
              summary: Search with included and excluded user IDs
              value:
                user_ids: [22, 23]
                excluded_user_ids: [24]
    responses:
      '200':
        description: OK. User list fetched successfully.
        content:
          application/json:
            schema:
              $ref: ../components/account.yaml#/search200Response
      '401':
        description: Unauthorized. X-auth-token is either missing or invalid.
        x-internal-note: >-
          No captured example exists for this status on this endpoint -
          shape reused from the standard unauthorizedResponse envelope used
          elsewhere in this domain, not a fabricated body.
        content:
          application/json:
            schema:
              $ref: ../components/account.yaml#/unauthorizedResponse
