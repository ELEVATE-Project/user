registrationOtp:
  post:
    summary: Registration OTP
    operationId: registrationOtp
    tags:
      - User APIs
    description: "This API sends a registration OTP.\n
      - Endpoint: `/user/v1/account/registrationOtp`\n
      - `registration_code` is required; at least one of `email`, `phone`, or
      `username` must be provided (`phone_code` required with `phone`)."
    parameters:
      - name: X-auth-token
        in: header
        description: X-auth-token from the login API response.
        required: true
        schema:
          type: string
    requestBody:
      content:
        application/json:
          schema:
            $ref: ../components/account.yaml#/registrationOtpRequest
          examples:
            withEmail:
              summary: Registration via email
              value:
                email: mentee@tunerlabs.com
                registration_code: org-signup-code
            withPhone:
              summary: Registration via phone (phone_code required)
              value:
                phone: '9876543210'
                phone_code: '+91'
                registration_code: org-signup-code
            withUsername:
              summary: Registration via username
              value:
                username: mentee_new
                registration_code: org-signup-code
    responses:
      '200':
        description: OK. Registration OTP sent successfully.
        x-internal-note: >-
          services/account.js `registrationOtp`, message key
          REGISTRATION_OTP_SENT_SUCCESSFULLY. No captured example exists for
          this status on this endpoint - schema reused from the
          verbatim-captured generateOtp200Response (identical response
          shape), not a fabricated body.
        content:
          application/json:
            schema:
              $ref: ../components/account.yaml#/generateOtp200Response
      '400':
        description: Bad Request. Invalid organization registration code.
        content:
          application/json:
            schema:
              $ref: ../components/account.yaml#/clientErrorResponse
            examples:
              invalidRegistrationCode:
                summary: registration_code not valid for org
                value:
                  responseCode: CLIENT_ERROR
                  error: []
                  meta:
                    correlation: b28d7ea7-fd7a-4868-8acf-f5a9d9c7b52f
                  message: INVALID_ORG_registration_code
      '422':
        description: >-
          Unprocessable Entity. Cross-field validation failed (none of email,
