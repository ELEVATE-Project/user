create:
  post:
    summary: Create user
    operationId: createAccount
    tags:
      - User APIs
    security: []
    description: "This API creates a user account.\n
      - Endpoint: `/user/v1/account/create`\n
      - At least one of `email` or `phone` must be provided; `phone_code` is
      required when `phone` is present.\n
      - Depending on the tenant's `configuration.allowed_auth_mode`, a
      `password` may be required (or rejected)."
    requestBody:
      required: true
      description: Request body consist of metadata and accepts payload as JSON
      content:
        application/json:
          schema:
            $ref: ../components/account.yaml#/createUserRequest
          examples:
            withEmail:
              summary: Create using email (at-least-one-of satisfied)
              value:
                name: Nevil Mathew
                email: mentee@tunerlabs.com
                password: Password@123
            withPhone:
              summary: Create using phone (phone_code required)
              value:
                name: Nevil Mathew
                phone: '9876543210'
                phone_code: '+91'
                password: Password@123
    responses:
      '201':
        description: Created. Sign-up successful.
        content:
          application/json:
            schema:
              $ref: ../components/account.yaml#/createUser201Response
      '406':
        description: Not Acceptable. User already exists.
        content:
          application/json:
            schema:
              $ref: ../components/account.yaml#/clientErrorResponse
            examples:
              userAlreadyExists:
                summary: Duplicate email/phone/username
                value:
                  responseCode: CLIENT_ERROR
                  error: []
                  meta:
                    correlation: a8cf416d-c952-45ba-b283-b57bf9113ac7
                  message: User already exists.
      '422':
        description: >-
          Unprocessable Entity. Cross-field validation failed (neither email
          nor phone provided).
        content:
          application/json:
            schema:
              $ref: ../components/account.yaml#/clientErrorResponse
            examples:
              missingEmailAndPhone:
                summary: Neither email nor phone provided
                value:
                  responseCode: CLIENT_ERROR
                  error: []
                  meta:
                    correlation: dff2a7c1-c903-4876-b403-1b81687239d9
                  message: At least one of email or phone must be provided
login:
  post:
    summary: Login
    operationId: login
    tags:
      - User APIs
    security: []
    description: "This API logs a user in.\n
      - Endpoint: `/user/v1/account/login`\n
      - `identifier` is required. At least one of `password` or `otp` must be
      supplied.\n
      - Which credential is accepted is additionally gated at runtime by the
      tenant's `configuration.allowed_auth_mode`; a credential for a disallowed
      auth mode returns `AUTH_MODE_NOT_ALLOWED`."
    requestBody:
      description: Request body for user login
      content:
        application/json:
          schema:
            $ref: ../components/account.yaml#/loginRequest
          examples:
            passwordLogin:
              summary: Login with password
              value:
                identifier: mentee@tunerlabs.com
                phone_code: '+91'
                password: Password@123
            otpLogin:
              summary: Login with OTP
              value:
                identifier: mentee@tunerlabs.com
                phone_code: '+91'
                otp: '123456'
    responses:
      '200':
        description: OK. User successfully logged in.
        content:
          application/json:
            schema:
              $ref: ../components/account.yaml#/login200Response
      '400':
        description: >-
          Bad Request. Either neither password nor otp was supplied
          (AUTH_CREDENTIAL_REQUIRED), or the credentials were invalid.
        content:
          application/json:
            schema:
              $ref: ../components/account.yaml#/clientErrorResponse
            examples:
              passwordOrOtpMissing:
                summary: Neither password nor otp supplied
                value:
                  responseCode: CLIENT_ERROR
                  error: []
                  meta:
                    correlation: fe4537ed-d8bc-4446-9ec0-f7994a3323a3
                  message: Password or OTP is required.
              wrongPassword:
                summary: Wrong password
                value:
                  responseCode: CLIENT_ERROR
                  error: []
                  meta:
                    correlation: ccb08b77-ccf6-4f4b-91fb-4287ce248df5
                  message: Invalid identifier or password. Please check your login credentials.
              identifierNotFound:
                summary: Identifier not found
                value:
                  responseCode: CLIENT_ERROR
                  error: []
                  meta:
                    correlation: bc8053f2-4195-462a-8734-1153efe979db
                  message: Invalid identifier or password. Please check your login credentials.
      '422':
        description: Unprocessable Entity. Request body failed validation.
        content:
          application/json:
            schema:
              $ref: ../components/account.yaml#/validationErrorResponse
            examples:
              identifierEmpty:
                summary: Missing identifier
                value:
                  responseCode: CLIENT_ERROR
                  error:
                    - location: body
                      param: identifier
                      msg: Identifier field is empty
                  meta:
                    correlation: ad29b3a6-295d-4059-af71-75e0efecc16d
                  message: Validation failed, Entered data is incorrect!
